色颯將寒秋聲輟還急琅玕欹易折翠羽紛難拾幽人最惆悵攬衣空佇立蕉石亭芳草如翠幄亭亭冒巗阿丹梯承晚映碧澗寫秋柯日入煙霧滿夜來風雨多預愁霜雪至為樂恐蹉跎觀耕臺東災及農節髙臺試登陟阡陌路逶迤陂塘水紆直歷歷原上耕依依隴間食雖無耒耜勤端居增歎息薔薇洞洞口薔薇樹春來冉冉紅停舟緑水曲携酒綵雲中穿林入窈窕牽葉望玲瓏祗謂躋攀盡望望轉難窮荷池臨水放蘭枻處處花相觸霞水共參差香風時斷續上看繡羽亂下睇文魚逐日暮未歸來聊就舟中宿柏屏何時别陵上移居來後庭牽條擬峰勢總葉學山形白雪轉自緑綵雲相對青無勞台嶺側陵虛摶翠屏留月峰隂崖抱嵌竇倒景如明月玉氣夜逾妍珠光朝未滅雲歸暈正滿霧上輪初缺西園宴客處臨玩情無輟通冷橋隔崦聞秋籟行尋窺碧山雨過沙岸曲泉吐石梁間雲深乍淅瀝風起更潺湲緣源欲何極日夕未能還花源曲水寫珍池盈盈送紅蕚朝來湖上雨吹此繁花落旖旎縈魚藻徘徊逗蘭薄含悽眺芳渚劇念春銷鑠安陽道中留别崔子鍾伊昔遊京邑周旋預簪裾親仁值賢哲泛愛及頑踈出處或異趣聚散罕同居今來再晤對奄忽十載餘十載俱南北行路何傾側色斯子奮飛明夷我垂翼失道愧先迷知幾服深識握手慘無言撫心空歎息歎息亦何為迍邅丁此時鳳至樂周德麟傷悲魯衰既往亮無及將來猶可追所憂日月逝壯志已陵遲陵遲竟無成世故更相嬰平生陷悔吝晚節企幽貞無咎庶言慎有祿不可榮要子同心事千秋揚令名贈劉希尹曰余田野人勝冠弄文墨自顧在泥塗敢言生羽翼儀封誤眄睞汝南虛奬飾朅來長安道復與君相識伊君本卓躒聲華光岱嶽氣髙稷下辨文當淹中學禮闈同貢薦宰府聨登擢何意他山石濫厠荆岑璞當代論交地如君真寡二周旋幸嘉會提携辱髙義仙曹多暇日帝京饒樂事朝隨紫陌遊夜集華堂醉清時信難偶世故俄紛糾我方釋詔獄君已遭讒口金虎正縱橫玉馬空奔走憫默各傷心蒼皇一分手升沉難預計往復更遷逝失勢蘭化芻乘時堇為帝愚士故繫俗達人解其契寵辱安足驚脫略人間世征塗積氷雪遊子辭京闕惆悵北風詩眷戀河梁别昔為金石交今為雲雨絶擾擾離筵散曖曖行塵滅親交日以稀心緒重多違同人既逺謫孤客亦懷歸雲霄憚投足風塵思振衣願言乞骸骨從君俱奮飛釣磯釣磯上斗折偃仰俯石瀨曽雲來目眥清波鑒衣帶捫葛聊為綸持荷還作蓋髙情豈羡魚逍遙在塵外月夜望雪朝看雲際雪夜坐月中樓宛似青天上俯觀銀漢流猶憐目未盡好為上簾鈎贈王山人古有形法家史官常著録王生世其術胸中羅海瀆為我談形勝九州如在目手持諸公詩詞華爛珠玉吾聞古者葬溝壑為槥櫝緣情棺槨易彌文宅兆卜古道日陵夷異哉末代俗送死徒空言實僥生者福昔人信恬淡今人苦多欲紛紛衰世事利塗寧異躅天地無終極陵谷屢翻覆縱觀大化中千載亦云促既死惟所遇生取衣食足不貪以為寶斯言當自朂贈蘇允吉侍御二首逃虗喜同人絶絃悲異代獨行增永懷賞廢有餘慨平生友英俊末路離歡愛何圖蓬藋間復與親仁會知言甚合符定交果傾蓋先民夙所仰斯人固其輩鴻才何炳蔚雅行乃韜晦官聨侍從列意寄風塵外相望己勞積辭訣能無槩差池惜良晤繾綣見交態吾衰采真遊子賢熙帝載一結同心言當令歲寒在鹿鳴美野草君子貴贈言聞善樂相告此義古所敦若人信名世乘運佐羲軒觀風練國體遊藝究詞源求友及薄劣作賦賁邱園感彼詩人語何以報璵璠曰余嗜檏學自信莫能諼舉俗不見是惟君期討論立言非不朽功德鮮常存逐末事終小得一道斯尊外物棄浮雲貴已養靈根願招同懷客共入無窮門小園舊名退樂中丞馬敬臣先生改曰常樂因為題榜兼賦古詩二章見贈蕙敬次韻奉酬且記吾園得名之始西原亡舊業南郭得新廬開荒築場圃改徑通村墟達人賞我趣逺訪林間居年德非可親氣味略未踈傾蓋語移日縱談懷抱舒置酒瑩心亭促席臨清渠然竹煮山茗炊黍薦園蔬贈詩借髙論題榜忝名書雖榮華衮褒自顧實空虛平生志尋樂憂患每有餘好學謝希顔寡過願師蘧守節欽兩龔知止企二疏微公藴真鑒晤語復誰與荒園負城郭窮巷翳榛莽誰云一區小我懷殊自廣結茅尚素朴種竹愛蕭爽樂此林廬就忘彼年歲長自豫釋纓紱一紀脫羈鞅獨學嘆孤陋成性愧存養稍知天路近欲陟未能上希音寡偶和好事莫來往遂輟邱中琴千載寄遐想晚遇林慮公折節猥相訪望洋增大觀披雲快髙仰諒非溫伯子何以酬心賞贈李子西自余友君子寒暑僅三易始見歡如故再遇契逾昔周旋尚無幾欵眷良已積常恐人事乖及兹果離析枉駕就我别執袂城南陌舉觴忘獻酬坐客皆悽惻愛深悲不淺辭盡意何極霄漢子奮飛山林余偃息出處茍同心楚越非異域送林汝雨提學嶺南聖人久不作命世豈無人賢哉白沙翁崛起南海濵研幾見智崇固窮占道醇吁嗟百年後斯人不可聞儒林實淵源庶官非等倫君雖舊史氏選擇典斯文番禺名都會多士何彬彬之子允師表先正有遺塵千仭獨髙逝九淵終自珍出處茍不審性命諒奚云衰俗日陵夷我懷難具陳風聲繫先倡典刑期再新嘉會亟增修江門堪問津贈言同心友景行良可遵日暮日暮坐東軒直望西山曲白雲藹藹至雨我忩前竹兹晨憚隆暑披衣廢朝沐徙倚乘夕涼清風散炎燠大象幹流行變化一何速日新諒無取年長秪多辱古人善補過嗟爾當自勗寄穆玄菴昔遊西海上明月落吾手欲訪識珠人惟有玄菴叟山川阻且長望望空搔首由來稀世寶知者故希有菴中市聲入墟落甕牖未全曉蟲飛亦薨薨焉知此生小群動隨天運宇宙長紛擾獨有菴中人冥然化機表贈孔汝錫河清非難俟鳴鳥亦易聞傷哉獨立者異代無同群調鍾欲誰須獻玉秪自勤士為知已死古人豈徒云我生信多幸激賞遇夫君清襟似淵徹妙論若蘭薰寂滅契玄理英華包藝文方欣暫晤對遽愴逺乖分迢迢長安日杳杳大梁雲預愁夢中路舉目空氤氲南園對月與孔汝錫避俗每郭外養痾亦園中索居無與娛君子欣來同孟夏日猶短初筵俄景終幸兹三五夕可令詩酒空移席陟亭榭緩帶弄絲桐落霞稍西沒朗月已升東湛湛竹上露泠泠松下風眺聽盡昭曠懷抱轉沖融詎厭緑觴滿但愁良夜窮留連非荒樂悵别方匆匆邱中蕭條風雨散凄清松桂冷邱中一遊睇處處雲霞影稍愛夕陽佳復聽秋聲靜遙懷賞心侶歲暮空延頸寄浚川先生覽公談玄作贈公詠玄篇尋仙願未果懷舊心悠然摳衣遊郡齋言詩偏賞激束書謁京邸交臂俄分折中歲再見公置酒浚郊廬自此若參辰形迹緬相踈一别二十年相思定深淺獨遊郭南園憶公如在眼稷契亮天功巢許好山棲同生堯舜世出處安能齊退藏誠自揣明揚何濫與愧非伯齊倫謬當公叔舉我年已遲暮我志但逡巡鄙儒信頑魯不識要路津枳棘偏荒塗鴟梟競翔舞中有孤鳳凰哀鳴一何苦十日出天衢龍飛欲何為不如反深淵俟彼風雨時世俗多﨑嶇達人豈凝滯公能訪松子豫亦從公逝次韻酬顧武祥一㕓郭外田五畝林間宅追蹤揚子雲希風謝安石春墟雜沓紅秋徑朦朧碧優遊不知老留連轉成癖良朋兹見訪神交自疇昔臨流暫携手藉蘭仍布席晤言盡冥契賞心非外索誰謂衡門下亦枉金閨客髙士輕官簿逸人貴仙籍矯首問天路與君同所適莊生莊生演黃老孟子述唐虞古今事已異見謂為狂迂章甫豈不貴越人非所須嗟嗟後代士髙論將焉如林卧東南月出早林卧不知莫飄蕭石隕籜青熒松泫露意愜已忘言神遊如有遇空懷寄同好此境莫能賦留别素乏霸王略頗深山海情一充南省賦再反東臯耕踈放日增甚沉痼歲彌嬰好遁愆幽期鳴豫貪浮名進止茍如此焉能獲利貞初服念不忘逺遊心所輕遲遲去燕闕眇眇向吳荆薊門雨雪暗廣陵潮水生八公遺桂樹千里饒蓴羔名勝分可悅心賞遙難并願言慰離索引領伺同聲考功集卷三
