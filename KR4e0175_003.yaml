body:
  text: 考功集卷三明薛蕙撰五言古詩贈何大復昔我弱冠日翩翩綴文辭發藻翰墨林志意縱橫飛慷慨惟古人自言不足為歷覽百千年揚馬乃吾師雖非絶倫才王子幸見知一朝遘嘉會英俊相追隨追隨親交者四海皆匹儔矧復適我願得與子同遊惟爾當今時聲名溢皇州陵邁班與張卓犖屈宋流興文何韡曄世儒焉可侔慚豫非子友何以結綢繆綢繆不相棄感子意纒綿自負窈窕姿何言謂我妍吁嗟知已人自古亦皆然嬿婉三歲間朝夕共周旋金石豈為固膠漆匪云堅如何忽分析使我心嬋媛嬋媛傷人懷紆軫無終極送子臨衢路泣涕霑胸臆願言從豫邁安能有羽翼浮雲逝不返飄風不我值江河廣無梁山髙不可陟嘆息何所道但言長相憶相憶亮何益怨此去路長昔者同心友今為參與商人生百年內倐忽若流光良會復何時一别殊未央君其篤平生慰我遙相望斯言儻弗諼傾想惠來章贈孟望之四首迢迢東流水悠悠逺行子送子出邁時離别自今始山川一間之相去日千里徘徊蹊路側思心從中起人生百年內聚散誰能止壯年豈再得良時不可俟念我平生歡眷眷未云已驅馬城門陽舍馬登山邱携手立踟蹰還顧望皇州皇州一何麗藹藹皆王侯冠蓋似浮雲賔客自相求衢路豈不廣之子不得留慷慨內傷心為子獨懷憂昔余與君子未見心相知邂逅在今辰果若平生時願得結歡好贈子以新詩含意未及申行行復何之念當從此去倣徨出郊畿行人倦往塗終言與我違倉卒執手間嘆息空相持愧無晨風翼送子起翻飛踟蹰郊野外白日匿西山行人去有期安得久周旋請為遊子吟與子結纒綿憂來動人心惻愴不能言言念平生友意氣非徒然行役不足辭貧賤非所憐君其篤明信慰我心惓惓贈張仲修二首青青豫章樹寄生濁水泥風波摧以傷不如蒿與藜吁嗟貧賤士子行何栖栖昔為猛虎步今為觸藩羝忠信獲罪辜有願不克諧英雄一失據反覆良可哀采藿東門側終朝喟長嘆虹霓干白日朔風何翻翻興言念我友攬衣涕汍瀾金虎構宮鄰罹此百禍端有鳥孤飛翔悲鳴奮羽翰逝言不我顧戀戀傷肺肝敘歸干祿恥虛薄依方託踈慢偃息雖久淹幽棲寧若晏一朝幸時會逝言逺遊宦端服朝閶闔抽毫謁雲觀短迹乏髙足弱植謝貞幹豈同漸陸羽乍類登天翰役役感羈旅悄悄懷歸嘆悵望承明廬徘徊霸陵岸修路歷城闉初服返里閈園墟申宿諾壤石改新玩陟榭瞰東田尋溪泝南澗竹樹互邅回魚鳥共凌亂平生覽往昔即事踐昏旦冥寂資神理牽攣防世難梅生入會稽龎公去江漢傷哉古今慮絶景山岩畔過城西野初服性已曠久痾志仍疲豈謂傷淫滯偶以戀棲遲聿來年歲遷驟看節物移晴陽改隂候暖律變暄吹晨發髙闉曲夕騖清川湄白雲生幽沚緑水激層涯外感耳目超內尋神藴披泛濫滄洲趣髣佛崑山姿揆已信薄劣遭時易磷緇來復雖不逺往蹇豈能追孟晉終何逮罷歸聊所宜願言在弗諼援毫申此辭晚起花上露乍晞林端霞已照幽人倚户起春禽迎日呌昔苦束帶疲今知散髮妙方同嵇公懶豈顧管生誚夏夜逍遙避暑地玄夜敞隂扉涼風池上滿白露月中稀玉叉乍續墜翠斚不停揮淹留時未輟向曙乃言歸田中築舍修治樹藝莊生卧濠梁范子去海隅行止信難侔逺迹要不殊伊豫慕棲遁脫冠歸里閭卜宅近郊坰葺宇就田廬南榮面崇岡北牖背幽墟雖非山水地取樂自有餘築牖仍先趾穿池即故渠林木盡舊行圃畦皆曩區寡欲罕所營衆美亦云俱爵祿無常位貧賤有安居豈惟畏淹留得以免憂虞歡此平生情永言焉可渝晚出齋中園中明晦異日晏氣候齊餘光杳西傾圎景回東躋叢木夾空廂涼颷扇幽閨梢梢隂籜翻翩翩夜禽啼美人間遨遊即景自招携褰裳出北户杖䇿佇南階俯察雙渠涌仰視三星低真賞恆在近至鑒故不迷神往迹難留志存理無暌寄言山林客安用登雲梯冬初開冬肇時序時序異疇曩烈烈嚴氣升肅肅玄隂敞同雲匝阡陌凝霜被榛莽寒暑鑒迭代休咎究消長郊原值窮節庭户息群響疾病倦淹留寤寐縱偃仰感物殷懷抱離人絶心賞幽獨豈無悶至樂非外奬形變化隨逝意愜神俱往永解區中緣安排契真想除日悠悠天北運冉冉日西靡兹年俄且周薄暮亦云已端居撫辰序靜言感化理時來變窮節事往乖壯齒託疾侔長卿歸田擬平子處困豈不難執操良足恃瑣瑣旅客志坦坦幽人履莊周貴達生伯陽戒知止尚公識損益賈傅辨憂喜在昔仰玄訓于今寤微旨即此怯塵慮因之蹈靈軌丙子十月二十八日初發鄉邑述征有作旅宦添從事卧痾輟歸田俯仰似昨日荏苒踰三年末路謝貞素積習慚夤緣整駕别鄉邑薄言重徂遷瞻途背梁宋振策指幽燕昔往遺維縶今來就糾纒豈伊行役嘆畏此平生愆嬰世迫物纍撫化懷冥筌齊契百年內髙揖千載前慮存迹匪虧意愜道仍全斯言俟明哲因歌遂成篇憶句曲山寄顧英玉夙齡諷圖諜微尚寄邱壑神期雖未并斯𠂻固無怍江南仙靈地句曲奧且博孔記述形迹河篇表經略青磴下﨑嶇丹壁上岞崿靡靡被石􅌲嗈嗈戲雲鶴聞道甘間曠養痾困疲弱即趣懷同好贈言負前諾巗廊竊已忝江海自堪託敢希東都金且訪西山藥苦暑朱明戒夏令大火次南國溫風有增響旱雲多異色宵眠惕朝旭旦坐望夕昃伊鬱不可聊恬曠何由得靜勝昔嘗解神昧今始惑如何平生懷未建古人則感物百慮作遺生羣動息撫中俄有契履運似無即單生忌外雕張子患內逼幸是捐心纍終然謝通識候大駕回西北收皇旅東南歸帝京山驅八駿下海泛六龍行後車環外區前駟集神坰支兵連四校中堅屯九營絳氣曵朱竿青雲生翠旌鐃歌綵吹激行漏玉鸞鳴入覲萬國至清宮群后迎金貂雜流景圭璧委繁星録功對五帝合符朝百靈俯窺地紐正仰瞻天柱平郊禋方展義升封將告成祈招美王度長謡頌休明祀陵作幽陵首衆嶽朔海揔群川形迹閟烏策圖象隱瑶編時晦貞期逺運開昌命先遷都既相宅遺冡乃登仙翠鳳舞丹阜蒼龍蟠紫淵叢溪杳藹藹積岨肅芊芊園塋環列隧殿寢被曾巔房御清以謐神路峻且玄悽愴山庭露蕭瑟松門煙光景緬如存春秋俄屢遷聖情鬱終古睿思藴遐年周衛物惟備崇樹禮仍虔歲事展哀敬孝享竭明蠲百靈妥宗室九列翼皇筵秉德躬所闕陳歌志未宣曽是厠末位僶俯謝朝賢秋日署中簡諸君子新秋改炎節涼臻溽暑旋凄凄金氣舒昭昭素景鮮流風靡幽薄輕靄映澄川飄颻激楚吹眇杳泛蘭煙吏隱案牘簡齋居神想偏目耽霞上鶴耳玩露中蟬几席縱偃息纓紱謝牽纒卧閣趣無輟含毫興邈然西曹擅文苑蕭晨惜暮年徘徊錦帳坐吟嘯白雲篇望美勤徒結懷勞憂莫蠲賞心儻不隔答訊冀相傳贈饒平令曹先生炎方信巨麗海嶠彌光輝衝波迅交屬斷岫崒相圍銅乳隱雲穴金膏被石崎青林互繚繞玉草競芳菲嶺戍接丹徼縣齋當翠微褰開盡洲島偃卧同巗扉髙閣祗自閉鳴琴方獨揮心和物皆定欲靜神來依靈境邈難測異人遊豈稀虛無翡翠蓋髣佛芙蓉衣安邑儻可纍吾將從此歸雨霽間望池邊風嫋嫋竹裏影微微薄暮西山曲蕭條涼雨歸伏檻看秋色四睇亂清輝哀猿連谷響迷鳥隔雲飛朝市名仍繫林壑興難違眷言反初服蘅杜尚芳菲看月秋氣麗華月月華麗層穹餘輝稍熠爚流影漸曈曨臨水寫珠綴縈花映綺櫳蘭林團墜露桂樹鬱回風佳人在何許咫尺限西東殷勤離緒濶寂寥歡宴空陸生北堂上謝客南樓中音息一以緬思心安可窮星漢屢淹薄展轉夜難終可惜芳菲節羇處怨飛蓬贈劉子緯朝與佳人期相望愁欲盡夕與佳人隔相思笑復隱西園佇飛蓋東郊滯歸軫嚶鳴恱和響芳菲悲戚隕室邇怨鄭謡媒勞哀楚引抑念聊可忘含情詎能忍對雪簡崔洹野何大復清隂含洞房凄氣飄飛閣起視緑雲中白雪乍飄落紛紛集青瑣盈盈舞羅幕玄沼涌珠花翠苑棲瓊蕚良辰眷恱豫幽居感離索有酒今若斯思君共斟酌雪後玩月作朝眠髙閣內吟弄風前雪夕登曲榭上遊盼雲中月月出輕雲斂雪罷流風闋連輝有餘映縈光無暫輟首眺懷乍新闌賞景彌絶雙隂相蔽虧並彩互明滅炎寒俄聚散弦望劇盈缺撫物亮固然孤𠂻異歡惙長安西門候朝隱隱夕唱傳肅肅宵車騖兹夜方向晨中心憚將暮朱華淪未啓瑶光儼初度絳霄麗明月素飈流藻霧嚴防限中禁周廬扄內附岹嵽北宮朝徙倚西墉步曬目紫微宇蹀足玉階路矯迹承華側徒慚班振鷺答何大復宵歡不繼晨朝遊豈延夕欵念未云周勞心彌已積篤好追昔悰興言撫今戚纒綿金玉音參差翰墨迹開帙虛雲閣臨觴闕瑶席惠思荷來章褰裳奉良覿月夜坐憶明月三五時流光千里外虛館風泠泠寒墀霜靄靄不見南樓客徒憶西園蓋歡酒無盈觴憂襟有餘帶沉吟靜夜思緬邈佳人會過孫世其館中傾暉隱闌晷屯隂升初宵陟降並招携遊衍共逍遙坐檻仰層穹披户聆清飈羅星照髙牖行雲動微綃旁眺稍暗暗極望亦寥寥即此蓄心賞眷言詠長謡訪史內翰不遇回車望雲崿攬衣陵霧術山齋晚猶閉幽人朝已出拂石矚新詠窺窗覘散帙含情不可訴徘徊悵如失何中翰夜集寥寥玄冬夕穆穆北堂宴徘徊芳翰詠殷勤羽巵薦霧幌入鮮月風甍下微霰自顧恥薄虛何因屬深眷崔太史席上詠翠杯綺坐倦朝歡翠杯出宵酌月艷寫疑空雲光挹愁落碧醴共玲瓏華燈增照灼一得侍君間終言厠酬酢詠御溝鴈太液春風起瀟湘鴻鴈歸照水翹圓趾隨波弄短衣曲池稻粱足上林矰繳稀由來江海性還從塞北飛雜詠六首詠風蛾眉簾下出春風花際來雲落鬢間髮蟻轉手中杯華梁塵乍動羅幃影復開試將巫山雨吹向楚王臺詠燭客醉北堂上花生夜户中色亂歌梁月影暗舞衣風珠簾照不隔羅幌映疑空願得陪長宴相看曲未終詠屏風屏風十二曲羅列洞房隅雙環金屈膝四角錦流蘇蛾眉行處隱玉袖坐中扶因歌留上客翠蓋少踟蹰詠蒲昔聞詠塘上今見玩池中紫茸含細蕊緑帶舞輕叢蜻蛉髙下逐翡翠往來通徘徊桂蘭渚竟日與君同詠萍參差如霰布的鑠似星出魚戲影初開鳥散文猶密幸因雲雨會且免風波失無禆江海流徒謝芳菲質詠兔絲根株不自立枝蔓為誰飾偶同雜組文未比朱絲直園客何由整天女詎堪織暫附松柏枝終辭霜露色答祝禮部屏居寡歡愛懷痾積悲戚勞君惠繁翰結言慰離析荒楚向踈蕪寒花方寂歷良辰已云暮清揚不可覿贈士竒允升暮春黃鳥飛始悲歡晤稀首夏朱櫻熟重嘆離居速離居何契濶沉憂鬱難豁君同汲黯疾豫有相如渴偃息閉東軒扶杖一窺園遲遲雲日媚萋萋卉木繁素書既滿几清酒亦盈尊此時微二子賞心誰與論秋日感懷白露墜何早清風凄己寒今兹復秋日悵爾切悲端三十未聞道一官祗素餐區區諒無補惴惴詎能安撫已每多念逢時恆鮮歡徒然抱慙恨嘆息歲將闌舟行雜詩九首金門再捐佩滄洲一振衣沿洄歷秋水偃仰盻清輝塞鴈尚未發檣烏還解飛臨流聞楚調為我送將歸避地諒非願遊吳或有託今我匪伊人心期偶如昨行役多憂苦棲遲詎為樂君看岸上蓬秋風益飄泊白露晚來生汀洲把杜蘅浮雲西北返孤客且南征習習野吹急沄沄川漲平徒看秋潦盡未可俟河清息徒指川裔繫纜臨叢薄飄颻散襟帶風吹零露落俯折岸邊蘭仰聽雲間鶴寄言天路上共爾違矰繳秋雲翠可鑒明河景如髮川上夜寥寥徘徊望新月流光睇轉近餘輝攬還沒念彼同懷人關山日超忽木落風雨夜水生蘭蕙洲已值清秋日旅客思悠悠感時臨歲晏惜逝對川流此際亟歸去蕭條難久留行子怨路長長路方漫漫前瞻但雲霧却聽空波瀾銷憂命歡酌取樂興哀彈安得晨風羽紓我懷歸嘆朝辭枉渚汭