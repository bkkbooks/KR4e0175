body:
  text: 考功集卷三明薛蕙撰五言古詩贈何大復昔我弱冠日翩翩綴文辭發藻翰墨林志意縱横飛慷慨惟古人自言不足為歴覽百千年揚馬乃吾師雖非絶倫才王子幸見知一朝遘嘉㑹英俊相追隨追隨親交者四海皆匹儔矧復適我願得與子同遊惟爾當今時聲名溢皇州陵邁班與張卓犖屈宋流興文何韡曄世儒焉可侔慚予非子友何以結綢繆綢繆不相棄感子意纒綿自負窈窕姿何言謂我妍吁嗟知已人自古亦皆然嬿婉三歲間朝夕共周旋金石豈為固膠漆匪云堅如何忽分析使我心嬋媛嬋媛傷人懐紆軫無終極送子臨衢路泣涕霑胸臆願言從予邁安能有羽翼浮雲逝不返飄風不我值江河廣無梁山髙不可陟嘆息何所道但言長相憶相憶亮何益怨此去路長昔者同心友今為參與商人生百年内倐忽若流光良㑹復何時一别殊未央君其篤平生慰我遥相望斯言儻弗諼傾想惠來章贈孟望之四首迢迢東流水悠悠逺行子送子出邁時離别自今始山川一間之相去日千里徘徊蹊路側思心從中起人生百年内聚散誰能止壯年豈再得良時不可竢念我平生歡眷眷未云已驅馬城門陽舎馬登山邱携手立踟蹰還顧望皇州皇州一何麗藹藹皆王侯冠盖似浮雲賔客自相求衢路豈不廣之子不得留慷慨内傷心為子獨懐憂昔余與君子未見心相知邂逅在今辰果若平生時願得結歡好贈子以新詩含意未及申行行復何之念當從此去彷徨出郊畿行人倦往塗終言與我違倉卒執手間嘆息空相持愧無晨風翼送子起飜飛踟蹰郊野外白日匿西山行人去有期安得久周旋請為㳺子吟與子結纒綿憂來動人心惻愴不能言言念平生友意氣非徒然行役不足辭貧賤非所憐君其篤明信慰我心惓惓贈張仲脩二首青青豫章樹寄生濁水泥風波摧以傷不如蒿與藜吁嗟貧賤士子行何栖栖昔為猛虎歩今為觸藩羝忠信獲罪辜有願不克諧英雄一失據反覆良可哀采藿東門側終朝喟長嘆虹霓干白日朔風何飜飜興言念我友攬衣涕汍瀾金虎構宮鄰罹此百禍端有鳥孤飛翔悲鳴奮羽翰逝言不我顧戀戀傷肺肝叙歸干禄恥虚薄依方託踈慢偃息雖久淹幽棲寧若晏一朝幸時㑹逝言逺遊宦端服朝閶闔抽毫謁雲觀短迹乏髙足弱植謝貞幹豈同漸陸羽乍類登天翰役役感羈旅悄悄懐歸嘆悵望承明廬徘徊霸陵岸脩路歴城闉初服返里閈園墟申宿諾壤石改新翫陟榭瞰東田尋溪泝南澗竹樹互邅廻魚鳥共凌亂平生覽往昔即事踐昏旦㝠寂資神理牽攣防世難梅生入㑹稽龎公去江漢傷哉古今慮絶景山岩畔過城西野初服性已曠久痾志仍疲豈謂傷淫滯偶以戀棲遲聿來年歲遷驟㸔節物移晴陽改隂候暖律變暄吹晨發髙闉曲夕騖清川湄白雲生幽沚緑水激層涯外感耳目超内尋神藴披泛濫滄洲趣髣髴崑山姿揆已信薄劣遭時易磷緇來復雖不逺往蹇豈能追孟晉終何迨罷歸聊所宜願言在弗諼援毫申此辭晩起花上露乍晞林端霞已照幽人倚户起春禽迎日呌昔苦束帶疲今知散髪妙方同嵇公懶豈顧管生誚夏夜逍遥避暑地𤣥夜敞隂扉凉風池上滿白露月中稀玉釵乍續墜翠斚不停揮淹留時未輟向曙乃言歸田中築舎修治樹藝莊生卧濠梁范子去海隅行止信難侔逺跡要不殊伊予慕棲遁脫冠歸里閭卜宅近郊坰葺宇就田廬南榮面崇岡北牖背幽墟雖非山水地取樂自有餘築牖仍先趾穿池即故渠林木盡舊行圃畦皆曩區寡欲罕所營衆羙亦云俱爵禄無常位貧賤有安居豈惟畏淹留得以免憂虞懽此平生情永言焉可渝晩出齋中園中明晦異日晏氣候齊餘光杳西傾圎景廻東躋叢木夾空廂凉颷扇幽閨梢梢隂籜飜翩翩夜禽啼羙人間遨遊即景自招携褰裳出北户杖䇿佇南階俯察雙渠涌仰視三星低真賞恒在近至鍳故不迷神往迹難留志存理無暌寄言山林客安用登雲梯冬初開冬肇時序時序異疇曩烈烈嚴氣升肅肅𤣥隂敞同雲匝阡陌凝霜被榛莽寒暑鍳迭代休咎究消長郊原值窮節庭户息群響疾病倦淹留寤寐縱偃仰感物殷懐抱離人絶心賞幽獨豈無悶至樂非外奨形變化隨逝意愜神俱往永解區中縁安排契真想除日悠悠天北運冉冉日西靡兹年俄且周薄暮亦云已端居撫辰序静言感化理時來變窮節事往乖壯齒託疾侔長卿歸田擬平子處困豈不難執操良足恃𤨏𤨏旅客志坦坦幽人履莊周貴達生伯陽戒知止尚公識損益賈傅辨憂喜在昔仰𤣥訓于今寤㣲旨即此怯塵慮因之蹈靈軌丙子十月二十八日初發鄉邑述征有作旅宦添從事卧痾輟歸田俛仰似昨日荏苒踰三年末路謝貞素積習慚夤縁整駕别鄉邑薄言重徂遷瞻途背梁宋振策指幽燕昔往遺維縶今來就糾纒豈伊行役嘆畏此平生諐嬰世廹物累撫化懐冥筌齊契百年内髙揖千載前慮存跡匪虧意愜道仍全斯言俟明哲因歌遂成篇憶句曲山寄顧英玉夙齡諷圖諜微尚寄邱壑神期雖未并斯𠂻固無怍江南僊靈地句曲奥且博孔記述形蹟河篇表經略青磴下﨑嶇丹壁上岞㠋靡靡被石􅌲嗈嗈戯雲鶴聞道甘閒曠養痾困疲弱即趣懷同好贈言負前諾巗廊竊已忝江海自堪託敢希東都金且訪西山藥苦暑朱明戒夏令大火次南國溫風有増響旱雲多異色宵眠惕朝旭旦坐望夕昃伊鬱不可聊恬曠何由得静勝昔嘗解神昧今始惑如何平生懐未建古人則感物百慮作遺生羣動息撫中俄有契履運似無即單生忌外彫張子患内逼幸是捐心累終然謝通識候大駕回西北収皇旅東南歸帝京山驅八駿下海汎六龍行後車環外區前駟集神坰支兵連四校中堅屯九營絳氣曵朱竿青雲生翠旌鐃歌綵吹激行漏玉鸞鳴入覲萬國至清宮群后迎金貂雜流景圭璧委繁星録功對五帝合符朝百靈俯窺地紐正仰瞻天柱平郊禋方展義升封將告成祈招羙王度長謡頌休明祀陵作幽陵首衆嶽朔海揔群川形蹟閟烏策圖象隠瑶編時晦貞期逺運開昌命先遷都既相宅遺冡乃登仙翠鳳舞丹阜蒼龍蟠紫淵叢谿杳藹藹積岨肅芊芊園塋環列隧殿寢被曾巔房御清以謐神路峻且𤣥悽愴山庭露蕭瑟松門煙光景緬如存春秋俄屢遷聖情鬱終古睿思藴遐年周衞物惟備崇樹禮仍䖍歲事展哀敬孝享竭明蠲百靈妥宗室九列翼皇筵秉德躬所闕陳歌志未宣曽是厠末位僶俛謝朝賢秋日署中簡諸君子新秋改炎節涼臻溽暑旋凄凄金氣舒昭昭素景鮮流風靡幽薄輕靄映澄川飄颻激楚吹眇杳泛蘭煙吏隠案牘簡齋居神想偏目耽霞上鶴耳玩露中蟬几席縱偃息纓紱謝牽纒卧閣趣無輟含毫興邈然西曹擅文苑蕭晨惜暮年徘徊錦帳坐吟嘯白雲篇望美勤徒結懐勞憂莫蠲賞心儻不隔答訊冀相傳贈饒平令曹先生炎方信巨麗海嶠彌光輝衝波迅交屬㫁岫崪相圍銅乳隠雲穴金膏被石碕青林互繚繞玉草競芳菲嶺戍接丹徼縣齋當翠微褰開盡洲島偃卧同巗扉髙閣祗自閉鳴琴方獨揮心和物皆定欲静神來依靈境邈難測異人㳺豈稀虚無翡翠盖髣髴芙蓉衣安邑儻可累吾将從此歸雨霽閒望池邊風嫋嫋竹裏影㣲㣲薄暮西山曲蕭條涼雨歸伏檻㸔秋色四睇亂清輝哀猿連谷響迷鳥隔雲飛朝市名仍繫林壑興難違眷言反初服蘅杜尚芳菲㸔月秋氣麗華月月華麗層穹餘輝稍熠爚流影漸曈曨臨水冩珠綴縈花映綺櫳蘭林團墜露桂樹鬱廻風佳人在何許咫尺限西東殷勤離緒濶寂寥懽讌空陸生北堂上謝客南樓中音息一以緬思心安可窮星漢屢淹薄展轉夜難終可惜芳菲節羇處怨飛蓬贈劉子緯朝與佳人期相望愁欲盡夕與佳人隔相思笑復隠西園佇飛盖東郊滯歸軫嚶鳴恱和響芳菲悲戚隕室邇怨鄭謡媒勞哀楚引抑念聊可忘含情詎能忍對雪簡崔洹野何大復清隂含洞房凄氣飄飛閣起視緑雲中白雪乍飄落紛紛集青𤨏盈盈舞羅幕𤣥沼涌珠花翠苑棲瓊蕚良辰眷恱豫幽居感離索有酒今若斯思君共斟酌雪後翫月作朝眠髙閣内吟弄風前雪夕登曲榭上㳺盼雲中月月出輕雲歛雪罷流風闋連輝有餘映縈光無蹔輟首眺懷乍新闌賞景彌絶雙隂相蔽虧並彩互明滅炎寒俄聚散弦望劇盈缺撫物亮固然孤𠂻異懽惙長安西門候朝隠隠夕唱傳肅肅宵車騖兹夜方向晨中心憚将暮朱華淪未啓瑶光儼初度絳霄麗明月素飈流藻霧嚴防限中禁周廬扄内附岹嵽北宮朝徙倚西墉歩曬目紫㣲宇蹀足玉堦路矯迹承華側徒慚班振鷺荅何大復宵懽不繼晨朝㳺豈延夕欵念未云周勞心彌已積篤好追昔悰興言撫今戚纒綿金玉音參差翰墨跡開帙虚雲閣臨觴闕瑶席惠思荷來章褰裳奉良覿月夜坐憶明月三五時流光千里外虚館風泠泠寒墀霜靄靄不見南樓客徒憶西園盖懽酒無盈觴憂襟有餘帯沉吟静夜思緬邈佳人㑹過孫世其館中傾暉隠䦨晷屯隂升初宵陟降並招携㳺衍共逍遥坐檻仰層穹披户聆清飈羅星照髙牖行雲動㣲綃旁眺稍闇闇極望亦寥寥即此蓄心賞眷言詠長謡訪史内翰不遇回車望雲㠋攬衣陵霧術山齋晩猶閉幽人朝已出拂石矚新詠窺牎覘散帙含情不可愬徘徊悵如失何中翰夜集寥寥𤣥冬夕穆穆北堂讌徘徊芳翰詠慇懃羽巵薦霧幌入鮮月風甍下㣲霰自顧恥薄虚何因屬深睠崔太史席上詠翠杯綺坐倦朝歡翠杯出宵酌月艶寫疑空雲光挹愁落碧醴共玲瓏華燈増照灼一得侍君閒終言厠醻酢詠御溝鴈太液春風起瀟湘鴻鴈歸照水翹圓趾隨波弄短衣曲池稲粱足上林矰繳稀由來江海性還從塞北飛雜詠六首詠風蛾眉簾下出春風花際來雲落髩間髪蟻轉手中杯華梁塵乍動羅幃影復開試将巫山雨吹向楚王臺詠燭客醉北堂上花生夜户中色亂歌梁月影暗舞衣風珠簾照不隔羅幌映疑空願得陪長讌相㸔曲未終詠屏風屏風十二曲羅列洞房隅雙環金屈膝四角錦流蘇蛾眉行處隠玉袖坐中扶因歌留上客翠盖少踟蹰詠蒲昔聞詠塘上今見翫池中紫茸含細蕋緑帶舞輕叢蜻蛉髙下逐翡翠往來通徘徊桂蘭渚竟日與君同詠萍參差如霰布的鑠似星出魚戯影初開鳥散文猶宻幸因雲雨㑹且免風波失無禆江海流徒謝芳菲質詠兎絲根株不自立枝蔓為誰飾偶同雜組文未比朱絲直園客何由整天女詎堪織暫附松栢枝終辭霜露色荅祝禮部屏居寡懽愛懐痾積悲戚勞君惠繁翰結言慰離析荒楚向踈蕪寒花方寂歴良辰已云暮清揚不可覿贈士竒允升暮春黄鳥飛始悲歡晤稀首夏朱櫻熟重嘆離居速離居何契濶沉憂鬱難豁君同汲黯疾予有相如渴偃息閉東軒扶杖一窺園遲遲雲日媚萋萋卉木繁素書既滿几清酒亦盈尊此時㣲二子賞心誰與論秋日感懐白露墜何早清風凄己寒今兹復秋日悵爾切悲端三十未聞道一官祗素餐區區諒無補惴惴詎能安撫已每多念逢時恒鮮懽徒然抱慙恨嘆息歲将闌舟行雜詩九首金門再捐佩滄洲一振衣沿洄歴秋水偃仰盻清輝塞鴈尚未發檣烏還解飛臨流聞楚調為我送将歸避地諒非願㳺吳或有託今我匪伊人心期偶如昨行役多憂苦棲遲詎為樂君㸔岸上蓬秋風益飄泊白露晩來生汀洲把杜蘅浮雲西北返孤客且南征習習野吹急沄沄川漲平徒㸔秋潦盡未可俟河清息徒指川裔繫䌫臨叢薄飄颻散襟帯風吹零露落俯折岸邊蘭仰聽雲間鶴寄言天路上共爾違矰繳秋雲翠可鍳明河景如髪川上夜寥寥徘徊望新月流光睇轉近餘輝攬還没念彼同懐人關山日超忽木落風雨夜水生蘭蕙洲已值清秋日旅客思悠悠感時臨歲晏惜逝對川流此際亟歸去蕭條難久留行子怨路長長路方漫漫前瞻但雲霧却聽空波瀾銷憂命懽酌取樂興哀彈安得晨風羽紓我懐歸嘆朝辭枉渚汭夕騖清川路經過方自今神期宛如故沉吟招隠曲徘徊逺游賦西北有浮雲行行一返顧桂嶼饒涼吹蘭臯足素氛鳥疑沙上霧魚避水中雲寥廓有欣矚蕭閒無厭聞行将入江海長對白鷗羣郭外治宅抱瘵謝交游棲閒避紛濁郊廬未云逺已覺心綿邈屏居聊寄拙營室惟從檏茅茨無結構房櫳罕彫斵門庭褊蕪穢牀帷多蘚駮方因遁蓬蓽更欲菑磽埆灌園希仲子易農哂方朔無云尼父譏遽鄙樊須學詠料絲燈淮南玉為盌西京金作枝未若兹燈麗擅巧昆明池霏微狀蟬翼連娟侔網絲煙空不礙視霧弱未勝持碧水㸃葱鬱彩石染萎㽔霞疊有無色雲攅深淺姿焚蘭發香氣對燭映紅滋明月詎須侈夜光方可嗤游西郭向晩思觴酌西郭翫芳菲風花半未落林鶯猶自飛殘景初移席凉氣稍侵衣褰裳及将晏無使露中歸首夏寥寥塵外意更對蕭然境竹竦檀欒葉雲起嵯峨影跡幽疑避喧神虚匪耽静嗒爾此端居唯知晝方永冬夕空齋生夕靄俛仰俄清絶開帷翫光景就檻看雲月寒條響哀吹曾林皓餘雪懐人不可見徒令自怡恱曉坐齋内近曙早鶯喧乍暖游絲宻稍稍竹待風紛紛花就日臨堂㸃芳翰披衣翫仙帙頼此自多娛蹔緩幽憂疾郊館夜雨旦初霽郊館試窺臨東風急花水朝日麗雲林多景毎難遇幽期還易尋端由來序速倦思坐相侵始還别業春際游覽結宇帶層曲列牖俯雲湍幽篁上交錯恠石下叢攅春際聊騁望園中皆可懽芳林秀丹荑緑水散清瀾余本支離者平生兹考槃淪飄從逺役留滯守微官言邁祗云易思歸方慮難悵然廹遲暮五載始投冠迨此尋棲息復得遂盤桓撫心殊已愜日夕廢朝餐西郊清曠自有素寧獨在幽深誰謂西郊地宛似南山岑四野多景色青春晴復陰鮮雲冠緑苑廻飈翔翠林寢疾託閒逸即趣恣登臨嬰累悼自昔取適懽在今豈嗟時易頺但顧樂難任穿池玩游鯈種木候鳴禽将營人外賞聊賦邱中吟行園巾駕入邱樊披榛理園囿前臨古墟路却望清渦曲經營闢池舘周流羅卉木風落繽紛蘂露冒葳㽔竹窈靄殊冬夏寂寥異昬旭野隂當晝暝水氣先秋肅少壯旅衣冠疲病歸農牧蹉跎任情性蕭散諧心目雅懐名山意益厭人間俗歲晏終如何行行訪巗谷郊居作池籞鮮珍鱗樊籠多鎩翮物情忌窘束人事傷紛迫拙薄謬榮塗踈慵謝朝籍銷聲背諠競息影投幽隙邱園雖寂寞悠然殊自適徘徊弄文史流連眷泉石神輕片雲上目瑩清川激蓬嶠宛相聞滄洲如在覿未申隠淪志稍習湛㝠跡外慕非所希聊用終晨夕曉出東田遂游溪上鳥鳴曙色至雲収春氣鮮寐覺啓南扉顧歩出東田遇賞乍淹留乘景更夤縁折芳順蘅薄渉水弄珠泉感來憂已忘神往樂俱捐窅黙任真㳺蕩瀁契靈筌何待崐邱上騰化始為賢齋夕觀書每成倦徙倚憑齋閣煙景翳山池春隂歛花蕚衰侵迫惆悵節變乖行樂不有恬然想何因堪寂寞暮春園中作荒徑入園墟經旬曠游渉林飄依檻絮蔓引横階葉春䦨意已倦風晩花如怯憮然閱徂景彌使憂相接對雨病困怯炎蒸隂雨差相慰芳林洗花蘂緑野籠雲氣坐憶郭西池芙蓉定開未荅顔惟喬俗紛倦城肆放浪懐林莽命賞來芳訊探竒恊幽想蕭條南苑際中夏猶凄爽雨霽緑泉生風驚白雲上禽魚行盼睞水木坐俯仰梁棟下隂霏房櫳逓哀響淪飄病轉劇偃蹇年日長名山仍未去末路竟何往故人念相慰賤子擬自廣旦日佇登臨願言操几杖游城南園林用開襟濯寒水為韻崇邱亘中野逶迤似層臺斜攀隂磴上下見涼雲開對酒已判醉無勞歌管催徙倚蔦蘿逕徘徊松桂林尋雲延逺歩窺水瑩幽襟㣲子共行樂終然孤賞心别苑命飛觴平沙徙行幄藉蘭初觧帯拾蘂俄盈握廻策歩前溪塵纓仍自濯麗札昔相約名園今共看雨苔晴亦濕風篠夏猶寒永日倦髙宴清歌時向䦨日落風景佳中園霽氛滓輕雲染松色清露飄蘭蘂新暑漸炎蒸重來翫溪水城西亭子宴集用桂棟留夏飈為韻逐涼向何許平臺俯煙際青臯杳重疊素水縈迢逓酒冷渚邊雲衣芳苑中桂一遇林下期仍偕塵外契攀林摘朱果汲井牽瑶甕涼風拂露榭清氣流雲棟四時俄轉瞬萬緒紛如夢相顧各喟然中飲可辭痛抱痾慨獨卧恣興欣同遊搴芳薜荔苑窺鳥鵁鶄洲日暝石潭浄風涼雲樹稠坐看夕景晏與君仍暫留幽渚携風策層阿息煙駕亭亭荷照景嘒嘒蟬吟夏低徊悟形變索莫慙時謝自縁心有念臨觴屢驚咤永日避炎暑中園屏煩囂登危乍悽愴臨逈更蕭條積水含宻霧空林送新飈眷言攄幽抱援翰賡長謡八月十四日夜餞伯昭五首以圓景早已滿為韻秋堂慘别酒夕幌傷離弦酒停弦亦闋乍睇望舒圓窈窕度清漢空濛浮素煙此時一弭思再徙風中筵筵徙杯復傾風罷衣猶冷懽意始依依憂心終耿耿兹遊並偶坐後别侶孤景婉孌惜流光攜手夜方静静夜未遽央華月出尚早㣲氛映脩竹皓露散芳草殷勤遲暮日緬邈平生好及兹蹔晤語安能寫懐抱抱懐不可冩徘徊詎云已漸聆寒漏促屢顧清隂徙宵深河歛素曙近雲成綺願子引餘觴為别悵伊邇邇别非久淹征駕憇南舘黯黯金波滅離離玉繩斷緒言殊未竟積思俄已滿行矣念相慰裁音兾無緩郭外置酒命交游巾車向城郭徘徊空野外樂緒翻蕭索凉風變雲日白露驚川薄秋水増烟霧衰林半揺落良時一若此人生詎如昨援琴寫哀弄停觴罷懽酌愧彼忘情者孤悰似無託寄劉希尹代馬怨殊羣越鳥懽同族如何平生愛分背乖心曲悠悠間鄉縣冉冉踰凉燠念子行寡偶我居亦㷀獨疲痾蹔逃位饑寒方殉禄出處雖未同身世均羇束山林鮮疵吝市朝多寵辱寄言訊之子遲望歸來躅夕詣郊外久瘵積幽抱端居乏讙趣日夕覽郊園俛仰増愁慕林静動風飈川逈來雲霧征蓬駛且斷棲鳥驚還聚感物悟時變憂生測年暮衰顔漸已迫稚齒誰能駐淹留歲方晏沈吟日云屢有懐空若兹無聞良可懼晩遊