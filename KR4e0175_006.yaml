body:
  text: 考功集巻六明薛蕙撰五言排律送周子賢按貴州萬里牂牁路炎洲百粤南懸梯穿鳥道流沫下龍潭赤坂黿鼉出𤣥崖日月含虹霓蒸海氣煙霧灑春嵐飛􅚦緣篁竹垂猿墮石楠橘花香細細藤刺緑毿毿嶺外青驄馬臺中白筆簪秦冠髙鐵柱漢節照金函行邁應多暇登臨素所耽江山吟謝客物色助清談送逺都無緒憂時且不堪安危廷諍地遲子促朝㕘飲何太僕答贈金馬棲方朔文園卧長卿何人今繼作夫子早知名曠世同諧遇憐予似弟兄羊何叨唱和王蔡忝逢迎酒縦連朝飲詩留向夜成扳歡意不盡真見古人情送許侍御謫定州志士宦不達千秋同一時今看許夫子竄逐使人悲才大元相誤名髙只自危恓惶千里曲惆悵四愁詩北望闗山阻南飛羽翼垂平生懐感激送爾益悽其送劉長輿劉子今年少文章欻老成青春動才調摠角已聰明父黨同交輩前賢畏後生翻然兼鮑照不啻似隂鏗歴代流傳體千秋著作名詞塲予有託他日爾横行寄題延陵吴長史山居魏苑芙蓉沼梁臺脩竹園徐陳游上國枚馬託名藩歌賦從容地追隨優渥言病來謝賓客歸去卧丘樊巖穴仍招隠風塵稍避暄山疑七里瀨水似武陵源背渚排江閣迎峰架石門波瀾生枕席彩翠落琴尊鴻寳傳遺術離騷念舊恩秋風懐帝子春草憶王孫勝事幾人共賞心千載存相思隔雲外挂樹屢攀翻游天壇沈道士館得登字屢憶尋真地秋來興可乗仙人偶相約才子更同登晩日餘煙霧涼天減鬱蒸金莖生片露玉井濕殘冰水對瑶壇直山圍翠樹層靈宫七綵帳深殿百枝燈過澗窺泉脉攀崖步石稜雲扶上縹緲風引入凌兢浪喜追遊並猶慙作賦能醉中操翰墨應仗酒如澠過魯山禪師故院世傳師講經雨花因題斯句昔聞魯山子此地講經年長者開精舍門徒聚法筵上方迴錫杖髙坐發香煙指㸃楊枝拂翻披貝葉編辯才超正覺慧照破冥筌解脱周塵界光明徹大千山川震十地龍象見諸天梵樂流雲下靈花蔽日懸我生惟率爾彼岸轉茫然學道慚餘齒尋師負宿縁繩床無虎卧畫壁有蟲穿隙網垂銀樹隂苔綴石蓮神燈風已滅仙鏡月空圓隨喜乖三㑹含悽向四禪真乗仍自蔽疑義竟誰詮稽首西來意非公那復傳送劉遵教赴河南僉事兼河北兵備暫輟臺中妙兼分閫外名兩河開幕府萬里作長城郤縠真堪帥穣苴本善兵追奔立表待傳檄據鞍成盜賊空三輔烟塵掃北平閭閻無夜警部曲有春耕風勁吹龍角雲輕抱翠旌遥占猛將氣偏逐使君行寄崔内翰病起身仍健秋來興不孤心情那可減肺氣欲全蘇蟻穴依床席蛛絲織畫圖褰帷窺物色倚杖理荒蕪撥悶憑詩巻忘形付酒壺昔賢遺軌躅餘力誓馳驅良史傳經術髙才繼典謨赤鯨凌海水翠鳳上天衢仙籍通羣帝文星近六符馬遷慚實録劉向謝醇儒𤣥覽來神契㝠搜入奥區蓬萊披琬琰太乙下虚無顧我惟書肆知君類説郛憲章崇闕里辭賦陋鴻都東魯宫墻閟西京户牖殊百家流氾濫六藝混泥塗未覩崩頽振深思筆削扶飛騰愁失墜衰颯迫號呼落落親朋逺悠悠嵗月徂提攜如有分終願託微軀寄何中舎翰墨何顦顇英靈有屈伸千年闗氣運一代出精神夫子興篇什聲名動縉紳波瀾含詭譎刻陗露嶙峋李杜那堪數曹劉不足陳無人宗大雅舉世儗凡倫文學元同列風騷自有鄰新章標創始舊例起湮淪已覺空前輩懸愁絶後塵價卑皆咄唶力怯謾逡巡綺麗才難並湛𡨕道所珍逍遥歸毋氏杳𦕈入天人霄漢心常逺神仙意獨親緒言存著作大業負經綸蹤跡升沈隔交情契合真過逢頻下榻離别據沾巾去國仍初服還鄉似昔貧丹房天上藥酒肆世間身青璅辭通籍滄洲憶問津儻逢桐栢隠訪爾故山春北狩秦皇巡海右漢武幸闗東昔悵千秋跡今看萬乗雄期門陳後苑清道出離宫霧遶旄頭黒塵翻豹尾紅天營屯斗極御氣下雲中射獸閼支雪焚山瀚海風繫纓驅散卒載筆扈羣公此日燕然石長刋北狩功寄范處士萊子不肯仕榮期豈患貧絶塵今莫嗣髙尚爾為鄰抗跡違紛競和光異隠淪鷦鷯見生理鷗鳥㑹天真栖息丘園曲行歌湖水濱白雲無盡意滄海自由身放曠欲何極沈㝠難可親薄游已從告去去逐幽人賦得張公洞夀吴封君羽客尋僊地靈丘開洞天雲根宛自裂風穴遞相纒合沓藏丹磴玲瓏散紫烟珠林秋不落赤日夜長懸鳳吹俄云去龍車豈再旋福庭還似昨真氣獨蕭然石坼燒金竈苔荒種杏田非公復棲遯閴寂此山川除夕作日夜遞無隙此生行且休即看寸隂戢遽惜一年周夙昔好棲遯至今仍倦游衆皆嗟晩暮吾獨事淹留天地兵猶滿形骸病未瘳欲従吴市隠尚抱杞人憂偃息信為愜功名非所求河清如可俟徒願老滄洲閒居作拙薄效從宦孱羸希代耕終然塵省署且復返柴荆出處詎従道浮湛聊任情病多甘廢棄技短息逢迎越海慕康樂游山懐尚平何時果林壑偃仰遂吾生至日寄都下舊游嵗杪迴陽候天涯思客心闗山愁裏濶雲物望中深卧疾妨朝隠歸田分陸沈盤桓寜自負衰謝苦相侵有志悵伊昔無成嗟至今未能通一藝詎解惜分隂荏苒看窮律蕭條對故林蓬蒿滋户牖霜雪壊衣衾失侣方離索迷塗更滯淫因聲青𤨏舊聊代白頭吟嵗暮田居寄子雲希尹踈散棄簪裾歸休依井閭自知非宦侣雅意是閒居伐木構新宇種苗開舊墟踟蹰寄農圃出入偶樵漁嵗晏風霜早田家耕穫餘空牆懸耒耜敝篋貯詩書談笑過隣父喧呼避里胥綻衣添敗絮酌酒爨枯魚揚子貧猶在嵇生懶未除駑驂忘蹭蹬落羽謝吹嘘嘿嘿寡同調悠悠無起予近來思二仲相念復何如庚辰八月謝病南歸奉寄王浚川先生三十韻聖代𢎞文運詞臣作頌年聲明増潤色藻翰鬱聫翩側席思今上登朝集衆賢儒林卑漢武雅道復周宣後進争談藝諸公早並肩風騷各自命碑版竟誰傳王子吾師表名家爾最先過都驚汗血切玉辨龍泉西掖初遷謫南臺再棄捐才髙無汲引數厄有屯邅流寓沿荒徼棲遲徧冗員山城盈瘴癘海郡匝雲煙寢息防多恙行吟苦未便湘纍愁澤畔康樂倦瀛壖履信曽非慊阽危幸已全梁園歸倉卒蜀道去寅縁雅興應難輟新詩定可憐銅梁輸險絶錦水奪清妍岐路彌云阻音徽日眇然使車勞促遽郎署困沈綿時俗知音少平生激賞偏素心乖報國生事擬求田黙黙辭燕闕悠悠望劒川黄金遺駿骨緑綺絶哀絃薄宦情殊倦閒居病稍痊風塵俱擺落巖壑毎周旋采藥臨蓬渚藏書入洞天珠林搴的皪丹液漱潺湲遥憶峨嵋曲長歌鳳鳥篇何當解纓紱蕭灑共尋仙恭讀嘉靖改元詔書十二韻四海艱虞日孤臣慟絶時武皇遺後命興國兆前知劒佩迎朱邸絲綸發玉墀訏謨闗社稷恵澤被惸婺矛牙九廟垂𤣥貺三靈翼聖期飛龍同利見鳴鳥佇來儀當代鴻圖永先朝泰運衰羣兇累帷幄萬姓苦瘡痍哲后膺神器宗臣備鼎司惟新占舉措早辯慎安危魏闕心空切文園病轉滋淹留吾不恨感激自成悲寄劉士竒王允升戴宗道張時濟四同年三十韻往與諸君同在比部衰劣今如許飄零復在兹故人多契濶新嵗獨凄其棄置曽誰惜龍鍾亦自嗤端居衣倍冷徐步杖仍遲日日驚腰帶星星歎鬢絲膏肓危二竪營魄蠧三尸枕席祇勤卧尊罍輒懶持鶯花憎麗景煙月負幽期夙昔游燕闕風流集鳳池朝回青𤨏闥宴坐白雲司覆奕􅌽王粲聴琴狎戴逵季鷹元嗜酒公幹最能詩夜對金壺滿朝褰錦帳垂琳琅光炤爛鴛鷺羽參差攜手彌年嵗銷䰟各路岐神交猶未隔心賞遽難追諸彦名逾振孤生世所遺軒裳辭上苑泉石占東菑林下開蓬徑牆邊樹枳籬山窻盤薜荔水檻宿鸕鷀放浪情難盡躋攀力已疲積痾真潦倒壯志稍磷緇汲汲虚従事冥冥寧守雌蹉跎淪散地馳騁後明時多病文園老無媒賈傅悲丹霄看漸逺滄海竟何之雅調懐鍾子髙談阻惠施青萍羞晩售紫燕苦長饑不啻傷遲暮那堪怨别離茫然萬里外一札報相思出行四圖為何燕泉先生作西域防胡日南宫動使星舊分雙赤管新佩一青萍隴月傳兵候闗雲結陣形千金收虎士萬馬蹴龍庭方略隨封事文章待勒銘應嗤班定逺頭白遲邉亭右職方奉使六省今名士三川古劇藩含香辭禁闥揚節下都門王跡餘京洛戎風變陸渾疲人迎皂葢小吏擁朱軒列郡謳歌滿中朝錫予蕃仍聞詞賦手文采擅梁園右藩省旬宣沙苑禁城隈天閑十二開欲脩羣牧令還倚列卿才照野雲千色填山錦萬堆鑄形珍漢闕市骨笑燕臺大閱軍容壯横行敵陣摧始知中國富不假大宛來右太卿考牧明主憂荒服中丞按逺陲西臺分節鉞南極駐旌旗包匭輸蕃使衣裳變島夷神留碧雞頌吏譯白狼詩羊傅襄陽樂文翁蜀郡思知公同二子遺愛向滇池右都憲巡撫送顧華玉邉廷實歸南都邉顧文章伯聲名三十年價髙雙白璧調逸兩朱絃憶昨初傾葢看君早著鞭龍門愁峻絶驥尾慕寅縁中嵗逢迎阻清宵夢想偏盍簮重見日鳴玉並朝天置酒春壺滿題詩錦字連城隅方曲讌陌上忽離筵言送東南美真如李郭仙望塵悲往路臨水惜徂川吴㑹浮雲外燕京落日邉相思日延佇須枉濟江篇送王舜夫水部之東魯官廨曩昔詞林客偏多水部郎于今嗣風雅吾子欻翺翔東郡分行省南風引去檣山城蟠海㟁官閣浄湖光宛似幽居好翛然燕坐涼定知題詠富未覺簡書忙吏隠情都愜登臨興轉長新詩如不惜細札莫相忘送楊石齋社稷功成後山林避寵年遭逢誰可並出處獨超然反側當前日經綸邁昔賢殷憂興聖主至治格皇天凶竪同摧朽蒼生盡解懸廟謨隨指顧臣節見周旋智勇千夫敵勲勞百辟先賞仍虚裂土名已重凌煙握璽慚周勃揮金笑魯連急流嫌盛滿介石慕貞堅許國心恒切還鄉興偶牽留侯初相漢樂毅晩辭燕異渥絲綸數髙風進退全草停黄閣詔花簇錦江船水檻星橋側茅堂雪嶺邉雲霞深緑野卉木富平泉事業存鍾鼎儀刑照簡編累朝瞻翊戴四海憶陶甄白首歸休記青春送别筵衣冠望行色端不異登仙贈白貞夫往日延陵郡曽聞白傅園林間三徑僻水上百花繁北闕恩彌渥東山意獨存風流思二老文雅見諸孫門閥今吴邑衣冠舊洛原傳經期取相懐古寓名軒髙卧方求志幽棲已避諠煙霞常閉户賔客暫開樽世業看前代賢聲在後昆青雲殊不逺努力早飛飜丙申嵗始見二毛賦詩紀之行年五十近衰鬢二毛新稍異無聞者難同久視人生將憂作對老與病為隣浪覔藏舟壑徒成汲井輪此身非汝有外物更誰親白首終何益降心習浄因夏日郊居偶書十韻郭外漁樵徑丘中隠遁居閉門三伏日堆案數函書俛仰嵗過半登臨興有餘賞心吟不愜物色畫難如髙閣雲峯麗横塘水鏡虚迴風揺緑籜落景歛紅蕖滿眼多情在雙眉一笑舒壺觴祗自酌魚鳥盡相於衰疾宜調䕶紛華更掃除永辭朝市客髙枕卧田廬考功集巻六
