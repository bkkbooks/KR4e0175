body:
  text: 考功集卷九明薛蕙撰書答王浚川書鄉者王揮使來獲奉教劄甚慰復承示所著慎言二册伏讀纍日不勝欣服如吾先生獨智自得究天人之際立言明道擴聖賢之指當今之世一二人而已生平日億料之言於高論頗多暗合竊自幸其所見略同也然有不同者顧在於一二節目處不敢不盡言以就正况先生命之使言乎伏觀所著書前二卷其於性與天道詳矣然其要歸大槩以氣為理以生為性此於愚見不能無疑者也竊惟性與天道孔子所罕言而孟子則往往道性善夫孔子罕言者非不欲言也以學者之未可與言也孟子之亟言者不得已而言也懼性學之將亡傳也及孟子之後其傳竟絶者千有餘嵗至宋二程子始能推明孔孟之論然後性與天道之說復聞於世故世儒之言理者皆宗之如吾先生蓋亦宗程子之學而有得焉者也今者之論殆與程子之論不合矣古之君子其論議固不能盡同至於大本大宗則不可不同耳程子曰隂陽者氣也所以隂陽者道也未嘗以氣為理也夫氣化終古不忒其宰之者理也以氣為理不唯二本而無别氣有駁雜理亦從而駁雜矣理有駁雜豈足以為萬化之根柢乎生之謂性程子取之蓋指氣稟而言耳其推本天命之性則卒歸於孟子性善之論未嘗以生為性也程子生之謂性一條今人多錯會望再詳之人生氣禀有善有惡天命之性則有善而無惡以生為性則人性之惡果天命之惡乎夫天命有惡何以命有德而討有罪君子遏惡揚善亦非所以順天休命也復有一段謂大學心無忿懥恐懼好樂憂患則大公至正而無偏倚可謂之中疑中庸未發未足為中此亦有所未安夫中庸所謂未發者性也人心自然之體也大學所謂有所忿懥云云者情也人心繫纍之私也有所者私主之辭也忿懥恐懼好樂憂患者情勝之辭也二書之言各有所指其言之大小精粗亦有不同姑合而言之亦可通也此心未發之時本自中正茍發而無私情之纍則無往而不正一有所纍則不得其正其不正者情之偏也非心體本不正也若論其極則大學之言但可以言正未可以言中何者聖賢言中正有其義同者有其義不同者程子所謂中重於正中則不違於正正不必中是也然凡所謂中者類皆止於就事而言是乃中庸時中之中非未發之中也以此觀之則大學所謂正者特中正之正而非時中之中况未發之中乎又曰中庸以喜怒哀樂未發為中無景象可以體驗程子曰言存養於喜怒哀樂之前則可若言求中於喜怒哀樂未發之前則不可蓋當此之時但可主靜以涵養而不可容心於體驗才有體驗即是已發先儒有體驗之說教人於此體究其辭不得不然不以辭害志可也又曰聖愚一貫安知其為中夫四者未發性也此心之本體也不假人力自有天然之中固不以聖愚而有不同也但衆人亂於情而害其性私意萬端乍起乍滅未有能造未發之域者是則聖愚又有不可得而同矣昔程子論中庸以為孔門傳授心法而六經論孟顧不與焉是必有說矣又其言雖統論一書之體而其致意實專主中和之義就二者而言之未發之中又其尤致意者故曰放之則彌六合卷之則退藏於密蓋謂此也不然則六經論孟之所載孰非聖人之心法耶自孟子之後儒者之知言未有如程子也其尊信中庸如此豈茍而已哉先生素尊信程子於其不合茍深思而求其說不唯未發之義可判然無疑而凡理性之論亦必將始異而終同矣蓋此三者其實一也先生之言曰人心有物則以其物為主應者非其物則不相得矣不戾於道者幾希又曰夢較勝否斯驕吝之心未滅已先生察理之精持論之平有如此者生之瞽言夫何足采第自充其言無以心之舊物為主於此三說更加思索以求真是之歸此生之至望也非先生之過愛亦不敢僣妄如此其差謬者願終教之不僃再答浚川書日承賜書恕其僣妄而誨之諄諄幸甚幸甚且曰倘猶不相契望更來復此固生之無隱於先生之志也先生願為程子之忠臣生之前書意正如此是以敢進其說乃其不韙不合者由其識見之有極耳然持夫淺陋之見而顧恐先生立言之未盡其事則誠過矣而其心則忠臣匡救之心也惟先生察其區區而終教之幸甚宋儒太極隂陽之論自朱子之後益詳然其說顧有不一者蓋有以為有此實理始有隂陽畢竟理在先氣在後又有以為才有理便有氣才有氣便有理不可分其孰先孰後者竊嘗思此二說要以前說為定論而後說亦不可廢爾蓋即理氣之無間而合言之則理動氣隨以生氣生理隨而在二者有則俱有如形影然是後說亦有攸當也究理氣之本末而析言之則理者生生之原微妙而無形者也氣者生生而有形者也理亘古今而不易無始無終者也氣之往來無一息之停往者既終來者復始者也夫天地之始今日是也故觀乎一日之運則天地之始猶是矣今夫一日之終今日之氣既往而遂盡矣明日之氣其何自而來耶以有生生之原故其來無窮耳小而一刻大而一嵗皆然也人物之形化草木之萌生皆然也此理昭然不可誣者是則後說之所以為定論周子曰太極動而生陽靜而生隂豈非理先氣後之說乎但後之儒者復為他說與之相駮耳今先生之論雖復與宋儒異然欲辨之則亦不外於理氣之先後而已先生曰元氣之上無物夫有形之屬其始固未有形也則其生也必有為之根柢者矣以此見有形者不生於有形而生於無形之道此不易之理也夫氣亦有形之物耳謂其上無物生未信也夫子曰逝者如斯夫不舍晝夜氣之為物也生生化化逝而不止者也非有生生之原往者已過而無來者以繼之則其機息矣天地之間未有不逝之氣彼猶不足以自存尚何能為元元本本之物耶先生曰道者空虛無著之名何以能動靜而為隂陽是幾於談虛駕空者夫道者無形而實有者也故程子曰天下莫實於理形可以言空虛而其理非空虛也必其有形而乃謂之不空虛此可以論物之粗者耳非可以論至精之理也易曰形而上者謂之道神無方而易無體作易者亦談虛駕空與有太極而後有動靜有動靜而後有隂陽知其為生生之原則知其為動靜隂陽之本矣先生曰人有二性此宋儒之大惑夫宋儒所謂氣質之性蓋以此性寓乎氣質之中故謂之氣質之性非謂天地之性氣質之性為二也先生以易之窮理盡性以證性理不可為一以孝經毁不滅性以見古人論性類出乎氣以孔子性相近也以言性必有惡而非孟子性善之論此皆疑有未盡者易謂窮理盡性以至於命固一物耳曰性理不可為一則性命容有二乎孝經毁不滅性正訓為生然其本意非在於論氣論理也其曰天地之性人為貴亦猶滅性之性既不可以訓理亦不可以訓氣如書曰犬馬非其土性不畜詩曰俾爾彌爾性傳曰少成若天性皆與孝經相同蓋古書性生二字多通用耳性相近也習相逺也非專為言性而發所以知其然者以其言歸重乎習耳儻如孝經性字之訓則曰生相近而習相逺尤可通也抑論語之書夫子之言性者獨此一語耳意者夫子之微言非止於如此而已子貢曰夫子之言性與天道不可得而聞也觀性與天道之言則可以測天人性命之一致而子思所謂天命之性孟子所謂知性知天者其師友淵源端有所自矣觀不可得而聞之言則其理之淵奧固非近於人情而其為說亦豈片言隻辭之可盡哉以此言之則性相近也之一語豈其所謂不可得而聞者乎固不類矣今先生論性獨據此一語為張本以言性不必善曰吾獨取夫子之論也然則人之生也直亦夫子之論也且詩書者夫子之所述也韓子所謂合於道者著之離於道者黜去之是也至於贊易又多夫子所自言此三經者其言性善蓋衆豈可專主一言而盡廢其餘哉先生曰性與道合則為善性與道乖則為惡性出乎氣而主乎氣道出乎性而約乎性無乃主反為客客反為主乎又别道於性析而為二所謂道者其何物耶如曰道出乎性者也非性自性道自道也又何以謂性與道乖而性之為惡耶生反覆思之而未通也先生謂古人論性類主乎氣故以性為有善有惡生則謂古人論性類主乎理故以性為有善而無惡蓋古人曰降衷曰秉彞曰明德曰德性曰誠曰仁此其為理為氣為善為惡殆亦不難辨矣先生曰性者生之理也斯言雖與先儒無異而意實不同夫生即氣質之謂天命之性雖具於氣質之中而初不雜乎氣質性即理而氣非理此先儒之說也先生則謂性者即是氣質所有之理非别有天命之性不屬於氣質者凡先生持論異於先儒者其要指在此而已夫天命之謂性天即理也不曰理而曰天又以見其統於一也凡人之性皆同出於天理天理無二人性無二是一本之說也先生言天道主於元氣之神而不以天理為宗其言人性亦惟主氣質之理而天理不與焉夫言性之理而不本天理徒就人之氣質而為言彼人之氣質其善惡固不一而所謂理者即如之爾若是則人各為性性各為理紛紜錯雜無所統一然則天下果一理乎果二三其理乎夫道一而已矣性即理也理即天也統之以理則天人無所不合本之於天則斯理有所從出先生專主乎氣不唯天人不相合其所謂道出乎性與所謂生之理者其道其理果何自而有耶是無本也又人之所以與天地並者惟以此理之無二故也如以氣而已自人而觀天地其細甚矣焉能與天地相似參兩間而為三極耶凡此皆斯理可見之大意可觸類而長之又有聖賢發端之緒言可致思而得也先生聰明絶人極深研幾宜於此判然而無疑今其為說顧或有所不察此其故何耶良由偏向氣質之說而不知其非故遺置天理之論而不知其是古人曰東面而望不見西墻蓋謂此也竊見近日諸公以氣言性而絀性善之論者紛紛而起生方欲先生講明此理為孟子程子之羽翼以息紛紛者之說以解天下後世之惑不願先生復為諸公之先倡也先生曰宋儒參伍人性而不合乃復標本然之論於氣質之上夫宋儒以性善之論於人才昏明強弱之不齊有所不該乃復出氣禀之論以足孟子未盡之義故曰論性不論氣不僃論氣不論性不明但其言氣又未免過重而不思昏明強弱之不齊蓋繫於習者甚多而原於氣禀者甚少亦頗失性相近習相逺之指矣是則氣質之論實起自宋儒非若先生之言也至於未發之義亦有未相合者先生舉鄙說而斷之曰是愚人未發必不能中生之前說謂衆人私心紛擾不能未發耳非謂其未發不能中也茍能未發非中而何蓋子思之言本以未發為主其曰中者正指名此未發之體耳細觀先生之論顧乃以中為主離未發而别求夫中此不合於子思之指也先生曰無景象可知其為中今日未發之時本自中正可再示本自中正之象夫未發性也性即天理也天理完具人欲不萌其有不中者乎程子曰喜怒哀樂未發何嘗不善言善則中在其中矣然求其景象則有不可蓋情之發乃有景象既曰未發顧欲求其景象可乎夫言中而求其景象亦猶言道而病其空虛也先生曰人心未發皆有天然之中何至應事便至迷瞀偏倚此則體用支離內外心跡判然不照非理之所有非思索精切不足及此然此固有說也夫未發性也事感而發情也性無不善而情有善有不善正以應其事者有不同耳蓋應事之時不役於形氣不誘於外物則情得其正而為善其未發之體固如是也私已撓之外物牽之則情思為不善非其性之本然矣非歸善於性諉惡於情體用內外判而不合也性之發為情情之不善即性之不善也特汨於物欲而易其本然耳故孟子曰今夫水摶而躍之可使過顙激而行之可使在山是豈水之性哉人之可使為不善其性亦猶是也竊嘗以為知性之要莫先於未發知未發然後能知性知性然後能知天故生之前書謂此三者其實一也意蓋如此心者萬化之本原而未發也又此心之本原古人以為天下之大本信有以哉顧其事至近而其理至微誠可謂測之而益深窮之而益逺者區區平生苦心之所得惟以此為第一義野人食芹而美故欲獻之願吾先生虛心觀理無忽於不合之言反約窮源徹見乎未發之域則夫天地之大聖賢之理可以一貫之而無遺此生之所以為報於門下者凡來教之言不能盡復其大者略具於此然已不勝其多言矣伏惟不罪其煩瀆而誨其不逮不僃答崔子鍾書去歲辱書兼示中庸凡以無便久不奉報生之蔽於佛老而好其說吾兄不棄絶而教之誠愛我欲有益於我也顧生之好其說者以其合於聖人之道而好之也使其不合於聖人之道生雖不足以望知言者然亦不至為其蔽惑也書辭有宜辨者念雖辨之必不能奪兄之所執故不敢復為煩瀆俟他日奉訪相與極論數日倘高明之論能使生之論絀而惑解敢不承教凡所謂講學者務去非以求是耳茍是非既心喻笑何為是之不從而顧自安於非耶伏讀中庸凡其文典則閎深可方古人今人不能為也然其指義頗有不合於聖人者試以愚見商略之以請教竊聞中和之說乃中庸第一義蓋千聖心學之淵源也故程子以為孔門傳授心法而他載籍不與焉正謂此也延平先生復推明未發之中其說最詳而朱子以為龜山門下相傳指訣自延平之說傳而後中庸之道益明程子之言益信鄉微延平則程子之微言世或莫知其所指而中庸之大義隱矣抑延平之說雖自程子發之其實中庸之書固已特異其辭以見意故曰中也者天下之大本也其意斷可識矣是則未發之中實中庸一篇之綱領豈唯中庸為然凡六經之言豈復有加於此哉今吾兄之書於前標注既不喫緊言之至於十論亦復遺之何耶夫說中庸而遺中不猶說論語而遺仁乎其曰凡事可者謂之中中之名義取此生之所未喻也道論曰非别有物而綱紀乎此則是易有太極之說非而天地萬物無本也理論曰後之言理者括萬有包四端則是萬理不通會於一理也性論曰安得獨咎於氣則是理有駁雜之理人之善者乃逆天理也以孟子性善為踈以韓愈氏三品為能發聖藴生之尤所未喻也竊觀兄之名理雖考信於六經之說而實主之以六書之文兄之言論往往過者此其病源也字說足以明道孔門當為說文矣六經說理之辭非不時有合於字說其如不合者之多耶小道可觀致遠恐泥正此之謂也夫謂古人制字假物以命名不猶作易者假象以明理乎象之不足以盡理不猶物之不足以盡名義乎六書有轉注假借一字而數物用之不以一物專一字也至於訓詁則又隨事釋義一字而數說訓之不以一說蔽一字也文字訓詁猶不可執一而言也而况施於文辭其取義也可執一而言哉必曰道為大路之道則夫形而上者謂之道不可通也必曰理為玉膚之條理則夫窮理盡性以至於命者條理云乎哉易曰書不盡言言不盡意言之多變且不足以盡意一字之文豈足以貫衆理哉執泥言語而不得於言意之表君子猶譏之况執泥文字而可乎忠恕之論甚美然非忠恕之本意中庸曰忠恕違道不遠施諸已而不願亦勿施於人下二言者即覆解忠恕之意論語曰已所不欲勿施於人二書之言一也善乎古人之立言也其言甚簡其義甚明不煩增加覆說也益之以多言而反晦塞其正義此文士之蔽非賢人明經之指也誠論言誠何其小與中庸之言如斯而已乎尊德性論德性問學等而無辨矣不若注中君子之學云云者語意乃為完全耳象山曰不知尊德性焉有道問學此誠至當之論不可因其與朱子相駁挾私心而輕重之也今兄復下一轉語曰不知道問學何以尊德性此難以絀象山之論也象山之意以尊德性道問學為一事吾兄之言猶合兩長之意正象山之所譏也篇中評品諸儒似非確論司馬公信偉人也然考其性與王伯之說其亦擇之不精矣程子以為不知學非茍相訾也學不知性豈所謂尊德性之學乎元城西山似亦當别論耳又曰周子精而疑於老邵子達而疑於隱如周子者兄猶不滿之邪謂兄不潜心周子之書殆有不可然猶不免云云而况於老子乎邵子之隱也槩諸聖人之道未見其不合也安得以是而病之龜山上蔡觀其遺言恐亦不可輕議象山非踈也自雜博者觀類踈矣慈湖非險也習聞故常之說而乍聞其言類險矣序曰章分則文斷而意離今綴數言於每行之外聨其相承之意亦未可也古書以篇名者簡䇿之謂也一篇之內蓋有章或數言者則不滿一二䇿而已必合若干章聨而成篇如老子荀子皆然不獨戴記可驗戴記四十九篇其不可分章者僅數篇耳朱子中庸分章特離合之間尚有未盡亦無大害其失乃在於牽合接續或失古人之意今兄既欲相承復不分章失愈甚矣嘗惟吾兄精専之學奧潔之文當今之世可謂絶倫然亦竊妄意吾兄其學不用心於內而又志分於為文故於本原處未有的實之見差之於此而欲折𠂻群言能無差乎其論道論性將以求勝於宋儒不知愈出宋儒之下恐於宋儒之書亦未嘗熟考而精思也區區管穴之見恃兄之知已故妄發而不隱想兄樂聞直諒之言亦必不以為罪也卒有便草草具此不及三思中間踈謬更兾垂喻不備再答子鍾書往歲貢書辱賜答教二通凡區區之說冝不見是於明者而二書之言鄙人竊亦惑焉語曰悖者之患固以不悖今吾二人其見必有一悖者當與吾兄慎擇其不悖者從之耳不然學之終身而秪以取悖良可惜也夫性即道也言性而以惡為主則天地聖人之道皆自斯言禍之矣以此論為不悖雖孟子之辨不能也君子之言凡以明道與立教今言性惡害道莫甚焉將以為教不顧長惡乎又曰易有太極不曰道為太極理會於一出何經典此言尢可駭不意吾兄翻閲一生而所見乃爾此非小小文義之差也望虛其心參伍古訓以自鑒不冝固執已見穿鑿傅會務證前說之為是也自古以來更越神聖賢智不為不多矣發揮性道不為不詳矣患學者不能知言未免以性道之義為未明彼非未明也蓋已之識未至也昔二程子得不傳之學於遺經今考其為說固皆本於古人之微言顧其說加明耳此二子之能知言也非唯程子為然也雖孔子亦如是而已故曰述而不作信而好古不若今之諸公自我作古復别為一家之言也然諸公之說曰吾以俟後聖不知與前聖乖戾者尚足以俟後聖乎莊子曰始時所是卒而非之夫人知未至而論未當則其是非必數變當其變也自知非其昔者之是也以吾兄之高明雖微人言久必自寤然生嘵嘵不已者急於忠告之故也後生無師久矣而朋友之道復廢學者以非為是以寡為多唯其獨學而無友耳抑又聞之錯解文義講學之失也其害小護疾忌醫心術病也其害大願吾兄之慎之也道逺不可數致書故多言如此千萬亮之與浚川論二氏書日兩奉賜教感慰辱下問佛老指趣生欲奉告久矣顧其為說非筆墨所可終也大抵二氏之道乃修心之內學盡性之極談孔門之所罕言吾儒之所未聞也况其要歸蓋性命切近之實初非幽深汗漫之論特以其至近至神難於覺悟故謂之𤣥妙耳儒者拒以不信既不足以知此而二氏之徒能得其傳者亦寡矣然世之禪學猶皆以明心見性為宗無他說也至於方士之流則大背老莊之指旁門岐徑不勝其多極其優者亦有我有為之小術耳老子曰聖人後其身而身先外其身而身存非以其無私耶故能成其私此與自私自利貪生畏死者異矣致虛極守靜篤歸根曰靜靜曰復命復命曰常不知常妄作凶此與安排造作勞生求生者異矣西方之書曰若菩薩通達無我法者如來說名真是菩薩又曰一切賢聖皆以無為法而有差别此與老子之言豈非同條共貫乎即二端而觀之可以見方士之道之陋矣來教謂異僧方士率多長年夫聞道者生死修短一也茍不聞道則老彭之末路與殤子何殊焉佛氏有無生之說乃出世之第一義也以吾師之高明反求此道必不遠而得他日造浚郊之廬更當輸寫所懷率爾奉覆猶兾時一經覽也再答浚川論二氏書頃承答教論二氏指歸吾師所得已極高遠然於愚見略有同異輒復商榷兾或有毫髮之助傳所謂狂夫之言聖人擇焉者也來教云仙佛之說起自宋代竊惟仙佛之說其所從來遠矣蓋古聖人盡性之學也如所謂死而不亡者非盡性則不能然亦非盡性之外復别有不亡之術也藉曰不然則古之神聖其道皆不逮仙佛而仙佛創起李世反獨得不亡之術可乎參同契中無念以為常此言與禪學無異顧特一言之偶合耳譬猶諸子百家間亦言及仁義而其大體則非也鄉使伯陽果以無念為宗豈復談乾坤水火如彼之支離乎又謂楞伽彼此因緣不專一體金剛法相空色同歸於無乃唐宋高僧大士敷演心經而作者二經義理宏博殊非一二言所能盡心經標舉大端殆非二經之比唐宋髙僧尚未能盡知其說况能作耶來教謂吾儒之教以修心治世為事夫古之聖神內聖以修心外王以治世二者之外誠無餘事但後世去聖逾逺而其傳寢陋治世之法儒者僅得其粗而不究其本至於修心之學則講之不明久矣夫不能自修其心果足推之以治人乎况不能自保其神明雖道濟天下抑末矣又謂佛氏之學與學仙者原出一途專於為已無復為人究其所趣不過使原性常在雖滅不昧而已故非有術不能即得且如人心虛靈不觸亦動故學無心必須心息相依而後可無欲使神住必須回風混合而復為人殆有未然自古賢聖不越教化斯人使之為善耳為人之利孰大於此二氏之言大率如是至其切實而精微則反身為已之學也使夫人知為已之學其為人不既多乎原性常在雖滅不昧此固然矣特至人明於性命則了生滅之常一衆人不知其性則見生滅之有二此特淺言之耳自餘差别之義不可勝舉非纍幅之書可究也未知生焉知死蓋吾聖門之微言邵子曰若未通天地焉能了死生周子太極圖末亦援易及死生之說蓋非無為言之也心息相依繫心之一術耳二氏之書往往有之然其術非盡於此也如吾儒中之聖人所謂至誠致中退藏於密即無心也彼其所以能善者固自有道矣豈亦出於心息相依之術耶程子曰知道者思慮自無又曰未有不能體道而能無思者又曰未嘗致纎毫之力此其存之之道此言皆略開其端然亦有所自來矣神住即無心是也似不當二言之回風混合指何術而言更望垂喻俟别請益又謂學仙不成亦不失為禪覺夫老莊所謂仙與佛所謂禪誠非二道但後之方士其術淺陋曽不逮小乘之禪也昔者程子每以佛與孔子並言之其論莊周猶有何敢比佛之語况後之仙者乎禪學者不唯賢於後世之仙學雖吾後儒之學亦非其倫矣何者後儒雖言無我而不知無我之實雖言無思而不知無思之指雖言無欲而不知私欲之本無雖言性善而不知性善之極致雖以人皆可以為聖人而不知性即聖人非由修為而得也以此觀之禪之為道可知矣雖然使其道驗諸人心而不然考諸聖人而不合庸非無稽之言乎今驗諸人心則其所謂空寂者即吾未發之本心考諸聖人則其所謂定慧者即古聖人之誠明推此類而言之其道不可悉數故程子有釋氏知性知天極乎高遠之說彼誠有所見而言之非茍相許可也來教謂若是無術大是頑空夫仙佛者得乎最上之術實無術也順吾真性之空亦無空也金剛經曰如來在然燈佛所於法實無所得又曰若言如來有所說法即為謗佛凡此類者其義云何望吾師更精思之他日深有悟入始知佛與吾聖人之道本同一性而佛之有功斯人未必在吾孔子之下也縱言及此大類狂失之言矣然非吾師生未始發其狂言旬日感寒力疾具書不備答崔子鍾書承示古人皆自有一種見意譬之井泉水之多寡淺深不同皆是自家源頭用之不竭其依門傍户隨人聲嚮者恐立見其窮矣此善諭也當由見或者傳㑹先儒之說而無所發明言辭寡陋無所决擇故起此論也今或者既無誠心與實行徒託古人之言以飾其私意偏見此不過茍歡一時爾豈能欺於識者哉假令今世亡識後之人竟可欺乎殆不足論也然如所示井泉之譬必如易之大畜利貞自然如此乃為善耳學未至而強穿鑿非大畜也言不中而必已出非利貞也古人陋穿鑿者固失之能已出而有益於道者幾何如此者雖有一種意見亦不足觀也唯真有德者所見所言自不可及其同於古人者非隨人聲嚮理不得不然也其有不同者蓋古人所未發亦非實不同也不識明者以為如何答王浚川先生論文書承答教兼示四集歡恱無量四集亟讀一二過譬之觀鍾山而泛滄海唯知眩栗其珍怪安能諦列其名物哉寶而傳之當不敢後於衆人銓擇之命非敢聞也近嘗有疑則當無隱夫三百篇經訓也然作者之法存焉耳今考論其篇籍雖間有畸人放士悲憤感激之音男女姚冶之言義既歸夫鑒戒其辭又簡質矣列之於經不亦宜乎降是騷人作焉靈均已傷繁麗要之有以至宋玉則誇失實淫越禮詩人之義亡矣代相㳂習其靡日甚說者皆曰義茍有合雖靡何害於乎其如文過於質何揚雄譏文簡而用寡勸百而風一非過言也夫文已遠於實矣放而不止其遠益甚終則徒文而亡實此古今作者之通蔽也竊觀先生之作較其工且多於古人皆不啻過之故冝更少約之其近於怨調宮體豪氣太露者一切弗録此數者他人有之以為美在先生則當棄而去之耳去之者皆止於禮義歟可謂損之而益也自敘所云文貴精而不貴多者非此論也文章之弊久矣作者蕩而不反後生惑於所習生誠悼之每思得大人君子為當世所師嚮者變之使復於簡質其所繫亦非細已今先生為當世所師嚮變之使復於簡質乃先生之事也豈其與衆人角分寸之長而益後生沈痼之習哉明見其意如此不自知其僭妄死罪死罪答友人書前後承講學之疏殆不可以固陋少之也幸甚幸甚至導僕以言謂勿使迷逺而不復每觀來指見執事之適道正矣雖使岐路之中又有岐焉冝不能惑奚有於迷而可復乎今顧云云固在導僕以言也然以所聞測來指不無一二異同故言之欲卒教焉前僕舉知言學欲博不欲雜守欲約不欲陋之言來教謂孔顔博文約禮之博孟子守約施博之博蓋禮者理也吾心有條理處是也其見於事則謂之文若三千三百之屬皆心之所發也事事而約之以禮非禮勿視聽言動是也知言云者非聖賢所謂博約也竊謂博文約禮侯氏胡氏之解不可易已儻如來教當曰約我以禮博我以文不當反以博文先之又與循循善誘之言不相蒙矣孟子所謂守約施博其曰修其身而天下平者是也大抵來教所稱止可以言約禮非可以言博文也知言所謂學欲博守欲約正指夫聖賢之學所謂不欲雜不欲陋者則辨别俗儒之學異乎聖賢也殆不可以遽然非之然五峯之言意在夫溺心俗儒之學者惑於其似而無辨而僕昔者之言意在夫從事聖賢之學者又安於其偏而自足爾又謂朱子傳注使孔顔曽孟之言同者反異如大學首簡言致知而中庸首章無之中庸首章言存養而大學誠意章無之竊以為此二書本異非傳注異之也然中庸首章無致知至於他章學而知之困而知之博學審問慎思明辨之屬與大學之道何異若大學誠意與中庸存養異者蓋存養乃未發之時意則已發故言誠而不言存養耳然茍能正心誠意未有不能存養者也亦何害其為同邪夫孔顔曾孟之言要其歸未嘗不同然斯道不容一言而盡故或有不同者故曰夫言豈一端而已夫各有所當也至如孟子言性善養氣之類抑豈可謂論語無之邪非獨四子然也易之言有不同乎書者矣書之言有不同乎詩者矣各經之言或先或後或彼或此何必一一强同乎直要其歸觀其所以同耳若字量句較往往固而不通矣又謂甚愛明道之言似四子而伊川朱子多與之異夫明道伊川其資稟氣象固有不同其言亦不無小有異同者然其學術則未始異也是以當時從學者未有謂二先生之學異也而明道亦亟稱伊川豈有異而不相論難乎朱子之學亦若是而已此寡薄守舊之見來指所謂異者意非小有異同蓋必就其節目而言幸略諭及容再質疑也後疏所示心與理之說大槩即前約禮之義益廣言之爾僕謂執事之適道正矣雖多岐路不能惑者以此也夫蓋曰聖賢載籍皆心學也執事既昭然於斯矣豈慮其惑於他也哉雖然盡其心則難矣張子曰有外之心不足以合天心此在賢者之患然僕尤有欲言者執事與僕他論小有異同茍此不同雖他有同者非切也更異博取二先生之書深考而精思之又必勿執獨然之見勿主先入之言以槩衆理然後二先生是非之實可得也至是二先生之言卒不當於尊意凡區區之說又二先生之糟粕也執事豈有取乎言之猥雜蓋不敢不盡而况乎導僕以言也考功集卷九
