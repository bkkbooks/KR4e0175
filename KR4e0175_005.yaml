body:
  text: 考功集卷五明薛蕙撰五言律詩藥室詠六首山階穿藥井石室置丹爐壁掛三天字函封五嶽圖仙人邀對酒玉女伴投壺但逐雲霄去無論日月徂寂寥花水上結構羽人廬窗户生雲暗松杉映月虛犬靈因試藥鶴老解窺書長揖當塗客榮華不可如春院焚香處晨關却掃時緑綈裝古帙白石種靈芝招隱劉安賦遊仙郭璞詩蓬萊多舊侣題字問相思自知靈氣舊轉覺道情新露濕星壇夜泉生藥院春青泥含石髓丹熖起龍鱗若得金砂就還須贈所親棲息那云僻芳菲已自多跡應無客到景復有春過户內三青鳥花間五色蛾傳言逺遊子不必向山阿移牀開藥籙鍊玉閉丹房五石終朝轉雙瞳幾嵗方壺中能駐景天上任飛光永得長生術將留不死鄉臺上臺逈通風榭窗虛近水城卷簾殘暑去攜手晚涼生碧樹藏雲暗銀河度月明醉來愁髣佛只作畫中行水亭二首路引水亭出舟行沙岸回使君攜客至歌伎逐人來檻底鵁鶄舞窗中菡萏開風光莫相負長日且銜杯中流放輕舸極望何青青宛轉遵蘭渚夤緣到水亭簾櫳圍樹石階砌列烟汀緩坐留斟酌長歌間醉醒邯鄲館中門對罘罳靜城臨睥睨斜愁人倚髙閣清夜動悲笳月暗雲生葉風寒露作花徘徊望牛斗髣佛辨京華北征地闊塵沙外天寒霜露中燕雲常少日朔氣自兼風夢斷南棲烏愁隨北向鴻淹留憶攀桂辛苦歎飄蓬昭王臺燕昭無故國薊野有空臺寂寞黃金氣凄涼滄海隈腐儒終報主亂世始憐才回首征塗上年年此地來九日同何仲默出郊九日登髙㑹同人載酒來寒城一以眺秋色正堪哀零雨晨初霽浮雲午未開南飛有鴻雁為爾立徘徊駕出南郊青鳥南郊至蒼龍北闕來遙傳仙蹕下正覩紫微開倒景中天館叢霄上帝臺從臣多獻賦誰似子雲才駕幸南海子詔幸芙蓉苑傳言羽獵行三驅陪上將四校出神兵列㦸圍熊館分弓射虎城風雲日暮起偏繞漢皇營春日禁中遇雪紫禁春朝雪花飛彩仗新霧交隨雉尾風引避龍鱗掌濕金人立窗寒玉女顰翠華沾灑處遙憶屬車塵元夕興隆寺觀燈燈火金仙閣丹青繡佛筵叢林開寶樹大地出紅蓮梵鏡含明月天香雜彩烟諸公共隨喜吾醉欲逃禪送劉子緯病歸鄴下劉文學成都漢長卿淹留卧病意蕭灑著書情賓客頻頻去風塵轉轉生天涯雙淚眼回首送君行送周侍御閩越三山外東南八郡遙褰帷向絶徼攬轡下中朝風起江潮動霜飛瘴霧消九重思諫諍計日上雲霄送李儀賓漢殿朝正至燕京送客回春風兔園路歌舞鳳樓開緑水清泠閣西山鼓吹臺宋中詞賦地他日好歸來海棠畫扇西蜀繁花樹春深亂蘂紅還憐彩扇上宛似錦城中影轉團團月香含細細風江淹才力減賦爾若為工江淹有綵畫扇賦病中何仲默蔣子雲過訪何人顧寂寞盡日少歡娛慰藉煩知已扳留强病軀濁醪來近市野飯出中厨珍重交親意艱難愧腐儒送徐中夫令南昌孺子躬耕地諸孫邑宰時承家在爾輩髙士亦吾師山坼洪崖井江深許令祠縣齊臨絶境未可廢言詩贈董應期侍御同時多逐客而我獨憐君棄置勿復道凄凉不可聞風波一流落江海遂離分他日書相及常因西北雲答王允升省中對雨見憶之作康樂愁霖唱平原苦雨詩故人歌此曲贈我慰相思薜荔垂青閣芙蓉泛緑池今朝一樽酒最恨不同持送毛敬父之廬州北峽吞淮口東陵控海隅霍山分嶽鎮肥水混濡須從事之官逺觀風問俗殊廬江多小吏應候府中趨望湖亭隂磴穿雲上天窗綺霧中蒼茫玉泉水指㸃翠微東坐石牽蘿蔓攀崖憩桂叢何當避炎暑几杖待秋風石經寺翠巘雙林合丹梯一徑懸洞門臨地底石室與天連文字開龍藏金銀布梵筵兹山實靈異吾欲託棲禪送蔣國信之桐鄉始對賢良䇿登科遊漢京俄分尚方履出宰卧江城余憶東南美長懷山水情須君為地主早晚越中行七夕集廷獻宅秉燭開秋宴更衣坐晚涼雲霄降帝子詞賦接仙郎月寫蛾眉色風傳玉佩香慚君有妍唱欲報不成章七月十五日夜對月嫋嫋涼風夕紛紛零露時秋來看明月風露已如斯況對西園酌兼懷康樂詩山中有桂樹今夜足相思道院秋日海棠偶來仙館內花蕚滿枝紅倣佛看珠樹玲瓏映蘂宫預傷白露下坐惜綵雲空躑躅攀條處佳人不可同宴故英國公山亭即文皇帝賜第東第君王賜西園賓客來將軍元好士公子復憐才玉袖花間出金尊竹下開還須明月上莫畏夕陽催送戴長史詞臣漢廷出邸第魏王開地即清漳郡人同鄴下才月中遊桂苑風裏宴蘭臺宣室如相訪長沙去復來八月十五日夜同諸友玩月樓敞含風氣筵開墜露文月從今夕滿秋向此時分影濕當銀漢光斜隔彩雲徘徊接新詠況是鮑參軍書省內壁終朝謝文墨嗟此簿書繁日宴髙齊靜風來寒鳥喧倦遊傷嵗序多病憶田園何事成淫滯微官豈足言雪時車駕北狩大同北極關山濶寒冬雨雪來霧沈𤣥菟塞風繞白龍堆胡虜猶深入征人且未回遙思穆天子黃竹有悲哀訪雍上人冬日自虛寂東林地更偏經聲行處近燈影望中然殘雪明花苑寒雲䕃石筵祇應休浣暇來此暫安禪晦日夜集晦日歸休晚良游惜後時卻判長夜飲更賦早春詩雲霧窗中入星河閣上垂何須花與月行樂始相宜答士竒能來駐車轍不待拆書緘上客同王粲貧家似阮咸清談對雲竹緩步倚風杉安得盈杯酒今朝共爾銜同士竒子雲飲春風吹酒杯花鳥更相催惜此留連坐判成酩酊回安能自結束聊復共追陪今日不為樂流光去若頽招廷獻子雲飲廢書多病後抱杖獨行時晚日添花蕊春風積蔓絲物華空爛漫心賞每參差遲爾來同醉能無酒一巵春夜過時濟飲露淨開樽處天青岸幘時素雲將月上香霧任風吹為樂常苦晏含情復待誰徑須成一醉莫遣酒行遲夏日遊道觀隔竹窺丹洞臨池坐碧沙玉拌盛石髓翠籠貯雲芽展簟來風色吹笙上月華休論河朔飲詎似醉流霞陳真人館中賞荷花作别館瀛洲麗新花菡萏香紅衣迷日色翠蓋寫波光雨過金塘濕風生石檻涼客來修竹下回首見瀟湘仲夏即事林卧采芳草今朝鶗鴂鳴悠悠觀物化默默感吾生老大慙聞道空虛耻近名沈吟日云暮搔首獨含情江中四詠送黃日思韻限本題同諸公作江霞春江變氣候孤發雲霞散影搖青草流文漾碧沙紅泥迷燕子丹洞失桃花水宿淹晨暮應憐謝永嘉江雲謝客㺯春色江臯生綵雲紛紛初散綺葉葉漸成文蔽日皆相映流風乍不分何因可持贈欲以慰離羣江花百丈牽江路行穿夾岸花時憐一水曲逺愛數峯斜林下見垂釣溪邉逢浣沙武陵如在眼髣像羽人家江猿舟行轉江峽處處響哀猿極浦雲方合連山雨正昏接條時自挂飲水復相援不待三聲盡先傷游子魂六月八日西闕遇雨窈窕西清內參差水殿連歸雲向平樂飛雨集甘泉眀月裁班女回風唱麗娟龍池初望幸來往木蘭船落日落日掩書卧荒庭起獨行回看太虛上窈靄動秋聲寂寞抱真藴飄颻遺世情白雲不相識何肯入前楹寄何仲默久别憂成結書來不解顔開緘未讀半攬涕望秦關簿領余方倦馳驅君詎間相將保玉體去去入名山九日遊興隆寺厭就騷人㑹欣投釋子家林風鳴貝葉徑露濕金沙宴坐依雙樹清齊服九華晚來歸客倦欲借白牛車晚過仰之置酒燕京久為客秋日正思家不忍聽鴻鴈相尋醉菊花空庭餘木葉短褐滿風沙同病今如此酣歌惜嵗華晚坐有懷落日照簾櫳寒城烟霧中銜杯對衰菊流目送歸鴻未覺賞心廢但驚親友空遙遙此時恨萬里託秋風對雪庭雪曉逾鮮鈎簾興渺然紛紛墮花絮裊裊亂風煙悵望游梁賦沈吟憶戴船佳期每遼濶留恨閲芳年謁茂陵祀孝貞太后一棄東朝養千秋不復歸夜臺長寂寞月殿少光輝野露棲金碗山風動玉衣茂陵多碧草春日自芳菲功德寺憶昨宣皇帝西方結勝緣莊嚴修佛土功德施人天龍象山開闢金銀地接連傷心萬嵗後陵谷尚依然蕭氏園二首麗日方春暮名園更水隂葱蘢花滿徑迤邐竹成林不見川原盡祗愁雲霧深向非霑醉後幽絶恐難禁徑狹褰裳處川平伏檻前華林一何麗碧水復相鮮魚鳥方堪狎纓緌頓可捐居然謝塵垢不待濯潺湲送馬伯循二首弱嵗來京邑已聞之子賢長懷慕先達詎意竊同年感激深相附逡巡只自憐如何復為别瞻望益茫然城隅飲餞地日暮朔風吹征鳥不返顧浮雲相背馳踟蹰意何極嘆息涕空垂世路今如此焉知後㑹期重游蕭氏園二首别此真如昨重遊換物華粉滋曽倚竹紅淺舊看花沙阪縈林曲山籬逐水斜城南咫尺路未覺往來賖野靄橫蘭徑泉聲落草堂丈夫修鴈繳童子護魚梁釣弋亦堪老風塵緣底忙淹留不忍去日色晚蒼蒼歸别業作五載去京國今來歸舊廬林荒巢野雀徑毁蔓園蔬意倦風塵際身危疾病餘多慙久懷祿牢落此田居扶䇿東風解娛客往往慰幽栖扶䇿循蘭徑流鶯逐我啼青莎已齊葉紅藥始含荑昨覔鄰家酒今朝聊可攜西齊西齊休憩地永日卧書帷燕舞隨風絮鶯啼集露枝病因閒自療春與醉相冝却悔牽行役年來忽去兹郭外郭外平蕪逈溪邉小徑斜客行迷野竹鶯語隔林花多景每難遇孤遊還自嗟佳期竟何許脉脉向春華西園對雨漠漠春隂黑連朝卧小園野花川上落水鸛雨中喧衣夾身猶冷看書眼欲昏不堪逢寂寞倚仗有清樽酬惟喬贈巾野巾初著日心賞竟朝曛試正行窺水從欹卧看雲坐翻嫌月露出每避塵紛顧影還相笑風流愧使君酬惟喬惠鹿憐此園中鹿君侯贈野夫塗艱常近患物俊益妨軀林藪空相憶藩籬坐自拘忍甘充玉饌願為束生芻泛溪避暑清溪曲舟行路不窮詩成孤嶼上酒盡夕陽中緑竹含秋色紅渠送晚風歸來就眀月移棹水雲東秋夜西園秋漸好晚眺倚山扉鶴語風生竹螢飛月滿衣乍憐幽意愜翻恨賞心違延佇空林下中宵獨未歸别墅即事丘中輟耕牧挈杖返衡門落日茅茨暗秋天禾黍繁鄰人送巵酒小婦具盤飱念此信為樂悠然懷故園秋日溪上何處窺秋色搴舟入水隅清波照鳬鴈寒露洗菰蒲促迫悲生事登臨快病軀由來野人意終日羡江湖九日顔子攜飲西郭九日愁空卧西園喜並游閒居同栗里置酒得荆州樹擁樓臺出雲隨鼓吹浮不辭重落帽短髮自堪羞新館别墅棲遲處髙齊登眺初故渠臨圃近新竹繞庭踈素心已淡泊絶學轉空虛非關選幽勝偶此寄吾廬晚過鄰叟野外嵗隂早晚色正霏微石蘭向風靡海鶴犯霜飛投策暫云憩采苓方未歸幽人已相候隔水啓荆扉環堵環堵郊墟外衡門野道邉林昏罷風夜月白欲霜天落魄隨身世棲遲失嵗年平生有微志今已愧前賢不寐一榻微寒入山房夜未扄凝思天籟發不寐谷神醒本自淹衰疾何堪役性靈列仙如可學吾欲駐頽齡丘中返照丘中路孤烟水上村野田荒蘚色沙岸落潮痕日短䞉書卷天寒頻酒樽定知無客到不必掃柴門原上曉望平原搖落盡極目見寒空初日煙塵外滄波晝夜東孤芳遺雨雪髙鳥下天風俯仰無相晤長歌思不窮負郭負郭茆堂小臨溪竹圃斜山樽攜野客魚網曬鄰家荒徑封殘雪踈籬透晚霞預思春到日著處種桃花晚步落日滿平蕪風煙似畫圖空林助鳴鶴逺浦失歸鳬白幘狂猶岸青藜倦自扶歘思酬物色佳句未應無寂寂寂寂多相笑悠悠略自諳謀生只如此經國更何堪偃仰身微健踈慵味頗甘敢云忘魏闕正爾戀江潭贈顧英玉時謫許州過亳見訪殘冬江北路寒苦異金陵駑馬行來逺衰顔别後增劔埋餘紫氣玉玷有青蠅世故多堪惜因君重撫膺漕河舟中作悠悠漕河水今日更遄征敢議占時出祗言循祿行田園違宿昔軒冕纍平生緬憶髙賢跡遲回何限情元夜諸公㑹不赴九陌帝城中煙花繞漢宫銀河流夜月火樹暖春風衾枕憂如昨軒車恨不同時聞玉珂響寂寞卧牆東送南元善守紹興傳