body:
  text: 考功集卷一明薛蕙撰賦孤雁賦孤雁感物也渦水上有孤雁隨人家畜鵝鶩輩以取食人或逐之輒飛去入左右洲渚間然終不逺去也豫游城西有野人指示豫心惻然傷焉因作賦云遵長河之峻阪出城隅以西徂望鴻雁於河涘竚倣徨而獨居容懇􅉃以愁悴音悽愴而號呼伊斯鳥之嘉淑産異質於幽荒體貞信之至性動靜一其有常固羽族之殊特衆鳥孰可與比伉故其行不失時止必擇所候暖北逝先寒南下既冒險而涉危曽不恤夫勤苦惟衆鳥之多智曰庇生之得宜弗一遘於艱難羡暇豫之無期或巢山巔或游海涯奮首虹霓濯翼天池託戶牖之巍巍下民莫得以或窺足無虛跖翼不勤飛資飲啄於尋丈遷徙弗踰乎旬時何斯鳥之劬勞增荼毒其曷已將材質之不倫固天命之難俟瞻北都與南國念家室之靡止道路敻以遼逺間一嵗而萬里復有羣侣中迷雌雄死别目駭魂驚飛沉隔絶始廽遑而不進終躊躇以永訣爾乃背雲路下緒風依沮洳潜蒙茸捐燕越之故思甘愁苦而終窮雖六翮之尚在欲北歸其焉從於是淪形晦跡亡精失志牢落逺遷躑躅無寄痛衆雛之一隔慕同類之難值伺晨鳬而朝征逐鴐鵝以宵寐豈卑湫之敢辭恥衆目之猜忌聲未鳴而先絶翅將舉而復墜呻吟幽僻周旋林坰踐曠野之嚴霜食潢汙之流萍延性命以茍存非初心之所營遭志意之摧毁中無故而或驚况畏悸之叢至迫末路之惸惸避矰繳而往來因鷹隼之縱橫思逸樂之無遺憂栗紛其相嬰若乃陽律畢謝隂氣時作天清日逈草枯木落明月出兮皎皎野露皓以漠漠戀南游於朱崖懷北棲乎𤣥朔魂魄竦而怵惕顧形影之寂寞吐哀響之嘹唳志激昂而將躍動幽谷之虛籟停髙門之曉柝聞之者怊悵而自憐見之者欷歔而不樂嗟斯禽之可哀像羈旅而無朋因昆蟲之同感未若斯人之有情泛游觀而厯茲忽容與而不行詠鴻雁於周詩泣涕下而沾纓覽萬物之參錯悟大化之合并相吉凶與憂喜終同歸於杳冥齊百慮於一致孰云天道之不平四言古詩昊天贈崔子昊天單威亦孔之棘􅉃莫有戾不寧我國我國斯瘼我民用卒如何昊天云不我恤國之方將尚曰靡卜國之既痗伊何能榖昊天降訩弗遂弗畜哀今之人胡俾夭㭬有蘀者木維其頻矣民之劬勞不遑辰矣戎作在圉內有冦姦王事𢎞多寧有其殫國既大廢君子于解三事朋友莫之能誨卿士大夫曰豫弗逮昊天鞠怒則莫肯悔憂心孔疚念及我友彼人有言我孔之恥曰豫維服憂我父母舍是弗思憂我天子曰彼在位曽不可耽如賈弗售載反其琛懿爾君子亦徂于南送子出宿悠悠我心昔我邁矣朋友相豫既愆于卒我心如沮匪往匪來云我靡處之子于行憂心孔愈瞻卬昊天則莫敢邇既夷既届則不我咎君子于行尚顧其後大命不忒爰其有止昊天八章章八句𤣥鳥贈蔣氏翩翩𤣥鳥秋日載徂憔悴如何不遑室家悼我良朋憂心瞿瞿翩翩𤣥鳥載徂秋日憔悴如何不遑家室悼我良朋憂心菀菀翩翩𤣥鳥逮春而復之子于行將其不覿贈言匪多憂心孔蹙𤣥鳥三章章六句晉七賢圖像詩在昔有晉多士間出發揮上德彌綸道術遐蹤齊騖髙軌競軼竹林之徒厥維入室阮公矯志貴利弗就流連沉湎却彼婚媾英材俶儻殆乃天授大人有傳跨騰宇宙峩峩中散龍章鳳姿倣徨丘澤咀嚼雲芝神交隱淪精感靈祗解形東市人靡能窺邈矣參軍神棲亡愕瞬息萬代跬步六漠蔑盼貴介耽彼三爵褌中之談實維善謔仲容秀發頡頏叔父神暗均律妙洞擊拊郭奕心醉荀朂妒嫮始平之出何其舛忤向子清悟莊惠同科析辨神緯揚此𤣥波佐煆栁下灌園巖阿徘徊鳴笛惻愴如何巨源簡靜夙懷髙舉逡巡待價儀刑朝序拔材銓選畫議軍旅至道在躬是曰餘緒濬冲朗鑒神量𤣥逺時哉多辟降志舒卷並美張裴附交嵇阮酒壚結慟微情繾綣川則珠輝山維玉絢猗嗟七子亶時之彥中行雖忒聿協狂狷丹青式繢精爽如見夀顧華玉母分得雲林夫人金臺曽構瑶波潭沱王母攸廬問誰侍坐姗姗季女一何秀媠乃曰雲林仙人字我色侔瓊蘂雲髮翠妥陵厯滄浪出入靈璅鳳飛戢孴龍輈婀娜却䕃芝蓋俯拾玉果圃有洪桃花蕚未墮紛紜周漢暗如石火湘靈舉楫洛妃擁柁曩棲海右今遨江左顧東江先生遺善堂詩紛綸靈系昭晰瑞圖在昔帝嚳爰及昆吾嘉祥誕發茂慶攸敷比暉四姓著美三吳其一谷水盤紆崑山岝㠋鬱彼顧林夲支斯託豐諜未艾聞人閒作式覽厥初匪今伊昨其二三五迭終公侯復始維少宗伯克昌其祀祗勤于德令問不已士瞻師表國賴耆齒其三履滿思謙居崇鑒替于時念哉詔爾苗裔曰求彞訓曷以永世無或昏逾祖考是繼其四昔爾先祖遺善自名烈考嗣之率是攸行奕世載德用底昭明逖矣後昆無忝所生其五粲粲新宫峩峩層構載稱祖號訓迪來胄畏愆若墜慕道罔後天命不慆介爾蕃祐其六堂置詩書庭陳金石鳴鶴相喧芳蘭如積入里修容過閭竦迹矧爾子孫孝思無斁其七丕葉遙興鴻源遐吐於赫祚𦙍遹追祖武千億重規雲仍疊矩我歌此詩以告終古其八樂府盛唐樅陽歌盛唐樅陽歌者漢武皇帝作也元封五年帝南巡荆陽親射蛟潯陽江中獲之作是歌帝之狩順祥時察南服臚九嶷會大海濟江淮朋神禹逝九閡江之沛蛟魚出顯君伎誅弗率彎天弧孛流矢雷電隕赤江水叱東井治江維波神平水蟲嬉凶惡伏帝夀昌邁盛唐出樅陽交門歌太始四年漢武皇帝行幸不其祀仙人交門宫若有鄉坐拜者作交門之歌朝泰一陟分丘降石閭臨之罘熙事成遍東西祈交門肇迎年陳玉席潔椒糈通八神召靈圉繽徠翔神光燭尞中壇華紫幄元禮登告嘉辭靈允答與帝期靈交際萬夀徴帝無疆仙為朋上之回上之回䄠靈畤神心愈祚皇祉上之回定諸國西南輯震東北上之回樂孔博游昆田厯鳴澤上之回樂無射年萬億長無極善哉行來日大難痛心疾首今日為樂莫懲其後大難如何昊天不嘉吉凶有時人莫之知鹿之游斯在彼中野庖人調和將以為脯翩翩白龍好是魚服豫且射之載中其目少康出畋不復其舍戎王朝卧乃縛尊下式戒在始式備在終匪戒匪備害于其躬天命戾止匪夙則莫勉爾在位無俾天怒煌煌京洛行猗猗椅桐斤斯斧斯人之維良胡俾遺之豈弟君子人之是榖君子不𢎞人之無祿絺綌在冬子曰有衣終朝不饋子曰罔饑此之仡仡子曰不力彼之揭揭子曰不直有菅有蒯女子采之九九之術齊君禮之室周讓御簡子是取臧文之賢譏於孔父吁嗟士人生之窮兮我思古人惟周公兮黃鵠篇飛飛者鵠于彼蒼天大風阻斯羽沉于淵有松有柏其枝嶟嶟雨雪逮斯化為枯薪烈烈冬日蕭蕭北風雖有神龍宛彼地中天命有假人謀有仍嗟哉士人曰豫無能舟利于川弗利于陸君子于行維顛之速相彼哲人爰得我匹且以嘯歌且以永日臨髙臺臨髙臺下有萬丈之洪波羣山沓蹙茀鬱乎其隈疾風起兮南北陂池沸渭而成雷時却顧以自失心􅉃凛其傷懷北望深林叢生崔嵬柯條糾而旋互榮采駮犖乎巖崖衆鳥哀鳴聒日夜猛獸垂啄旋踵而徘徊嗟君無萬斛之淚胡來乎此地一來此地何由回雞鳴篇雞初鳴日東御月徘徊招搖下雞再鳴日上馳登蓬萊闢九闈雞三鳴東方旦六龍出五色爛雉子班雉子班五文章錦為衣繡為裳狀瓌異志徑剛美為災技自妨羂雲羅掩天綱就樊檻辭山梁荷仁惠不殺傷啄甘實飲清凉形柔昵意悲徨惟平生詎有常感恩遇回中腸循周榮棲幽房委微命畢君傍君馬黃君馬黃臣馬𤣥二馬並驅君馬前君馬前臣馬後山髙路長馬不走君當行臣當歸與君齊足焉能希巫山髙巫山髙鬱鬱襟帶亘天涯上靡白日陽下陵青雲眉𤣥巖何嵳峩層巘互參差景象非一狀逺望令心悲獻嵗出游獵千乘齊交馳翠帳羅曲阿羽蓋垂瓊芝龍騎踐蕙圃鷁首戲蘭池回車背中路娛樂未云疲置酒景夷臺設禮髙唐祠君王千萬嵗嵗嵗長如斯江南弄芙蓉嶼口茱茰潭朱唇一笑酒乍酣牽裾並袂歌江南歌江南望塞北思不見情無極鳳笙曲白玉作筒黃金葉鳳翅差池凰羽接竒弄徘徊曲重疊曲重疊聽增傷鵾雞舞白鶴翔游女曲春草才生春氷沒江南少婦戲春月步拾明珠曵羅襪曵羅襪動春衣留中洲憺忘歸朝雲曲流光動豔影徘徊稍集楚館臨荆臺乍近復逺望不來望不來魂偕逝攬女衣游雲際趙瑟曲春風初䦨花半落美人挾瑟坐重幄促柱催弦勸君酌勸君酌為君歌君不飲奈愁何宫中樂偶過昭陽館雕櫳閉絳紗卷簾通一笑落盡滿庭花從軍行玉鞘錦絲絛珠韀白雪毛甘泉望烽火一夜過臨洮折楊栁三月盧龍塞沙中雪未乾朝來折楊栁春色憶長安采蓮曲眉暈風吹薄衣香水濺消朝朝采蓮去空轉木蘭橈緑水曲春洲霽煙雪潺湲激緑水戲羽亂參差開花雜藿靡綽約蕩舟人㛹娟弄珠子芳菲不可忘冶麗復如此隴山隴之山兮在彼西北子之征兮防禦中國隴上之木鳥不肯息隴下之水魚不肯食游俠篇君不見翩翩游俠子虎變龍淪世叵測轉海摧山力無比君不見闔廬堂上養死客吳王酒酣客進炙千金匕首匿魚腸俄頃蛟龍飛霹靂又不見夷門老翁屠肆兒陸沉大梁人豈知竊符奪將付公子秦人北解邯鄲師古來豪傑皆若人意氣激昂肝膽真傾軀寫心不自惜排難解紛如有神丈夫自是英雄者左拉荆軻右古冶寧當刎頸卧道傍誰能槁死蒿蘆下君不見虞卿齪齪絶可憐託身魏齊捐相權平生著書萬言在不如刺客三尺之龍泉我今落魄復如此放歌飲酒長安市結客曽過滄海君報讐欲借幽并士酒䦨擊劍歌莫哀眼中竪子何有哉明朝事就拂衣去却隨梅福觀蓬萊聖人出聖人出應昌期受命上帝下民咸來歸聰明冠羣倫道德何巍巍虛已彌謙畏入有輔弼出有師俊乂起為股肱讒佞比周退而無所施教化之行自京畿四方取則莫我違人革其心不自知復反醇厚去澆漓和氣絪緼風雨時百穀被野多如茨醴泉流溢生靈芝慶雲在天神爵飛四門大闢通九闈南面端拱垂裳衣羣臣上夀獻歌詩天子萬年兆民永賴之戰城南戰城南軍敗歸郤行入城為虜圍虜圍急士心悲外無援兵虜馬縱橫馳顧謂同舍兒旦暮迫死期虜來殺我盡何人報我子與妻戰城南良可哀今年出戰不復還明年更驅生者來暴虎或可活擊虜决不回請看長城下白骨何壘壘吾聞古者天子守在四夷何必使中國之民填溝壑於胸奴之地為短歌行蟋蟀在堂野有繁霜我心悽悽不可暫忘豈無㫖酒可以燕游豈無琴瑟可以娛憂瞻彼日月終古而在百嵗之期寧莫我貸人亦有言道憂世促千載一遇匪遲伊速異世而合夜夢周公同堂而違仰視飛鴻秋有枯槁春榮則多嗟我人斯其如命何君子行君子思危懼不終日衆人居安沒齒自逸君子思退如迫于淵衆人思進如逐于田損益之變何其相反茍非明智孰能及逺人知其終莫知其始吉凶之萌鮮不由已上天無私何怨何親福不擇家禍不索人道有險易事有從違於乎小子慎爾所之隴頭吟沙漫漫石簇簇馬仆車摧隴山曲隴山日日行不前夜夜還從隴間宿關東只說羊腸坂那知隴坂如天逺隴阪逶迤距西域古來此地希人跡山川夲是隔華戎君王直欲吞夷狄自從漢虜互相讐塞上風塵無日休幾羣天馬來荒外百萬征人戍隴頭堪嗟百萬征西卒半作隴山山下骨誰為戎首禍斯人後有漢武先嬴秦秦家無䇿良可嗤漢制胸奴空爾為願令邊郡謹備冦不用中原多出師日出東南隅行日出東海隅西入崑崙墟六龍踴躍駕日車往來萬里裁須㬰人生寄一世逆旅難久居羲和何不仁蹙迫更相驅顔回短折果何辜老彭竟化千金軀蒼天夢夢白日暗居然不辨賢與愚吾將命后羿仰射三足烏僬僥弋鴻鵠作計良已踈魯陽揮戈等兒戲夸父奔走空區區西方調御之丈夫教我修道歸虛無虛無國中無夀夭一任羲和變昏曉猛虎行饑不從猛虎食貧不從權貴游猛虎窟中多惡少貴人門下非清流蒙鳩巢葦苕乾鵲代渠愁飛鳶啄腐鼠鳳凰見之悲且羞長安道上車馬客處身頗似二鳥儔苞苴不獨結諸公脣舌還能媚五侯紛紛竪子焉足數可惜英雄亦同伍賢人翻在平津閣文學來依車騎府男兒貴作不羈士逶迤匍匐何辛苦君不見會稽狂奴真傲倨萬乘留之徑歸去羊裘懶卧七寶床釣竿笑拂珊瑚樹出塞隂山虜騎喧上郡羽書繁胸奴入邊地將軍出塞垣竒材募荆楚善射選樓煩朱旗類電掃𤣥甲若雲屯懸師度沙漠飲馬抵河源金鼓青天動風塵白晝昏怯夫思勇鬬死士恥生存月氏方破滅日逐盡崩奔都護領西域呼韓守北籓當令四荒外咸知大漢尊元會曲握乾御紫極出震撫青陽履端受百祿朝宗來萬方玉輅充庭陛金奏響嚴廊垂衣揖羣后置酒燕周行欣欣醉湛露穆穆仰天光千春賀元會歡娛良未央對酒畏塗有千慮勞生無寸隙唯餘對酒時暫作伸眉客妖姬雜睇笑歡友連襟舄相逢判一醉錢刀非所惜春游曲春來春驟好春游須及早招邀南國姝追逐東郊道合尊圍綺樹調絃藉芳草人生非取樂空令少年老長安道神州應東井天府擅西秦雙闕南山下千門渭水濱公卿畏主父賔客慕平津方朔何為者虛稱避世人洛陽道鳳闕正中天龍池帶洛川層城三市列復道兩宫連錦障藏歌伎羊車戲少年更逢嵇阮輩長嘯酒壚前劉生劉生喜輕俠關輔遍經過新市踏踘戲髙樓擊筑歌駐車訪朱亥爭博叱荆軻不為徼名譽惟矜意氣多關山月迢遞關山道凄凉霜露時如何秦地月亦自到天涯切切胡笳怨蕭蕭邊馬悲髙樓有思婦苦樂詎相知驄馬驄馬負竒氣昂昂態不羣緑騣凶鬯匕搖鳳鬛赤汗染龍文睨影思邊月長鳴向朔雲願馳千里足一戰立功勳送逺曲勞勞亭下秦淮水錦帆搖搖繫沙尾少年逺作萬里行愁結雙娥低不起向來祇為新知樂不悟翻成别時惡尊中安得千日酒同埋黃壚亦何有江南曲江南光景殊無賴水如碧玉山如黛吳王舊苑芳草多鴛鴦飛過斜陽外船頭醉岸烏紗巾興來遍看江南春五湖倘遇范少伯奪取當時傾國人隴頭水隴關出塞路征客離鄉思忽聞嗚咽水共下潺湲淚夜夜曲烏栖瑣窗靜露下羅衣薄脉脉對蘭缸夜夜同煎灼芳樹芳樹榮春日萋萋盈後園絳房承露坼素葉向風翻散影連雲屋吹香入網軒美人來已暮零落復何言白雪白雪擅紛華耀此𤣥冬暮縈回飄朔吹蕭散流隂霧已並紛闈鮮還增玉階素願欲集君筵皓齒多相妬將進酒將進酒杜康之族無不有處州玉露金華碧襄陵鵝黃河內白我家緑醖亦無敵五君合計幾萬石一日一石當擊鮮樂飲可支三十年不須虛無求列仙不須枮槁縛幽禪壺中之道極𤣥𤣥養神鍊魄合自然眼花耳熱體蹮蹮舉觴一酹滄浪天天地變化無時休日月出沒不少留人生戢戢蜂蟻儔須㬰零落歸山丘開闢至今八萬秋古人魂魄猶在不喟然念此令人愁惟有杜康堪解憂君不見咸陽白帝子并吞六國心未已百年謾作萬年計恰似蜉蝣望秋水又不見西楚重瞳公諸侯震讋趨下風喑啞咄嗟氣蓋世螳蜋怒臂將無同兩雄恣睢浪自苦自餘么麼何足數君當快飲我起舞樂哉醉鄉真樂土作歌者誰君采甫酒徒之名垂萬古行路難三首君不見山中行人葬虎腹復有貪狼飽人肉天生二物毒瓜牙比似讒人未為毒讒人之毒在利口能覆邦家如覆手一夫中傷那足悲萬事紛紜真可醜君不見伯嚭加誣子胥刎越師西來吳國盡又不見上官納譛屈原死楚王翻為秦地鬼讒人反覆不可憑變易是非移愛憎重華聰明疾讒說詩人怨憤刺青蠅青蠅營營㸃垂棘讒口囂囂排正直已於平地置機穽更向通衢布矰弋可憐豪傑死道邊總為奸邪在君側行路難行路難只在讒人唇吻端寧當脫屣蹈東海不須驅馬入長安我歌行路難什百之端歌一端丈夫委質事天子豈謂當由左右始九重邃逺壅蔽多疏賤孤臣竟誰恃君不見賈誼上書談世務漢皇欣然絳灌怒秪言旦暮即公卿一麾却作長沙傅又不見董生硜硜守廉直儒者安知丞相力白頭不得里中卧逺徙膠西驕主國二公之事略無異史䇿紛紛多此類餘風積習傳至今覆轍危機在平地沛國迂儒不曉事酷信丘軻泥文字往年抗疏攖逆鱗賜玦歸來十二春豈無髙足據要津未肯低睂干貴人貴人方寸九折坂况我三輪行不逺帝閽無路欲何之五嶽尋仙未應晚男兒有事在四方我今胡為不下堂白首徒懷經濟䇿青袍虛忝尚書郎早年不睹道路澀慷慨登朝期樹立萬分論議甫一吐羣小猜讒俄橫集自茲投劾歸田里洶洶風波猶在耳敢恨流離世不容獨幸崎嶇身未死摧藏無復異時意攀援永謝同朝士始悟髙賢好長往却愧頑疏昧知止君不見當時汲汲魯中叟褰裳濡足常奔走七十二君冀一遇枘鑿方圜終不偶楚狂悲歌傷鳳衰鄭人竊悼喪家狗大聖行藏且如此小儒功名亦何有閉門不免憂饑寒出門險巇千萬端禍福重輕君自看不如解却頭上冠懸車縶馬但髙卧莫歎人間行路難從軍行少小慕功名擊劍復談兵誤信封侯事甘作從軍行一朝備行伍幾處罹辛苦西南通逺裔東北攘邊土武帝雄材略土宇新開拓銜命馳嚴馬登壇延衛霍諸將竟邀功嵗嵗出臨戎勒兵盈塞外發卒遍關東騷屑干戈動蕭條田野空廟謀貪戰伐邊隙開胡粵軍興急星火兵連淹嵗月戈船下厲水䇿馬踰葱雪山川行未半容鬢驚凋換寒氷手指墯炎風肌肉爛思鄉已淚盡望逺堪腸斷怫鬱魚泣津凌兢猿眩岸悠悠厯絶國險道何傾側虎穴詎可入鬼方寧易克間使閉昆明單兵陷疏勒全軍有天幸從吏無人色天時變殺機壯士奮兵威飛矢風鳴鏑推兵血濺衣長驅五王國大破九重圍萬里懸旌出三軍奏凱歸邊垂日無事鳥盡良弓棄行直貴臣憎功髙同列忌賞格多排沮謗書仍負纍白頭還士伍赭衣從吏議輸力奉明君忠邪不見分丹心徒貫日劍氣枉凌雲人事竟莫測天命諒難聞可憐麟閣上不畫李將軍長門怨新歡侍清宴舊寵棄深宫相妬夲相似君恩那不同歌喉嘲飲泣鬒髮笑飛蓬誰信黃金屋繁華一旦空長信怨異時陪玉輦同載召娥眉寵極有衰歇恩深多怨思秋風吹網户春草被丹墀不及主家伎空歌團扇辭莫愁曲儂家住石頭緑水繞歌樓不是工娛客何緣字莫愁江水映江花春光滿狹斜金陵衆年少爭到莫愁家燕歌行漢初胸奴雄北邉邊城蹂踐何蕭然嵗嵗金繒輸罽帳年年烽火照甘泉武皇憤怒按劍起詔遣將軍擊驕子隴西壯士出玉門幽冀精兵度遼水遼水風濤駭陳雲燕山雨雪雜兵氛河南昔日駐代馬塞北今朝屯漢軍軍中嚴鼓催軍發陳前突騎爭馳突飲馬懸愁瀚海乾彎弓已射旄頭沒喧喧將士劇風雷惴惴胸奴若死灰單于夜半冒圍去校尉平明逐敵回收兵反斾休沙漠三軍歌舞從軍樂腰下金刀尚血流帳外旃裘俱面縛捷書駱驛入咸陽凱樂鏗鍧朝未央肘後何須列侯印殿前願奉萬年觴從軍行少小習刀兵從軍右北平先登百死陳却破五重城邊郡勤王苦中朝論賞輕封侯自有數安用怨匡衡受詔辭金殿提兵出玉關黃雲連大漠白雪滿隂山虎騎馳天外龍泉吼臂間胸奴儻未滅定自不空還征人怨苦寒關塞更漫漫石堡依山峻沙場並海寬徒行隨博望仗劍斬樓蘭邀取麒麟畫祇令後代看代馬乘秋動邊城正宴開天寒弓力徑塞逈角聲哀徑卒憑陵至孤軍折北回不知漢天子何日棄輪臺凉州詞隴西西去抵凉州邊塞蕭條處處愁青草不生青海曲黑雲常聚黑山頭從軍行冒頓南侵塞嫖姚北出師連營羅組練分道引旌麾躍馬爭前列摧鋒肯後期鼓行趨上郡席卷向邉垂虎旅聲先振龍庭勢已危追奔忘逺近轉戰决雄雌漢將功成日胸奴數盡時孱王逃絶幕窮冦聚降旗獻捷歸雙闕揚威耀四夷從今橫吹曲增入凱旋辭鳳臺曲秦娥嫁蕭史新起鳳凰宫吹簫白日上擕手綵雲中一别人間去千秋樂未窮春江花月夜春江歌緑水綵鷁戲金沙玉叉初映月繡帶乍藏花窈窕皆相似無如張麗華飛龍篇晨登金壇神君所治芝草叢生𤣥泉泌泌乘彼飛龍以遨以戲憫我衰老乃告要袐周流神庭壁門十二授我神藥盛以玉笥教我服食長生久視優哉游哉嵗等天地戰城南戰城南出城北城南戰尚可城北戰不測清晨跨鞍馬迎戰城南下敵騎四面來提兵入中野中野何蒼蒼殺氣互低昂前臨五單于却距左賢王日出負戈起日入未能止人馬同時困自念身當死身死棄山阿化為泥與沙平生安足惜國憂將奈何考功集卷一
