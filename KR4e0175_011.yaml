body:
  text: 考功集附録吏部考功郎中西原薛先生行狀王廷先生姓薛氏諱蕙字君采西原其號也晚年又自號大寧居士云其先河南偃師人國初有諱彬者先生高祖也以從軍𨽻武平衛因家于亳曾祖諱森字茂林倜儻有義行祖諱琇字廷瑞為衛主文能以文法活人考諱鎰字大用封承德郎吏部驗封司主事寬簡質直不與人校衆推長者尤喜施與振人之急里人徐剛病一方士針之死其子執之將訴于官吏部公語曰此誤耳且又貧即訴之官終無以給爾之葬吾為汝僃棺木汝其釋方士由是方士得釋每歲荒歉捐金活民尤多妣楊氏封安人庶母侯氏某氏先生自幼穎異始生三月偶見芒神連呼曰芒兒芒兒家人驚怪亟沃以冷水止之稍長益聰慧不類群子弟郡之老長相謂曰薛氏其昌乎七嵗習舉子業即能舉子業十二即以能詩名題鄰舍三教圖曰斯道有三教聖心無二天陰陽動靜機活潑一圈圓試問一歸何處此理𤣥之又𤣥識者已占其不凡矣十五補郡學弟子員十八應鄉試不偶歸于時大中丞浚川王公適判亳州一見亟稱之曰天下竒才可繼何李蓋是時信陽何子仲默慶陽李子獻吉並馳聲藝苑天下學士大夫多宗之云先生自是窮探載籍採擷英華程古摛詞名聲大振傳于京國人遲其至乃正德癸酉領南畿鄉薦偕計入京時仲默猶為中書舍人即乘夜造之雅相欽挹遂成莫逆之交一時名公兢為卜鄰投刺納交者踵相躡也明年甲戌登進士第授刑部貴州司主事尋以疾在告丙子起于家復除刑部福建司主事直本科凡諸司章疏率經手筆既敏于文而又引切法比省中咸伏其能十四年己卯值武廟南幸抗疏力諫禍叵測處之甚裕不為動頃之調吏部驗封司主事嘉靖元年壬午今上繼統録用儒碩布列有位彬彬皆才德之士先生在部一以揚賢俊拔淹滯為已任而曹無濫吏門無私謁人尤稱之乃又自文選司主事升驗封司員外明年癸未為會試同考官其所識拔悉一時英彥又明年甲申升考功司郎中時太宰白巖喬公以考功甄别之司責大且繁擇先生任之甚倚重焉會議獻皇帝稱號朝堂如訟先生乃稽參墳典稱述古今撰為人後解為人後辨凡數萬言入奏下詔獄時部院諸司亦各具疏伏闕哭以聞上震怒杖譴有差先生獨以先繫獄不與詔令復職然竟以是忤權貴權貴人常欲得而甘心也而給事中某者故附權貴人果隂使誣奏有㫖奉勘回籍丁亥丁母夫人憂己丑除服其誣勘事亦明吏部復移文促起之時權貴人勢熖正盛先生曰斯尚可俯首以就湯鑊哉遂絶意仕進不復就而權貴人亦卒不可得而甘心也可謂明哲保身矣癸巳吏部公亦卒先生兩丁家難又素孱癯哀毁骨立既襄事仍廬墓側其家人慮因為病請親友勸諭不聼服闋辟小圃營廬舍于塋墓後兾得朝夕掃謁且以自適也扁曰退樂中丞柳泉馬公易曰常樂中鑿方塘浮以芙蕖緣以竹樹雜蒔花藥搆亭其上白巖喬公題曰瑩心先生乃優游于中誦習不廢或對客論文觴詠自得暇則曵履田次䕃樹臨流與漁叟農父相答問意泊如也先生雖含章在野而譽望日隆天下士人無問識與不識談及先生者皆為屈伏臺諫論薦殆無虛嵗咸兾願秉用究竟厥施而先生不可作矣嗚呼傷哉先生性溫良坦直高潔自尚一言一動一取一豫必依裁道義雖在隱微略無茍且且孝友兼至終始不渝蓋其天性然也癸酉嵗與郡庠士同應試行至長灣先生戲祝曰某在此河伯無供餽何也須臾一大魚躍入舟中衆驚異傳視畢復投于河是年領鄉薦里居十七年儉約自將常如貧士雖村翁野豎接之盡禮人以非義干者即婉言却之人亦無怨嘗自書曰雖小事不可為人囑託縱能救人于患難而自損廉耻已多矣已之德與他人之事孰輕孰重此事當銘之于心不可忘也誓之以死不可改也其介如此猶嚴于好惡見人之善中心好之其不善者雖與之談不甚洽也人有疾親為撿合方藥常脫綿襖施貧者或曰焉得人人而濟之先生曰但不負此心耳聞者嘆服讀書輒數行下後不再讀以是沉酣六籍淹貫百家雖星歷岐黃之術大藏二宗之㫖皆能究其歸趣早年工意詩文超入魏晉遂為藝林宗匠晚乃刋落繁華潛心性命人徒見其鑽研佛老而不知㨂金于砂蓋自二程氏而已然也是故其學以自知其性而養之為主以慎獨為要以居敬為務卒乃造詣深邃窅不可測而自得實多然今之人但知先生為詩人耳所著有約言西原集老子集解行于世大寧齊日録五經雜録凡若干卷藏于家先生于去年冬忽感疾比至後漸瘥今年正月一日至六日體復如常越明日謂家人曰僃後事比九日夜四鼓據几端坐而逝鄉里逺近聞者皆傷感垂泣可以考見先生之德矣卒之夕鄉人聞空中震響如雷咸以為天鼓之鳴云以𢎞治二年己酉十月初六日生年五十三嵗配趙氏封安人無後昆弟三人伯曰蘭仲即先生季曰萱姪一曰存即蘭之子蘭將以今年十月十八日祔葬于考塋之側乃以書來乞為先生狀將以徴銘立言之君子以圖不朽廷最庸劣往為亳州判官蒙先生一見契合遂忘年而友之朝夕討論頗深切至因于先生之行已大節知聞較悉求之古人信亦鮮儷乃因國子生汝清所列事行而序次為狀伏冀採録而為之銘以垂不朽實斯文之幸辛丑嵗四月望日廷謹狀吏部郎中薛西原先生墓志銘唐順之西原先生姓薛氏名蕙字君采先生憫學者漓於多岐作約言學者執言詮以求見聖人之心而不能自見其心也作五經雜說方士穿鑿乎性命之外而不知養性之為養生也世儒泥象於有無之內而不知無為之為有為也作老子解先生之學無所不窺不名一家中嵗始好養生家言自是絶去文字收斂耳目澄慮默照如是者若干年而卒未之有得也久之乃悟曰此生死障耳不足學然因是讀老子及瞿曇氏書得其虛靜慧寂之說不逆於心已而證之六經及濓洛諸說至於中庸喜怒哀樂未發之謂中曰是矣是矣故其學一以復性為鵠以慎獨為括以喜怒哀樂未發為奧以能知未發而至之為竅自是收斂耳目澄慮默照如是者又若干年而後信乎其心其自信之確也而後著之於書嗚呼心學之亡久矣有一人焉倡為本心之說衆且譁然老佛而詆之矣學者避老佛之形而畏其景雖精微之論出於古聖賢者且惑而不敢信矣先生直援世儒之所最詆者以自信而不惑其特立者歟先生少嘗刻鏤于詩世絶喜其工今所傳西原集者其少作也既有志于道則棄不復為雖為之亦絶不復較工與否然而西原集世爭效慕之而約言老子解好者希矣先生以正德甲戌舉進士授刑部貴州司主事病免起為刑部福建司主事以才調吏部驗封司主事嘉靖初先生在吏部歷考功郎中而罷後十八年辛丑正月九日以病卒於家年五十有三其罷也坐論大禮先生自為刑部時值武廟南狩抗疏諫禍叵測先生晏然後大禮之議起乃撰為人後解為人後辨奏入下獄已而復其官然已為權貴人所不釋矣已而竟主給事中陳洸搆先生罪先生上書訟坐是罷後所搆事解吏部數移文促先生赴官時權貴人且張甚曰是可蹇裳而蹈淵也哉竟屢薦不復起先生貌臞氣清與之接不待叩其學而知其埃壒之外其行已素峻潔表裡皎然一無所緇好惡無所假借其才雖高然坦易洞朗破去崖岸豪傑皆慕與之交其庸衆亦無嫉者獨以一二權貴人故至一斥遂不用先生方且藝圃灌花淡如也而當世咸共惜之先生居鄉絶不肯為人干請至戚里有病親為之檢方製藥常脫綿襖施貧者或曰焉得人人而濟之先生曰吾不愧此心耳先生始號西原居士後扁其齊曰大寧齊更號大寧齊居士而世猶稱西原先生云薛氏故𨽻偃師國初以戍武平遂為亳人祖琇父封吏部主事鎰母楊氏封安人薛氏自主事君而上皆不顯然世推長者主事三子楊安人實生先生仲子與兄蘭雖異出而友愛特至先生配趙氏無子蘭為之經紀其喪將葬先生于亳城南先塋之次而緘其遺文因蘇州守王君子正請銘於豫無何蘭使人來速銘且告葬期曰卒之嵗十月十八日近矣曩先生常寓書於豫叩以致虛極守靜篤與未發之中其旨同異余未及復請於先生也竊妄意之言中則虛實動靜貫之矣言致虛則遺乎實矣言守靜則遺乎動矣寂而未嘗無感而未常有吾儒之所指為中也乎內有鍵而不出外有扞而不入老子之所指為虛靜也乎以是復于先生先生其許我哉雖然先生之注老子則可謂得其髓者矣乃竊取先生之意而為之銘曰在昔老𥅆握𤣥化樞人皆競巧已獨若愚吾師嘆焉其猶龍乎棼棼末學枝葉日繁豈不菀然而撥其根維𥅆之生實自譙亳寂寥至今西原有作閉戶獨窺微言五千參諸孔庭獲我同然孔曰未發聃曰靜虛立教有二其究豈殊譬如入海所貴得珠其所從入孰一其途自是反躬精思力踐默然一悟與天游衍亳之南墟有鬱其墳嗚呼西原今尚何存吏部郎中西原先生薛君墓碑銘文徴明嘉靖二十年辛丑正月丙申吏部考功郎中西原先生薛君以疾卒於亳之里弟是嵗十月庚午葬城南一里祖塋之次其友蘇州知府王廷伐石表其墓長洲文徴明書其石曰嗚呼先生天下士也今而已矣有如斯人可復得邪始𢎞治正德間何大復李空同文章望天下摛詞發藻輘轣漢晉一時朝野之士翕然尚之先生雖稍後出而聲華望實略相曹耦又皆感槩激卬有志事功天下之士所為望之非直文詞而已其後二公以提學副使先後死先生仕嘉靖初為吏部屬寖顯矣而剛腸疾惡與時抵捂竟為小人所乘迄又廢死是其經世之學卓越之才與凡有為之志皆不得少見於世而今已矣嗚呼余所為致慨於此豈獨為一時一郡惜之固為天下惜之也先生諱蕙字君采號西原晚稱大寧居士其先河南偃師人國初以赤籍𨽻武平衛遂為亳人高祖彬曾祖森祖琇世有隱德父鎰封吏部主事母楊氏封安人先生舉正德甲戌進士初授刑部貴州司主事病免起告改福建司尋改吏部驗封司進員外郎再進考功司郎中卒年五十有三先生生而靈異七嵗能屬文稍長出語已驚其里中老長十五補郡學生試應天不利益歸肆力於學質義揚榷雋味道腴經義之外尤攻古文詞亳故偏鄙學者無所承籍先生掘起齊民能自得師不階梯級徑造作者之域今大中丞儀封王公判亳得其文竒之曰是固何李之流也亟延譽之提衡引重俾益有聞故先生未仕而其名已隱然動京師及舉進士雅遊諸公間益精進不懈初官法比文法章程披抉藂挫而先生不忘問學羣經史籍讀之幾遍見諸論撰精深典則不為長語為詩溫雅麗密有王孟之風樂府歌詞追躅漢魏然先生不以為能直欲見之行事其治獄精審不為骫骳而析律詳明所當必允嘗蒞本科凡諸司奏讞悉從詳定傳爰論報既靡罅漏而又緣飾以文條列燦然一時法家咸推之以為能在吏部尤事甄别公清介潔銓叙維審故事曹務惟長官關决二佐漫不得省屬時曹長皆先生相知事必集議先生審畫緒正每公言之在考功未久而展采錯事已卓有端緒性彊執遇事直前無所觀望武宗南狩先生抗疏諌止同時諌者或標表示直或解嫚恐諛而先生不訐不隨直申其志雖聖怒叵測而履坦俟命不為回折今上議追王之禮廷臣論奏紛然上意初無固必而主議之臣持之甚堅故諸臣往往得罪去先生曰是不可空言奪也乃著為人後解大要謂大宗不可絶而義變則適子可以為後又著為人後辨謂繼統故繼嗣而繼嗣所以繼統且禮無生而貴者雖天子諸侯之子茍不受於君父亦不敢自成尊也其言出入經傳援據精核而詞㫖頗激人為傍懼而上不為甚忤甫下獄尋即貰赦而主議者銜之會陳洸者以給事中補外中道上書議禮得復召見言事因附當路盡擊異議者去之先生時已被原無可刺者遂起顔木之獄而先生去國矣先是亳有武臣悖謾隂賊為暴於境內從橫圉奪漸不可制顔守亳盡發其姦私深探其獄而置之法至是稱寃下有司推劾洸以先生亳人顔其同年進士於中疑有奸利有詔勒停聽理已而事白而先生乃無所坐例得牽復然先生荐罹跋疐視畏途如棘縮斂自愛不復有當世之志臺臣論薦嵗無虛剡四方之士日徯其用而先生不可起矣先生恬靜寡欲舉天下之物莫有動其中者所與遊非道義不親紛華聲利之言一不出口平生未嘗以私干人人亦無敢干以私者晚嵗自謂有得於老𥅆𤣥默之㫖因注老子以自見詞約理明多前人所未發又喜觀釋氏諸書謂能一死生外形骸將掇其腴以求會於吾儒性命之理蓋亦閒居無事用寄其淵微深寂之趣耳或以為有所沒溺而實非也所居之西隙地數弓即所謂西原者故有水竹之勝至是益加樹藝室廬靚深松竹秀列陂魚養花日游衍其中著書樂道悠然自適遂以是終其身所著有約言老子集解五經雜録大寧齊日録西原集揔若干卷先生事親孝喪之易而能戚與兄蘭雖異出而事之極恭家事叵細悉主於蘭同居五十年友愛無間先生娶趙氏無子蘭實主其喪云銘曰維薛之先偃師其奕别籍于譙世載厥德顯允考功展世斯宏載言翼之奕其英英孰不有言我掇其雋內澡玉融亦貞其踐踐德以升列于周行爰飾厥躬弗愆用臧司刑則明官人維敘以比以俌以莫不舉顯允考功直躬弗折亶攄厥誠罔私以訐天崇地卑禮攸有定匪無經權我惟其正謇謇揭揭孰諛以阿豈天則高壬人孔多彼壬則多我攸有適向晦而明乃晏以息言考于槃履貞用恆著書滿家身否道亨繄亳之南有原維塏我銘君藏以俟千載考功集附録
