body:
  text: 考功集卷八明薛蕙撰五言絶句花下昨朝花始發今朝花已稀那為風吹落自是鳥驚飛草堂終朝草堂上獨憑烏皮几有時白雲來相見窗户裏通許館對月花上月纎纎蛾眉映繡簾從今三五夕相伴客愁添滁陽孫氏山中五詠泉源泉源不可到想像青雲杪由來此路遙莫謂游人少流觴渠流觴泛激水手攬跳波濕恰怪杯行遲風吹忽相及月橋泊舟板橋口月出溪水緑何處采菱歸遙聞榜歌曲雲洞洞門雙玉扇隔岫窺雲霧裊裊三石梁苔滑不敢度留客亭亭中留客處客至亦忘歸把酒看春草西山日已微城南梅開簡友人郭外新梅樹春風吹欲殘未能攜酒出幸為折花看御溝夾城開玉檻內苑抱金溝宫女停珠佩仙人上綵舟西園西園一游矚正及上春時熒熒花變色漠漠水生姿納涼空林露華濕開閣徙清尊月出芙蓉水風生鳴鶴園落花今朝捲簾坐時見一花飛不惜芳菲盡春風稍稍稀晚春日長鶯語歇中酒眠髙閣庭院寂無人春風掃紅萼早秋為愛新秋至朝來步水濱微風猶未起涼意滿青蘋泛舟落葉積沙水寒花帶石叢白鷗隨病客日日泛溪中中夜觀月出殘露洗青靄傾河流素暉自為生遲暮遂令相賞稀秋浦秋浦多香草當年怨楚臣安知千載後尚有廣騷人東皋東皋落日明西候新飈冷徘徊磐石上愛此青松影早春白髮常多感青春亦不平落梅饒慘淡新柳太鮮明六言絶句田園樂七首一徑垂楊髙下數家流水東西麥隴青青雉雊柴門寂寂鶯啼稚子自操井臼老農共話桑麻采藥常隨樵客乘籃時造僧家荷鍤朝耘瓜圃披衣夕偃蓬廬甕裏數升緑酒枕中一卷丹書官罷交游自絶病間琴酒相親門下惟饒飲客坐中時有談賓蘿蔓半垂甕牖松隂全覆茅軒數聲雞犬深巷一曲煙霞小園掃石旋鋪琴席臨流試泛酒巵山水依依可戀風塵擾擾何為碌碌俯頭轅下栖栖垂翅籠中遮莫朝端巧宦何如谷口愚公七言絶句奉同王浚川海上雜歌九首由來東海百川尊呼吸風雲日月昏隱隱三泉盤地軸迢迢一水上天門天雞啼處夜生潮東望蓬萊翠霧消紫貝髙為雲外闕青龍盤作日邉橋地脉東南一線開千流萬𣲖幾時回恰從瑶圃峰頭去又逐銀河天上來方丈瀛洲一水傍層城懸圃羽人鄉青雲不散三花樹丹露長零五色漿石門雙闕入蓬瀛日日惟看雲霧生白蜃吹霓晴後見翠蚪銜月夜中行海上三山倒影垂風吹波動錦漣漪雲中對出神仙闕地底雙開日月池白鶴東飛去不回不知何處是蓬萊漢皇虛築迎年觀嬴帝空餘望海臺王子題詩滄海岸青鸞銜去海東邉龍女織成紅錦字仙人吹入紫簫篇長風吹出六龍車夜坐天壇吸紫霞自是神仙逰海上元非逐客卧天涯十五夜病身愁思兩蕭條亂帙殘燈伴寂寥但覺年光欺倦客不知春色媚良宵奉同何大復苦熱行十首夏日日長不可論扶桑萬里過崑崙青天盡閉蛟龍雨赤氣遙衝虎豹門崆峒霜雪近幽燕閶闔神仙捧御筵舍人退食苦炎熱卑濕南方更可憐六月長安冰井臺雪宫杳杳風門開江邉此日苦消渴闕下當年拜賜回天上火雲不肯晴城頭霹靂浪多驚終朝虛覺神靈聚幾日真看風雨生草堂低小只三間日日炎蒸不暫間初驚滄海臨湯谷更訝朱陵入火山金壺玉碗露漿調緑李黃梅冰水消不奈五侯無限樂可憐三伏為誰驕三年卧病楚江扉六月池臺滿眼稀玉笙樓上含煙霧只許仙人醉酒歸仲默少時夢至一樓臨水榜曰玉笙樓人間毒熱不可當想見山中樓閣涼三十六洞何處好欲借神仙白石牀盤古山中太始雪六月天邉萬里風下界並愁炎火劫丈人長對水晶宫大復山一名盤古山太液甘泉冰雪生君王避暑奏歌聲不須玉女招商曲自有仙人苦熱行皇帝行幸南京歌十首白鷺洲邉玉帳開錦帆東指鳳凰臺怪底鯨鯢竄江底君王駕馭六龍來天風吹動翠雲裘坐看樓船下石頭江左重瞻天子氣金陵長作帝王州建業城西江水回千官遙望翠華來天子雙鞬懸錦帶近臣爭上萬年杯翩翩翠蓋覆鳴鑾詔許都人夾道看樂府盡歌楊柳曲後車多著鵕䴊冠憶昔髙皇定鼎年鍾山龍馭已登遷八葉神孫因耀武衮衣親得拜陵前燕姬玉袖抱箜篌馬上長隨翠輦游春來照影秦淮水愛殺江南雲母舟淮水南邉是狹邪蛾眉臨水折江花日暮龍舟泊何處玉牀拋在五侯家𤣥武湖中緑水多君王日日愛經過宫女能為蕩舟戲中官學唱采蓮歌吳王雉翳春依草宋帝羊車夜逐花總是南朝舊時事我皇行樂倍繁華三月江南鶯亂啼江邉桃葉映春堤不是行宫淹北上金陵花月使人迷中秋夜待月海上珠宫向夜開銀河初轉緑雲來遙聞仙樂生林壑暗覺天香拂酒杯逺游曲十首贈鄭繼之并序祠部鄭少谷以病謝歸烏石山中先將抵杭越訪天台四明諸山南循浙江望閩海而返余壯其行賦贈之烏石山中生紫芝少谷先生歸去時贈君試作逺游曲較似仙人碧落辭闕下屢移稱病書知爾不復少躊躇海上但留雙玉舄山中誰見五雲車五嶽之山君遍過名山不比浙江多赤城直上仙人闕天姥斜連織女河赤城宛轉石為梁雲裏振衣千仞岡聞道台州老太守為君先已築丹房顧華玉時刺台州太白山人髙士流十年不出卧滄洲爾去相逢託相訊南來儻許共扁舟越中㑹稽天下無金庭玉室是仙都即向山隂覔芝草還從禹穴探靈符丹山赤水足華滋雁蕩龍湫更自竒招隱頓憐君去早移文應笑我來遲鏡湖緑水畫難成五月南風菡蓞生越女舟中歌白苧道人醉卧酒船行海門東去片帆歸却傍三山開釣磯人間物色那能見空向青天望少微天地今經幾劫灰區區人世只堪哀莫漫著書拋嵗月徑須餐玉訪蓬萊雪七絶流風回雪滿蓬萊墮葉飄花海上來隱隱珠宫連月起亭亭銀闕向雲開緑水初冰百子池飛花正滿萬年枝君王夜醉瑶臺雪侍女冬歌白苧詞永巷沈沈夜漏稀玉階寂寂雪花飛空持紈扇歌瓊樹愁對銀缸襞舞衣玉人燕國舊傾城對雪臨風更有情鏡裏新粧爭皎潔簷前垂手學輕盈宫裏仙人字麗華弦中纎指學琵琶朝來白雪當窗立一曲彈成玉樹花苑外樓臺繞狹邪雪中歌吹競繁華麗人對舞明珠佩俠客爭馳白鼻騧曽聞楚客陽春曲擬賦燕京子夜篇假藉彩毫分氣象直慚白雪鬬嬋娟讀金剛經一卷天華羅梵策千年馬耳射春風知言安得蒙莊子具眼惟聞陳了翁書老子解後柱下遺編久翳如偶將管穴讃𤣥虛當年己自無知者何事而今更著書早春樹梢紅潤水波眀新鳥啼多百囀聲從此小園增物色杖藜日日看春生一溪一溪雲水一漁夫一曲滄浪酒一壺笑指桃花問春色武陵得似此間無曉寒洞門風急薜蘿斜滿院踈桐洗露華一榻曉寒難穩卧道人賴是服朝霞中秋看月二首穆穆金波端正月寥寥碧落蔚藍天松林隂映石牀净宴坐焚香骨已仙秋光秋興最相關中夜中林猶未還似聞鸞鶴青冥外遙見樓臺桂影間春日漫興十二首昨夜雨聲喧菌閣今朝花影照柴扉正欲相邀社中客酒家不肯當春衣草芽半吐參差碧花蘃初開淺淡紅安得黃金髙北斗盡輸青帝買東風二月黃鸝滿樹飛歌喉宛囀世間稀謝公雖有東山妓不及儂家金縷衣梁間燕子甚微眇嵗嵗來過舊主人不似翟公門下客交情淺薄最堪嗔早嵗修辭擬草𤣥中年探賾强知天爾來懶慢太無似只有楞伽堆案前屈指行年垂半百拘檢還如少小時可憐齪齪窶人子爭似堂堂豪俠兒散才猶足擬仙才懊惱青春白髮催空對玉壺連月醉漫拈綵筆記花開勞勞各為百年身草草旋成一聚塵借問煎熬催白首何如潦倒醉青春東園紅梅餘幾何西園緋桃開又多春光相撓不相置醉殺花前金叵羅小橋映帶小池塘垂柳垂楊凡幾行鶯鶯燕燕最相稱雨雨風風總不妨魏紫姚黃何似春玉環飛燕定前身謫仙解賦清平調不道宫中妬殺人柳繞柴門竹繞軒花能含笑鳥能言何人文似卿雲輩試為抽毫賦小園戲成五絶束髮從師王浚川文章衣鉢幸相傳爾時評我李何似白首摧頽只自憐弱冠粗窺萬卷餘壯年益覽百家書探珠赤水方親見披霧青天果不虛雅知文藝未為尊次第沿流直討源不但學詩髙一格信然聞道小羣言海內論詩伏兩雄一時倡和未為公俊逸終憐何大復粗豪不解李空同知已今無賀賓客論文誰似鮑參軍夜光未剖千金璞汗血空隨萬馬羣題空上人山房古寺殘冬倍悄然老僧閉户獨安禪氷滿瓶中無滴水香消罏畔有餘烟宮詞十二首禁圍處處鎖名花步障層層簇絳紗斟酌君恩似春色牡丹枝上獨繁華閒倚闌干看柳條可憐渾似董嬌嬈東風何處吹桃李空費心情學舞腰年年永巷掩朱扉愁慣多愁却漸稀偶對春風見花落一雙玉箸墮羅衣玉階簇簇海榴紅畫閣泠泠菡蓞風悶卷珠簾看日影鴛鴦相倚緑池中繡簾風動水精光小苑離宫好納涼盧橘楊梅零落盡只聞清蹕幸昭陽荷花布錦柳垂絲一片丹青太液池御榻獨留清暑殿宫娥空唱采蓮詞翡翠樓中落日明芙蓉帳裡嫩寒生人間一種清秋色偏到深宫别有情落葉無風滿地溝袖中團扇早知秋寶奩紅粉都拋却展轉空牀盡日愁紅袖低回拂錦茵玉顔憔悴掩羅巾空房獨對嬋姢月賴是嫦娥不笑人斗帳氤氲沈水烟蛾眉那得帶愁眠鏡中莫倚人如玉枕上真成夜似年白雪霏霏拂玉闌銀釭耿耿夜漫漫熏籠火冷青綾薄不管娉婷不耐寒翠袖年年積淚痕羅幃夜夜憶君恩紗窗月色不成夢金井烏啼更斷魂新春賞梅花作落梅樹下攜酒巵便與東風預作期從今日日覔花飲直到荼䕷開盡時溪濱柴門咫尺即溪濱賦得新詩似寫真蒲芽短短桃花水燕子飛飛楊柳春春日宴南園謝公攜妓踏春暉撩亂桃花落舞衣池邉偶學流觴飲月下真成倒載歸春日郊居竹裏柴門盡日開半園芳草半青苔恨無名酒山翁醉畏有髙軒俗客來讀李空同詩可憐詞客李空同治第築園學富翁地下定遭劉主笑我猶如此況如公上已日簡諸友渦瀨縈回曲水流春風蕩漾羽觴浮羣賢酣暢蘭亭㑹只少山人許逺游山館山館蕭條客到稀幽人閒暇坐披衣日長燕子丁寧語風靜楊花自在飛小閣曲几匡牀小閣深數函圖籍一張琴不聞世上喧譁事自愛林間宴坐心嘲楊花陌上楊花四散飛千蹊萬徑巧因依莫矜風便縱橫去㑹見途窮寂寞歸春暮祗愁春暮減春光誰道春光未渠央芍藥如雲仍著色荼䕷似雪更生香杏花東風作意辨年華先釀輕紅上杏花楊柳初生燕初到春光併屬野人家芙蓉西風慘淡自堪愁賴有穠華殿晚秋莫遣烟霜妬花萼好留雲錦照汀洲梅花嵗晚山空不見人鳥啼花落倍傷神玉顔棄置冰霜裡讓取羣英競好春考功集卷八
