body:
  text: 考功集巻五明薛蕙撰五言律詩藥室詠六首山階穿藥井石室置丹爐壁掛三天字函封五嶽圖仙人邀對酒玉女伴投壺但逐雲霄去無論日月徂寂寥花水上結構羽人廬窻户生雲闇松杉映月虚犬靈因試藥鶴老解窺書長揖當塗客榮華不可如春院焚香處晨闗却掃時緑綈装古帙白石種靈芝招隠劉安賦遊仙郭璞詩蓬萊多舊侣題字問相思自知靈氣舊轉覺道情新露濕星壇夜泉生藥院春青泥含石髓丹熖起龍鱗若得金砂就還須贈所親棲息那云僻芳菲已自多跡應無客到景復有春過户内三青鳥花間五色蛾傳言逺遊子不必向山阿移牀開藥籙鍊玉閉丹房五石終朝轉雙瞳幾嵗方壺中能駐景天上任飛光永得長生術將留不死鄉臺上臺逈通風榭窻虚近水城巻簾殘暑去攜手晩涼生碧樹藏雲暗銀河度月明醉來愁髣髴只作畫中行水亭二首路引水亭出舟行沙岸迴使君攜客至歌伎逐人來檻底鵁鶄舞窻中菡萏開風光莫相負長日且銜杯中流放輕舸極望何青青宛轉遵蘭渚夤縁到水亭簾櫳圍樹石堦砌列烟汀緩坐留斟酌長歌間醉醒邯鄲舘中門對罘罳静城臨睥睨斜愁人倚髙閣清夜動悲笳月暗雲生葉風寒露作花徘徊望牛斗髣髴辨京華北征地闊塵沙外天寒霜露中燕雲常少日朔氣自兼風夢斷南棲烏愁隨北向鴻淹留憶攀桂辛苦歎飄蓬昭王臺燕昭無故國薊野有空臺寂寞黄金氣凄涼滄海隈腐儒終報主亂世始憐才回首征塗上年年此地来九日同何仲黙出郊九日登髙㑹同人載酒來寒城一以眺秋色正堪哀零雨晨初霽浮雲午未開南飛有鴻雁為爾立徘徊駕出南郊青鳥南郊至蒼龍北闕來遥傳仙蹕下正覩紫微開倒景中天館叢霄上帝臺從臣多獻賦誰似子雲才駕幸南海子詔幸芙蓉苑傳言羽獵行三驅陪上將四校出神兵列㦸圍熊舘分弓射虎城風雲日暮起偏遶漢皇營春日禁中遇雪紫禁春朝雪花飛彩仗新霧交隨雉尾風引避龍鱗掌濕金人立窻寒玉女顰翠華沾灑處遥憶屬車塵元夕興隆寺觀燈燈火金仙閣丹青綉佛筵叢林開寳樹大地出紅蓮梵鏡含明月天香雜彩烟諸公共隨喜吾醉欲逃禪送劉子緯病歸鄴下劉文學成都漢長卿淹留卧病意蕭洒著書情賓客頻頻去風塵轉轉生天涯雙淚眼回首送君行送周侍御閩越三山外東南八郡遥褰帷向絶徼攬轡下中朝風起江潮動霜飛瘴霧消九重思諫諍計日上雲霄送李儀賓漢殿朝正至燕京送客迴春風兔園路歌舞鳳樓開綠水清泠閣西山皷吹臺宋中詞賦地他日好歸來海棠畫扇西蜀繁花樹春深亂蘂紅還憐彩扇上宛似錦城中影轉團團月香含細細風江淹才力減賦爾若為工江淹有綵畫扇賦病中何仲黙蒋子雲過訪何人顧寂寞盡日少歡娱慰藉煩知已扳留强病軀濁醪來近市野飯出中厨珍重交親意艱難愧腐儒送徐中夫令南昌孺子躬耕地諸孫邑宰時承家在爾輩髙士亦吾師山坼洪崖井江深許令祠縣齋臨絶境未可廢言詩贈董應期侍御同時多逐客而我獨憐君棄置勿復道凄凉不可聞風波一流落江海遂離分他日書相及常因西北雲答王允升省中對雨見憶之作康樂愁霖唱平原苦雨詩故人歌此曲贈我慰相思薜荔垂青閣芙蓉汎緑池今朝一樽酒最恨不同持送毛敬父之廬州北峽吞淮口東陵控海隅霍山分岳鎮肥水混濡須従事之官逺觀風問俗殊廬江多小吏應候府中趨望湖亭隂磴穿雲上天窻綺霧中蒼茫玉泉水指㸃翠微東坐石牽蘿蔓攀崖憩桂叢何當避炎暑几杖待秋風石經寺翠巘雙林合丹梯一徑懸洞門臨地底石室與天連文字開龍藏金銀布梵筵兹山實靈異吾欲託棲禪送蒋國信之桐鄉始對賢良䇿登科遊漢京俄分尚方履出宰卧江城余憶東南美長懐山水情須君為地主早晩越中行七夕集廷獻宅秉燭開秋宴更衣坐晩涼雲霄降帝子詞賦接仙郎月寫蛾眉色風傳玉佩香慚君有妍唱欲報不成章七月十五日夜對月嫋嫋涼風夕紛紛零露時秋來看明月風露已如斯況對西園酌兼懐康樂詩山中有桂樹今夜足相思道院秋日海棠偶來仙館内花蕚滿枝紅彷彿看珠樹玲瓏暎蘂宫預傷白露下坐惜綵雲空躑躅攀條處佳人不可同宴故英國公山亭即文皇帝賜第東第君王賜西園賓客來将軍元好士公子復憐才玉袖花間出金尊竹下開還須明月上莫畏夕陽催送戴長史詞臣漢廷出邸第魏王開地即清漳郡人同鄴下才月中遊桂苑風裏宴蘭臺宣室如相訪長沙去復來八月十五日夜同諸友翫月樓敞含風氣筵開墜露文月従今夕滿秋向此時分影濕當銀漢光斜隔彩雲徘徊接新詠況是鮑參軍書省内壁終朝謝文墨嗟此簿書繁日宴髙齋静風來寒鳥喧倦遊傷嵗序多病憶田園何事成淫滯微官豈足言雪時車駕北狩大同北極闗山濶寒冬雨雪來霧沈𤣥菟塞風繞白龍堆胡虜猶深入征人且未回遥思穆天子黄竹有悲哀訪雍上人冬日自虚寂東林地更偏經聲行處近燈影望中然殘雪明花苑寒雲䕃石筵祇應休澣暇來此暫安禪晦日夜集晦日歸休晩良游惜後時卻判長夜飲更賦早春詩雲霧窻中入星河閣上垂何須花與月行樂始相宜答士竒能來駐車轍不待拆書緘上客同王粲貧家似阮咸清談對雲竹緩步倚風杉安得盈杯酒今朝共爾銜同士竒子雲飲春風吹酒杯花鳥更相催惜此留連坐判成酩酊迴安能自結束聊復共追陪今日不為樂流光去若頽招廷獻子雲飲廢書多病後抱杖獨行時晩日添花蕋春風積蔓絲物華空爛漫心賞每㕘差遲爾來同醉能無酒一巵春夜過時濟飲露浄開樽處天青㟁幘時素雲将月上香霧任風吹為樂常苦晏含情復待誰徑須成一醉莫遣酒行遲夏日遊道觀隔竹窺丹洞臨池坐碧沙玉拌盛石髓翠籠貯雲芽展簟來風色吹笙上月華休論河朔飲詎似醉流霞陳真人館中賞荷花作别館瀛洲麗新花菡萏香紅衣迷日色翠葢寫波光雨過金塘濕風生石檻涼客來修竹下回首見瀟湘仲夏即事林卧采芳草今朝鶗鴂鳴悠悠觀物化黙黙感吾生老大慙聞道空虚耻近名沈吟日云暮搔首獨含情江中四詠送黄日思韻限本題同諸公作江霞春江變氣候孤發雲霞散影揺青草流文漾碧沙紅泥迷燕子丹洞失桃花水宿淹晨暮應憐謝永嘉江雲謝客㺯春色江臯生綵雲紛紛初散綺葉葉漸成文蔽日皆相映流風乍不分何因可持贈欲以慰離羣江花百丈牽江路行穿夾㟁花時憐一水曲逺愛數峯斜林下見垂釣溪邉逢浣沙武陵如在眼髣像羽人家江猿舟行轉江峽處處響哀猿極浦雲方合連山雨正昏接條時自挂飲水復相援不待三聲盡先傷游子魂六月八日西闕遇雨窈窕西清内參差水殿連歸雲向平樂飛雨集甘泉眀月裁班女迴風唱麗娟龍池初望幸來往木蘭船落日落日掩書卧荒庭起獨行回看太虚上窈靄動秋聲寂寞抱真藴飄颻遺世情白雲不相識何肯入前楹寄何仲黙久别憂成結書來不解顔開緘未讀半攬涕望秦關簿領余方倦馳驅君詎閑相將保玉體去去入名山九日遊興隆寺厭就騷人㑹欣投釋子家林風鳴貝葉徑露濕金沙宴坐依雙樹清齋服九華晩來歸客倦欲借白牛車晩過仰之置酒燕京久為客秋日正思家不忍聴鴻鴈相尋醉菊花空庭餘木葉短褐滿風沙同病今如此酣歌惜嵗華晩坐有懐落日照簾櫳寒城烟霧中銜杯對衰菊流目送歸鴻未覺賞心廢但驚親友空遥遥此時恨萬里託秋風對雪庭雪曉逾鮮鈎簾興渺然紛紛墮花絮裊裊亂風煙悵望游梁賦沈吟憶戴船佳期毎遼濶留恨閲芳年謁茂陵祀孝貞太后一棄東朝養千秋不復歸夜臺長寂寞月殿少光輝野露棲金盌山風動玉衣茂陵多碧草春日自芳菲功徳寺憶昨宣皇帝西方結勝縁莊嚴修佛土功徳施人天龍象山開闢金銀地接連傷心萬嵗後陵谷尚依然蕭氏園二首麗日方春暮名園更水隂葱蘢花滿徑迤邐竹成林不見川原盡祗愁雲霧深向非霑醉後幽絶恐難禁徑狹褰裳處川平伏檻前華林一何麗碧水復相鮮魚鳥方堪狎纓緌頓可捐居然謝塵垢不待濯潺湲送馬伯循二首弱嵗來京邑已聞之子賢長懐慕先達詎意竊同年感激深相附逡巡只自憐如何復為别瞻望益茫然城隅飲餞地日暮朔風吹征鳥不返顧浮雲相背馳踟蹰意何極嘆息涕空垂世路今如此焉知後㑹期重游蕭氏園二首别此真如昨重遊換物華粉滋曽倚竹紅淺舊看花沙阪縈林曲山籬逐水斜城南咫尺路未覺往來賖野靄横蘭徑泉聲落草堂丈夫修鴈繳童子護魚梁釣弋亦堪老風塵緣底忙淹留不忍去日色晚蒼蒼歸别業作五載去京國今來歸舊廬林荒巢野雀徑毁蔓園蔬意倦風塵際身危疾病餘多慙久懐禄牢落此田居扶䇿東風解娱客往往慰幽栖扶䇿循蘭徑流鶯逐我啼青莎已齊葉紅藥始含荑昨覔隣家酒今朝聊可攜西齋西齋休憇地永日卧書帷燕舞隨風絮鶯啼集露枝病因閒自療春與醉相冝却悔牽行役年來忽去兹郭外郭外平蕪逈溪邉小徑斜客行迷野竹鶯語隔林花多景每難遇孤遊還自嗟佳期竟何許脉脉向春華西園對雨漠漠春隂黒連朝卧小園野花川上落水鸛雨中喧衣裌身猶冷看書眼欲昏不堪逢寂寞倚仗有清樽酬惟喬贈巾野巾初著日心賞竟朝曛試正行窺水從欹卧看雲坐翻嫌月露出每避塵紛顧影還相笑風流媿使君酬惟喬惠鹿憐此園中鹿君侯贈野夫塗艱常近患物儁益妨軀林藪空相憶藩籬坐自拘忍甘充玉饌願為束生芻泛溪避暑清溪曲舟行路不窮詩成孤嶼上酒盡夕陽中緑竹含秋色紅渠送晩風歸來就眀月移棹水雲東秋夜西園秋漸好晩眺倚山扉鶴語風生竹螢飛月滿衣乍憐幽意愜飜恨賞心違延佇空林下中宵獨未歸别墅即事丘中輟耕牧挈杖返衡門落日茅茨暗秋天禾黍繁隣人送巵酒小婦具盤飱念此信為樂悠然懐故園秋日溪上何處窺秋色搴舟入水隅清波照鳬鴈寒露洗菰蒲促迫悲生事登臨快病軀由來野人意終日羨江湖九日顔子攜飲西郭九日愁空卧西園喜並游閒居同栗里置酒得荆州樹擁樓臺出雲隨皷吹浮不辭重落帽短髮自堪羞新舘别墅棲遲處髙齋登眺初故渠臨圃近新竹繞庭踈素心已澹泊絶學轉空虚非闗選幽勝偶此寄吾廬晩過鄰叟野外嵗隂早晩色正霏微石蘭向風靡海鶴犯霜飛投策暫云憇采苓方未歸幽人已相候隔水啟荆扉環堵環堵郊墟外衡門野道邉林昏罷風夜月白欲霜天落魄隨身世棲遲失嵗年平生有微志今已愧前賢不寐一榻微寒入山房夜未扄凝思天籟發不寐谷神醒本自淹衰疾何堪役性靈列僊如可學吾欲駐頽齡丘中返照丘中路孤烟水上村野田荒蘚色沙岸落潮痕日短䞉書巻天寒頻酒樽定知無客到不必掃柴門原上曉望平原揺落盡極目見寒空初日煙塵外滄波晝夜東孤芳遺雨雪髙鳥下天風俛仰無相晤長歌思不窮負郭負郭茆堂小臨溪竹圃斜山樽攜野客魚網曬鄰家荒徑封殘雪踈籬透晩霞預思春到日著處種桃花晩步落日滿平蕪風煙似畫圖空林助鳴鶴逺浦失歸鳬白幘狂猶岸青藜倦自扶歘思酬物色佳句未應無寂寂寂寂多相笑悠悠畧自諳謀生只如此經國更何堪偃仰身微健踈慵味頗甘敢云忘魏闕正爾戀江潭贈顧英玉時謫許州過亳見訪殘冬江北路寒苦異金陵駑馬行來逺衰顔别後増劔埋餘紫氣玉玷有青蠅世故多堪惜因君重撫膺漕河舟中作悠悠漕河水今日更遄征敢議占時出祗言循禄行田園違宿昔軒冕累平生緬憶髙賢跡遲迴何限情元夜諸公㑹不赴九陌帝城中煙花繞漢宫銀河流夜月火樹煖春風衾枕憂如昨軒車恨不同時聞玉珂響寂寞卧牆東送南元善守紹興傳