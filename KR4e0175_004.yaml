body:
  text: 考功集卷四明薛蕙撰七言古詩元夕篇皇都佳麗地春日艷陽年共愛元宵好爭歌明月篇元宵明月滿蓬萊春色先從上苑來千門宛轉銀屏隔萬户參差金鎖開千門萬户連雙闕綵女新粧踏明月映牖窺忩態轉多含嬌凝睇情無歇正逢春日愛芳菲復值春宵縫舞衣燈光斜照珊瑚枕香氣空薰雲母扉此時天子盛遨遊離宮别館足風流才開鳳島張燈架更起鰲山結綵樓綵樓岧嵽鰲山側復道交衢對南北萬燭翻疑白日光千燈却亂春星色春星暗靄迷煙霧仙籞分明見天路空裏翩翩翠蓋飛雲中冉冉鸞輿度翠蓋鸞輿千萬騎伐鼓摐金動天地御仗層層錦繡圍廣場隊隊魚龍戲就中别有王侯客三三五五長安陌夜夜經過許史家朝朝遊戲金張宅金張許史鬭驕奢金燈玉帶剪春紗鴛鴦比翼玫瑰樹翡翠雙栖菡萏花龍膏鳳炬列千行蕙火蘭煙百和香月華照耀琉璃障霧影氤氲玳瑁梁可憐豪侈誰能似可憐行樂心無已曲罷頻移歌舞筵醉後重遊燈火市月市星衢遊未遍東城南陌時相見妖童繡勒五花馬倡女銀車九華扇妖童倡女繁華子雙去雙來帝城裏粉色偏從月下明衣香故向風前起調笑行歌歡未闌浮影流光夜遽殘朝來試過狹邪路墮靨飄花那忍看龍虎山歌送范同年汝和豫章之東龍虎山南斗垂耀當天關祝融廬霍引襟帶三江九𣲖奔回還山盤水曲入仙城疊巘層崖上紫清中天日月照樓閣二十四岩金碧明巗室洞房煙霧裏玉户金窗宛相似丹井深通滄海潮翠屏倒挂天河水翠屏錦壁百千回緑岫青岑宮殿開羽人龍駕去不返仙吏仍飛雙舄來雙舄朝天還帝鄉飛來飛去名山傍仙嶠雲霞長不改天壇花藥依然在却向山中寄紫書故人闕下遙相待送范師舜調南京兵曹兼訊顧英玉范雲移官赴南署買舟官河下江去君家住在岷峨西回首江東望鄉處蜀客吳人解相笑可惜風流本同調江左應傳洛下吟尚書更羡臺中妙尚書臺中多暇日相逐郎官騎馬出載酒觀棋樂未稀登山臨水情非一眼中六代繁華地弔古悲歌動人意冶城無復謝公行新亭曾灑周郎淚君向吳城我燕市年來亦憶蓴鱸美幸為傳聲謝顧榮何時共飲三江水寶劒篇昔聞歐冶鑄寶劒冶中蛟龍歘揮霍冶開火歇蛟龍失黯黯青雲吐芒鍔赤山丹液色鬱勃白帝金精氣縈薄翠珉磨出氷洞明寶鞘裝成金錯落鸊鵜膏瑩科斗字鹿盧玉映芙蓉蕚坐上傳看疾風起尊前拔舞驚虹躍蚩尤蒼黃化石隕天吳辟易隨潮却果然魑魅忌精爽坐令神物藏冥漠由來世事不可測須臾淪落豐城側玉珥雕零苔蘚昏雪花蠧蝕塵沙黑當年得意斷犀象今朝失路埋荆棘地底龍眠鬼猶泣斗間氣騰人未識泥塗汚辱君勿悲風雲變化時將逼掘獄重開雙寶刀入市爭酬萬金直自古英雄每如此平生蹉跌長嘆息哀歌謾作行路難髙飛自有橫天翼羲和行五月日食作羲和東來海神泣丹霞閃爍玄雲急風纒赤道吹星隕龍鬭青冥學人立軒轅太一迷南北蟠桃若木無顔色上帝巫咸杳不聞仙人側目天門黑題陳明之畫菊為何子元先生作憶昔先皇十八年學士風流滿當代就中太僕真瀟灑至今畫菊流傳在中丞此卷畫更竒秋花錦石雲霧姿追思盤礴解衣處想見酣歌縱酒時當時畫此蓬萊觀自謂平生此其冠畫成持贈燕泉公滿堂醉客空嗟嘆回首斯人已難得長使中丞憐粉墨拂紙偏驚白露寒開緘稍覺悲風色中丞逺適西南地索我題詩見交誼百年許與詎偶然萬里提携不相棄陳琳後事不堪論水部文章今尚存病客安能賦思舊主人須為續招魂鄭繼之館內積雪為小山戲作長句君不見少谷子飢寒卧病長安裏長安臘月雪一丈怪爾朝來何技癢陵晨掃雪為小山數峰突出忩户間我時過門訪子入子也階前荷鋤立亂垂散髮雜塵垢斜挽短衣半沾濕憶子前年覽吳越東遊四明尋禹穴慣矜赤腳踏層氷苦覔黃精斸山雪平生好竒心未已今朝作戲聊復爾斫氷積雪止俄頃走海驅山宛相似仄崖崩壁色悽愴玉膏乳竇隂森爽磊砢初驚大禹鑿戍削翻疑巨靈掌君不見五侯甲第當此時紅羅斗帳流蘇垂銅盤燒爉綵雲散玉袖拂面香風吹吁嗟如子何為爾低眉蹙頞凍欲死南唐李忭畫竹題云升元閣上作賜宋齊邱南唐草創金陵日君王材藝還非一宮中初學書畫圖人間早見丹青筆升元閣上朝置酒九華山人前上壽興酣點染雲霧飛畫成揮霍蛟龍走瀟湘洞庭洲島畔雨葉風梢翠凌亂珍重仍兼御字題留傳擬作山人玩人代悠悠朝市改何言畫本今猶在嗚呼金石亦銷毁細看粉墨無光彩我持此卷三嘆息英雄割據終何益虎踞龍蟠尚復存黃旗紫蓋非疇昔富貴繁華如夢寐千秋萬歲皆相似君不見西京空聚茂陵書傷心不獨江南事黃河行贈管汝濟病歸崑崙播元氣積石噴靈波東南控赤縣西北注黃河黃河西北來崩浪觸山開天輪蹙驚電地軸沸奔雷雷奔萬餘里鼓怒何時已懸流白日下漂沫浮雲裏洪波直射三秦道巨靈擘山山為倒二華峰開菡蓞披九嵕夾繞蛟龍抱九嵕嶻嶭青天上下有黃河日搖蕩欹岸長移漁父船清沙好拄仙人杖仙人西歸聊卜築開門正對黃河曲浦口鳬鷖上石牀雲中薜荔垂茆屋男兒挂冠苦不早玉體憂來日枯稿爾去應尋河上公我行欲訪南山皓送太乙子歸華山太乙子棄擲腰間組酒酣慷慨拔劒舞閶闔冥冥不可入西遊華山騎白虎騎白虎登金祶金梯髙髙與雲齊手翳芝草捫虹霓子先茅龍肯相與隨君翺翔逐玉女題郭鳴世鶴亭第五橋東野竹青主人結屋占雲汀扁舟初入泛花水三徑新開放鶴亭亭下蕭蕭鶴一群含姿弄影雪紛紛水邊沙暖行春日石上風寒卧白雲白雲浩蕩滄洲逺憶昔雌雄巢翠巘青田養子衆雛成華表辭鄉干歲返何年偶被雲蘿制羽毛摧折樊籠際拂霧仍思紫蓋飛臨風尚想華亭唳小苑斜連鴈鶩陂上林却繞鳳凰池不須奮翅緱山去相逐鵷鸞集玉墀梁園歌贈李川父君不見梁王富侈甲天子國東築園三百里復道崛﨑象河漢曲池潺湲寫海水詔書益賜膏腴地羽獵常從千萬騎爵馬珍竒外域來賔客遊談四方至本期千秋樂未改奄忽繁華不相待金輿玉輦已零落鴈渚鳬洲竟安在君不見異時鄒陽趨闕下出入雍容擅文雅寧知讒人一開口束縛翻為獄吏罵又不見漢廷不重馬相如謝病因上梁王書浮沉頗與諸生伍枉却當年賦子虛梁園一旦生秋草二公坎壈何足道人間萬事皆虛無詎用區區惡懷抱大梁李侯才絶妙司馬鄒生爾同調江海遙分刺史符文章不待承明詔相逢問訊今如何命也豈免常蹉跎南歸又復不得意贈子聊作梁園歌醉歌贈姚汝修蛟龍未得意居然客泥瀆區區蛭與蚓見之不挂目寧知一旦挾雲霧赤電青霓下相逐白日收光海水沸南山摧倒為平陸丈夫處世亦如此竪子莫輕天下士君不見張儀南遊楚相橫范叔西奔魏齊死姚夫子飲我酒髙歌為君起君今骯髒王侯側我時跌宕塵埃裏時人作色矜權貴笑我摧藏不足畏淮隂仰視里中兒李廣愁逢灞陵尉勸君第飲君莫辭英雄會合當有時少年何惜千日醉他日飛騰猶未遲嵩邱歌送蔣子雲君不見衡恆泰華奠九州豫州巨鎮名嵩邱中天照耀白日景后土灌注黃河流往者天皇題寶帙五嶽真形標第一三花隱映玉女臺二峰羅列仙人室曽聞軒后駐雲軿復有周儲吟鳳笙緱氏山頭鸞鶴去鼎湖水上蛟龍迎君看萬乘亦何似古人棄之如脫屣紛紛流俗笑此言肯把山林易青紫世間萬事俱零落何用明珠彈鳥雀因嗟季子狹三河轉憶尚平娛五嶽我今思歸殊未還夢中每每遊仙山頗疑羽翼落天外但覺煙霧非人間君不見謝公李白神蕭爽天姥羅浮夢來往豫也頻夢山中遊心知自是神仙流異時最愛安期術擬卧名山采芝术羽化青雲雖未期肥遁丹崖詎為失送君南行洛陽道一望嵩山愁絶倒溪口空餘躑躅花澗中不見菖蒲草薄遊已自厭風塵多病祗堪學隱淪明年定訪浮邱伯為掃雲林作主人鄴都引君不見當塗父子全盛時鄴都佳麗侔京師芙蓉池上開朱邸玄武苑中羅羽旗九錫才終俄受禪宮中更起文昌殿功臣北闕賜甲第詞客西園侍清宴雄圖擬謂千萬年于今城闕空雲煙梁沛真人不復起歌舞曽無銅爵伎西陵誰辨古墓田東流惟見漳河水夏夜暑甚不寐手中白團難禦暑氷簟絪縕熱如許髙樓夜半攬衣起簾前坐看銀河徙想像蓬山殊不惡桂樹玲瓏蔭珠閣仙人月下汲玉井海風蕭蕭雲髮冷酬劉希尹贈古鏡歌故人遺我魯國之寶鏡逺自燕都寄譙邑殷勤預恐到時久封外兼將錦為襲夜來夢君在君側朝得君書長歎息開緘寒雪灑衣袂入手秋蟾照顔色背間篆刻無人識鳥迹鱗皴土花蝕依稀尚有雙盤龍似我於君連羽翼當年與君遊帝鄉豈意今者遙相望摩挲明鏡覽愁髮坐驚騷屑生秋霜此時憔悴君不見作詩寄君空斷腸寶刀篇譙國王生名博古故物疊纍滿環堵中有百辟之寶刀太白之精來下土爛如白虹皎如雪紫氣紛紛長不滅卷之如鈎垂欲折舒之還成三尺鐵異哉神物那可比堅能割玉柔繞指蛟龍變化乃如此刀雖竒譎不宜爾王生王生善寶藏何年持之獻我皇指麾上下威四方廷中佞臣如負芒佞臣屏退進群賢巍巍帝德光配天小儒敬賦寶刀篇頌聲洋溢千萬年結交篇交道之難應有以大都難在無君子小人見利不見義相與安能保終始憶昔曽為吏部郎四方賔客滿門墻汝南拔士各題品北海愛才偏激昻一朝余坐大禮罪被放歸田遂沉廢當時門下結交人去作誰家座上賔一書不復訪生死半菽那能分賤貧歲寒僅有數君在餘子悠悠難重陳君不見古人髙誼難比儔今人薄惡真可羞請謝當塗少年輩甘與深山麋鹿遊置酒辭美人洗拂白玉巵老夫自歌置酒辭桑榆之光能幾時含情不飲復待誰我生材質無所宜不擬縱任恆矜持譬如散木不自知欲就繩墨何其癡盛年一去悔可追却對蛾眉慙鬢絲君不見謝公自是天下寶偃仰東山頗枯稿平生掩鼻向富貴一見嬋姢翻絶倒人間混濁殊可憎聊憑尤物娛懷抱屈原湛身亦何補賈生慟哭空自苦漫將一縷係千鈞秪餘碧血埋黃土九州浩浩揚洪波念之豈免泣滂沱懷寶迷邦遭詆訶手援天下可奈何未如間處且婆娑快飲美酒聽清歌及今為樂勿蹉跎明年白髮應更多酬張路寄畫佛及觀音江夏吳生久物故畫手人間無獨步爾來張子出大梁又見丹青照縑素奈何絶藝多自惜未許千金換真迹髙士飛揚不易馴貴人造請空無益遙聞病叟耽玄理為畫釋迦兼大士貫休羅漢殊未工虎頭金粟真堪擬精舍安居伴白雲玉毫瞻禮對罏薰他年負入深山去應寫伽陀重贈君贈王子正侍御江漢英靈鍾蜀都蜀之作者何代無嚴揚王馬耀往牒後有陳李兼三蘇國朝異才楊太史爾來任趙俱名士同時王子復同調四賢相望頗相似嗟哉王子才為纍正色立朝多論議未能默默御史臺甘作栖栖州縣吏小州寡事無簿書時時訪我城南居嵇阮偏知酒中趣莊惠劇談濠上魚君如雲間折翼之孔鸞我如蛟龍失水而泥蟠百年窮達豈足道秪願長生學黃老俗儒白首誦陳編舌弊耳聾殊可憐文章成名第小技博學擬聖非真傳虛生浪死不自悟尚搆空言嘲列仙仙人約我遊峨眉君亦莫負青城期蜀嚴湛冥真我師君家諌議將何為綏山儻遇騎羊子共附髯龍隨所之希夷先生墨竹歌并序蕙家藏希夷先生墨竹之右先生大書絶句云莫貪枝葉亦成龍要悟從頭到底空已遇神仙施筆力風霜不可再磨礲後題云陳圖南作就賦畫之左有章次道魏仲先二絶句魏并有序其略言錢公淡成入華山參先生先生作此贈之蕙自少時即聞之長老云昔野人掘地得石函中得此畫而周揮使廣取之蓋宣德正統間也其後史揮使瓛得於廣子文而方揮使熇復得於瓛子經嘉靖丁酉蕙乃得於熇孫顯宗蕙觀先生詩窮理入微蓋非後世詩人所能言而其字體雄偉不凡兼有古人之法度亦非近代書家之比也鄉使得於外郡莫詳所自則其真贋亦不能明幸而出自吾鄉為數故家所傳事迹彰著衆人皆能言之其為先生真迹可信不疑然數故家皆武人莫知先生為何如人雖頗愛重此畫而不知其為希世之寶也又幸亳地不當要衝故此畫得為吾鄉舊物歷百有餘年而蕙得之不然已為有力者取之他所矣蕙嘗讀邵子擊壤集有觀先生真及墨迹三絶句云未見希夷真未見希夷迹徒聞希夷名希夷心未識既見希夷迹復見希夷真始知今與古天下常有人希夷真可觀希夷墨可傳希夷心一片不可得而言於戲後世不為不知先生顧其知先生甚淺如邵子所謂不可得而言者此豈世俗之所能知哉有能真知其説然後知先生之道超然天地之始彼神仙云者其殆強為之名乎抑先生之詩固以一切皆空豈獨有所謂神仙耶邵子之意亦若是也雖然世無邵子孰不以斯言為孟浪之言夫嘉靖庚子歲秋七月大寧居士薛蕙識水墨淋漓數莖竹琅玕不羡多成束飛白玲瓏一片石夜光休誇大盈尺云何此畫價無敵乃是希夷之真迹列仙籍中多品流先生况是神仙伯宣靖仙材亦不群尋師遙入華山雲解顔一盼不易得敢望揮毫遺此君畫首題詩兼姓字鳳翥龍蟠三十四丁寧舉似一轉語截斷世間無限事領略真仙上上機參同古佛空空義古來畫史雖無數爭似仙人得天趣筆勢翩翩入三昧玄旨明明標一句梵經合受天人禮仙迹那無鬼神護五百年來如電過一幅霜縑完未破湍水東流鶴不歸峨眉西逝龍猶卧故鄉之子慕神仙偶收圖畫如有緣錦囊新裝緑玉軸彤管更賦青霞篇安得至寶不磨滅期與好事相流傳先生聞此應大笑水中捉月真可憐希夷先生墨竹短歌大寧齋中至人竹淅淅天風撼蒼玉大書詩畫真三絶價敵宣和六千軸伊川空有句傳神世俗寧知偽與真秪恐明珠終暗擲此君他日與何人文徴仲畫老子見贈舊寄觀音像併此奉謝本家楚瀨鄉逺師周柱史流沙竟長往谷神應不死真源古縣近西原祠宇荒涼舊宅存不見猶龍寫生色秪同摸象解空言衡山先生今顧陸贈我真人真一幅天機淵默藏根柢日角分明辨眉目先生髙士非畫師一紙千金難易之四方求者苦不得我未往求先見遺往年曽寄圎通像髣佛白衣來海上今者揮毫圖伯陽恍惚青牛歸故鄉老夫家居貧轉劇偶然富與公侯敵簞瓢匱乏無斗儲篋櫝緘縢有雙璧平生嗜好釋與仙幸遭同病還相憐已將彩繪作佛事更擬形似傳靈筌學通二氏我何有畫備六法誰能先不慚俚調酬妙品往來聊結三生緣贈袁貞白故人昔訪我玩月新秋節十年重命駕復對春宵月故人真有古人情明月故向今宵明可憐明月如盟主知君與我心相許結交肯與流俗同此心願學延平翁張南園畫雲南圖嘗聞司徒作者流暮年畫思生滄洲丹青點拂隨興到雲霧幻眇令人愁君不見益州形勝佳且殊可惜僻在西南隅中原斷絶罕人迹遂使吳越矜區區司徒平生生此都文學才氣海內無獨憐山水久寂寞因之貌作雲南圖大山小山相盤拏龍鱗攢羅插虎牙洪波萬折走其下石根奔蹙如蛟蛇行人含顰色咨嗟鳥道上被青天遮巗披谷坼有平地孤城百雉千人家生綃淡墨勢頗窄萬里滇池氣相敵山川空濶神為開不覺沉吟悲古迹古來此地號邊鄙邪指牂柯連越嶲秦代新開五尺道漢家更代昆明水嶺陬海落通中夏翡翠明珠半天下始聞大將泛樓船復遣詞臣祝金馬只今郡縣窮南土風俗相傳勝前古世封刺史上計書附塞蠻夷占編户何况司徒此間出文獻從今更難匹山中已報解銀魚世上仍看留綵筆我言此卷真竒最不獨毫端工粉繪應同蜀相畫夷圖想見成周作王會東方朔竊桃圖為許封君題弱流西下崑崙畔石閣丹梯起樓觀緑水旁縈赤玉林白雲微映空青岸昔年阿母栽桃樹桃葉桃花已無數青鳥飛時屢自迷仙人折罷翻相妬浮生變化如雲煙此花一實三千年鄰家小兒亦何物往往竊實來山前自從脫幘金門裏賣藥逃名會稽市神仙恍惚難具論粉繪依稀無乃是海東之翁許逺遊有道似是東方儔未肯朝天取卿相時聞縮地遊滄洲短褐匡牀成隱居養雞牧豕混樵漁題詩逺寄看圖畫操杖終期問素書題竹使君擁千騎踏雪向長安雪中芳草盡零落贈此青錦金琅玕江南邱墟繞江水中有琅玕拂雲起應龍夜穿崖石裂江妃朝遊春雨歇風梳露洗助嬋姢沙崩水濺映潺湲坐看綵筆題苔蘚想見翠葆搖風煙只今四海歌太平甘露晝降黃河清願言植此玉墀側會聽丹山鳳鳥鳴梅花用東坡韻朔雲凍壓江南村春風解返梅花魂貞心習慣氷霜苦正色不受塵沙昏平生愛花同臭味好事寄我栽郊園最憐一樹傲霜霰逺勝百卉凋涼溫誰將錦軸寫踈影恍如金粉迎朝暾未邀皂蓋宴野圃已報畫戟朝天門嗟豫多病但髙卧對此欲賦將何言夜來雪罷郡齋冷莫辭看畫開清樽泣玉行楚國獻玉人抱玉山中哭不見賞千金徒聞刖雙足一國之人皆若狂玉為石兮石為玉世俗是非雖反覆礫石何榮玉何辱被褐懷玉真丈夫哀哀泣玉何為乎考功集卷四
