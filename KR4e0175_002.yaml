body:
  text: 考功集卷二明薛蕙撰五言古詩效阮公詠懷三十首翔鶤赴長飈翩翩戾髙冥舉翮覆白日伏頸雲間鳴顧謝野田雀僶俯營此生與子各殊塗無用相譏評有已苦拘閡無生懼飄淪憂樂多所惑違取喪其真𥅆周久已徂此辨將何陳存亡豈殊趣往復固恆理人生無延期百嵗有成毁即事且難預榮名竟焉恃感此愁我腸歎息未能已仰悟牛山對慚恨自今始萬物豈不衆而豫獨吾生吾生不暇治安用求其贏執籍雖利重刎喉非禍輕知哉屠羊子反市避三旌主父厭擯斥自謂甘倒行生幸五鼎食死仍五鼎烹羣狙競芋栗喜怒隨轉移飛飛海上鷗矰繳不可施張儀謝蘇君趙令説李斯小義鮮能終邪徑固多岐利害異目前親讐在一時他人各有心偷樂且相欺僥幸昧全圖此計良可嗤飄風振玄幕若木零朱華六龍匿西山濛汜揚其波翩翩市中子於心太回邪不見憔悴色但聞慷慨歌卑危誠未逺禍亂豈在多人人恤其私安能尚顧他已矣勿重陳嗟豫可奈何生平保至貴變化去須臾登遐上飄颻舉步臨九衢閶闔正晝啓陟降太微居曜靈闢重光長風厲六虛雌霓左右翔雲蓋翼前驅回車層城野總轡崑崙墟羣聖為我族五嶽為我廬豈與鄉閭子握手少躊躇朝登古臺上遙望大河隂朱明來自南隆暑倐已臨丹霞曜陽景渥露霑玄林炎風振曽柯鳴蟬響哀音四時代終始變化遞相尋盛長固殊昔遲暮方在今感物切悲情愾歎傷我心才美未足喜技惡未足歎左右無親交雌雄安可言不見龎眉尉三世不徙官雖有韓長孺百金賂武安功名復如何巧宦良為賢生才良不幸處世誠獨難揚娥興妬階懷璧賈罪端靈均既見放韓非亦自殘奉身失所從慷慨使我歎北冥有異物神變何峥嶸上為千里鶤下為萬畝鯨俶儻自足賴升降非已榮羞彼雉爵化齪齪忝我形曠望三河側輕車並華輈壯盛值今辰志欲一來遊路傍繽紛子馳騖各有儔腹內懷辛螫側目起相讐晏嬰畏仲尼惠施忌莊周疑似不可居俯仰生災尤感彼行露章獨處安所求昔有中黃伯立慬一何勞右手搏雕虎左接太行猱豈如東海翁嗜酒佩赤刀粵祝終不驗側身焉所逃蜎蜎桑中蠧戢戢託爾軀下枝吸沉液上條咀稿膚飲食亦已遂不念彼樹枯樹枯竟何如憔悴在須臾飄颻雲間龍卑髙一何殊變化成霖澤千載長相俱天上何所有上有九重臺日月闢房牖河漢界兩階白虎夾路隅青龍啾啾啼五嶽當束脯四海充一杯衣裳被雲氣左右結雙霓彗星垂為帶北斗束為觹舉足厯皓蒼往往不復迷朝集扶桑東夕降若木西人生非殊分天命自有涯置此儻來者安用矜且夸蚩蚩當路子欣欣一何多玄冕結長纓丹組垂纎羅采曜連金璽文繡雜鳴和順風激清塵向日揚芬華意氣肻少假顔色每相加不見蜉蝣羽日夕歎咨嗟蟾蜍宿南箕隂魄淪東溟乘風避其災首旦集魯城神飈鼓洪濤雷電正縱橫大魚裂地底崑崙勢如傾西山有精衛舉翼方逺征志意豈不偉惜哉焉所成龍伯有大人輕出越故疆東上五山巔學釣尾閭傍六鰲曵獨繭員嶠沉北荒天漢斷西流海水自飛揚列仙涕滂沱帝側巧中傷手中握朽骨魁壘不得長生理一何殊巨細各有當夀陵入邯鄲匍匐大道傍西河惑交戰中山忌重傷揆力非所任矯枉失其常如何紛華子生平厭膏梁間居羡幽深臨岐久徜徉貧賤誠不易鴆毒安可忘行矣反故塗貽爾以斯章窮漠萬餘里海水周四隅中原勒千乘翺翔順風趨白羽翩翻飛一軍驚且呼揚鞭下髙闕長纓繫單于右行臨月窟左旋出日區立功何足矜猛氣聊以舒茲年忽將逝我心愴以哀日暮不遑食空堂獨徘徊駕言出西城中有池與臺清渠夾阡陌寒露被蒿萊慨念昔時人零落安在哉玄象無淹次四序倐如摧自非藉榮名一日等塵埃朝出上東門迢遞望三川修塗未能半險阻屢遷延征馬立踟躇徒旅念歸旋捷徑不肻入安用直如弦煢煢罹苦辛失路誰當憐昔聞黃靈樂乃在洞庭傍一奏魚愁入再奏鳥悲翔大聲豈不妙細物焉能當獨有雙玄鶴延頸遙相望嘉穀敗荼蓼良巢毁茅鴟路傍張四羅戢羽落卑枝卑枝亦已足尚須保其危捷捷少年子挾彈來追隨俯仰偕儔侣言笑盛容儀當面施柔謙中心懷嶮巇詩人亦有言正直神所依禍福有固然反側焉能稀嗟爾衆多士茲理不可違昔余少年日浮湛聲色場追逐公孫子馳騖狹邪旁一醉纍旬朔一出厯四疆歡樂未及竟憔悴使心傷晚讀列仙傳始學却老方萬事不足競二物焉難當十年燒丹液效狀亦茫茫更希遊玄漠得失兩俱忘守道遺榮利趨物喪其真詘伸難並觀髙尚良可倫不見玄廬子精神已無存煌煌口中珠含此誰為珍富貴焉足求甘我賤與貧涼風起中林稿葉落如掃徘徊此何時嵗暮一何早吾生隨物化安得不枯稿惆悵終日夕延頸望雲島榮名非所慕神明可長保手把三皇文五嶽訪芝草朝遊東海上親見安期生袖擕麻姑書揖豫上天行忽忽從之去一舉陵太清白榆何厯厯桂樹亦青青朱爵七十二鼓翼相和鳴玉女顧我笑執手戲紫庭萬嵗同娛樂天地長齊并朝逢逺遊子車馬一何間問君安所之道路方獨難人情惡特立世態好纒綿一身欲誰從多門易生怨行行保子驅嵗暮當來旋啾啾田野雀徘徊丘中阿上飛有鷹鸇下飛有網羅人生誠未易禍福豈在他譽者日已少惡者日已多感彼恭士言悔恨將如何雜體詩二十首并序詩自曹劉下逮顔謝體裁各異均一時之雋也及江文通擬諸家三十首雖間有未盡然可謂妙解羣藻矣余慕其殊麗依之為二十首略者十人慚鳬企鶴罔量非倫云爾班婕妤詠扇團扇團如月月色比光妍此物豈云美君子心所憐炎暑充提擕清風何翩翩但畏秋氣至微質遂見遷歡愛始難畢中路傷棄捐魏文帝遊宴命駕遊西園回輦髙臺傍鳴笳引鮮飈羽蓋隨風翔靈泉依石渠緑波注金塘芙蓉吐朱華翠樹自成行飛禽映水曲潛鱗踊魚防零露停豐草良夕殊未央白雲含綺霄朗月垂素光仰看天漢上中心何慨慷人生非洪喬夀命安得長恣意百年內歡樂莫相忘陳思王贈友西京興亂階四海罹艱厄皇佐奮神武股肱效羣畫英賢盡同朝夙願今始獲並坐接華裀聨步陵飛閣中饋薦甘旨金罍泛清酌眷言申情昵終宴展戲謔君子肅令儀俯仰存謙約明信良可希驕盈義所薄各享百嵗期鑒此平生諾劉文學公宴步入西苑園遊戲芙蓉池明月照緑水神飈散文漪層軒跨通川雕檻承丹梯衆賔列長榻不醉且無歸菡蓞泛清波華蕚正參差清歌隨風轉宿鳥東西飛公子興藻思濡翰相招擕小臣非吉甫答賦安能希王侍中從軍出車鄴城外駕言指南鄉我君整六師赫怒征東方千艘泝淮浦武騎發河陽豈不懷歸思王事不可忘鬱鬱涉長途觸目多憂傷葭菼盈深崖榛棘蔽髙岡悲風振中野隂雲起回翔羈鳥鳴我前孤獸馳我傍伊昔東山人三年事戎行捐私報公家終以反故疆勉哉同袍子永言視斯章阮步兵詠懷驅馬出中野逺遊西山阿升髙望四海惻愴將如何崑崙不可見六合垂網羅悠悠存亡門往來苦相加願隨安期子竦身入朝霞應龍扶靈輿倐忽經九遐逍遙宇宙外千嵗復來過張司空閨情初月升簾櫳涼風吹綺疏佳人阻晤語永夕獨躊躇羅幬張虛宇朱火照堂隅樂閡歡不足悲興哀有餘寤寐思淑儷拊襟歎離居潘黃門羈宦登城涉層軒遙見洪河隈迅飈拂窮坂隂湍涌幽崖哀鴻唳空臯征鸛翔髙隄長秀延苞蔓喬幹垂華𬎼跂豫顧南路目極眺京畿清洛逈無津崇芒鬱崔嵬改服就外役夙夜守班司具瞻慚民望嘉命慊皇私異彼伐檀人徒蒙素餐譏撫已良自悼何以蔽前非操刀無餘技烹鮮有遺規雖乏禮樂才富庶聊可希陸平原行旅發軫指修塗頓轡臨廣川居人並集送遊子私自憐故鄉日已逺親愛坐相捐擕手一何促分袂難久延絶景不可尋遺音邈以綿憂來鮮再逝歡往豈重旋靡靡永徂邁冉冉薄暮年涼風起平陸積雪被長壖幽谷生曾隂髙嶺結飛泉寒鳥無宿棲猛獸行不前惆悵感平生怨此世網牽懷歸殊未遂愾憤何由宣左記室詠史琁臺麗白日曽閣切天階朱門夾馳道甲第列東西峩峩衣冠士濟濟照金閨長嘯霄漢間歸來尋舊溪箕山為我友首陽為我儕洗耳千仞壑采薇清雲梯張黃門苦雨金商送寒節火旻迎朝露斐斐丹霞滅翳翳玄雲聚密雨灑踈叢輕飈摧徑樹荒楚滿中宇芳華不盈步隂條豈再緑陽葉已改素獨居淹時運憂來將誰訴微志安可期傷哉年嵗暮劉太尉傷亂晉京涉厄運神州困夷孽乾棟隤炎燎坤輿覆危轍伊餘孱且弱負荷忝朝列愆釁既已淪哀憤徒云結惟昔仲山甫佐宣補衮闕范生反會稽再舉夫差滅髙帝還新豐鴻門賴人傑靜言思數子顧已傷薄劣白日逝若飛俯仰值暮節良辰不可遇我志將安設大化信盈虛昏明亦更迭畢力濟公室引領企時哲蘆郎中感交日夕厯城闉回策步林囿北眺邯鄲道南瞻太行岫幽泉激清瀾荒薄森長秀曠野零飛藿重巖響哀狖倣徨含逺志眄睞展遐覯燕趙負豪略土風夙所究廉頗守長平秦人却西冦李牧出雁門北馬避南狩疇曩遘運會匠者顧微陋謬升朝右位濫陪羣彥後質非荆山璞雕飾良已厚中區增震蕩邉鄙多斥候投迹依帷幄短策非可售仰恧昔賢軌嘉惠自難副斯言豈虛作亮之惟朋舊郭𢎞農遊仙瑶溪臨赤岸曽潭揚素波巨鰲冠蓬萊玉堂映巖阿中有羽衣客陵岡拾若華倣佛乘紫煙縹眇吸翠霞靈妃奏妙曲六蚪駕雲車西謁王母廬東戲海童家下視九垓內蜉蝣良可嗟謝僕射遊覽蟋蟀調易苦蒹葭歌亦勞伊人曠邂逅良辰方鬱陶中情何由寫駕言出遊遨傍洲泝湍渚登巒瞰山椒白雲冒丹巘緑竹俯青臯夕鳥相啁􅑜隂籟坐飄颻佳期眇何許佇立摘蘭苕蹉跎嵗云除詠言發長謡陶徴君田居眷此南村居自昔紓真想一朝就仁里愜我心所仰故人盡比鄰時時共來往濁醪既同持清文亦俱賞日入未能去挈杖出林莽荒徑行當闢新苖漸已長多謝沮溺翁千載良吾黨謝臨川遊山徂節淹登臨開嵗促遊玩隂崖雪猶積陽溪氷始泮進帆憩絶壁抗策陟窮岸撫化雖未盈即事已可玩幽谷風華媚晴峯雲彩粲尋異迹轉緬覽勝景迭換洲分島參錯巖聚岫回亂丹梯架懸梁石室構層館初經洞穴底乍出翠微半羽人謝世運靈景變昏旦汗漫無冥筌疏屬有塵絆放懷聊自慰含情為誰歎顔特進侍宴鈞臺書夏典靈囿誦周篇嘉會隆先祀豫遊及茲年春方協時律祕駕動星躔平圃躋倒景神臯徑中天赤羽匝曽嶠青翰鶩廣川華幢互幽藹藻帳競髙褰首嵗布皇澤萬象光且鮮炙晷曜微霄宿氛霽逺山瑞煙拂蘭甸祥飈泛芝㕓睿眷備終宴宸惠普下筵從邁咸世哲賡歌盡朝賢弱短困孤蹇明淑慚衆妍勑躬方自朂敷言非可宣謝法曹贈别駕言理行艫逝將越故林出邁薄長浦還望蔽髙岑懷歸絶歡念悼别多苦心遙遙從此辭悠悠存所欽右一所欽不可攀道塗亦云艱綢繆居人思悽愴客子顔去留勢並異聚散情相關傾側我西路偃仰爾東山右二東山及仲春愈悅對芳辰倚巖聽鳴嚶俯澗睇遊鱗逺尋協要妙近探謝囂塵邈矣隱淪者悲哉行旅人右三行旅已經時遂令憂若滋凝滯風潮際遲回雨雪期繫攬指曲汜弭棹停空坻寤寐孰與語拊枕怨乖離乖離焉有常佳侣若參商諧合無定端契濶殊未央勞歌欲自慰贈言非可將寄欵託微波延佇惠來章鮑參軍戎言家世𨽻部曲少小長幽并慣聞豪俠節恥預市井名邊秋北馬肥戎帳入龍城候騎速如飛一軍振且驚攬弓引鳴鋏行行遂徂征日落長風起愁隂千里生天時正懟怒意氣亦自盈左驅鮮卑壘右逐單于營還師報天子受爵過秦京開宴列邸舍交歡競公卿一旦收竒績千載揚英聲遊仙十首靈洲無氛翳石嶼屯翠霞遙望青冥中鬱鬱真人家真人出遨遊雲車一何多列坐玉臺上俯視瑶池波素女絃清商窈窕雜纎羅神飈扇珠林哀響自相和歡來輟羽觴同賦升天歌重華邈不作大道日以隱鳯鳥每髙翔麒麟擺羈引志士悲時運光迹若電泯臨淵漱珠水棲山拾雲􅌲縱身天路上謝彼世塗窘乘化遊無窮萬劫不復盡逺遊訪玄洲西造崑崙城長風萬里至吹我飄颻行崑崙何嶤嶤曲阿蔭滄溟碧樹夾蘭臺雲房鬱蔥青徙倚東廂隈北上厯羽庭啓匱發靈圖上有列仙名久淹變化塗今日乃長生精衛填東海煢煢纍形軀哲人匡宇宙天命不可須聞有山林士棄世以自娛願言從之遊齋潔練羽書丹池可止渴晨餐咀雲珠度紀諒非難去去勿躊躇三丘阻滄波瑶木蓋雲崖隂林隕珠實白鵠連翩飛仙者五六人羡門與安期晞髮洞房阿石室清逶迤我行入名山倣佛倐見之陵風歘猋舉何時復來歸東南有青雲鬱鬱照瀛洲岩隈列紫林丹水絡曽丘峨峨三珠宫逺望似煙浮山川屬靈壤光麗異神州列真乘羽車妖女並來遊蒼龍扶玉車犬翼以雙素蚪羲和不敢驅朱光正淹留徘徊離宫中嵗紀歘千周天地有否塞賢聖困無佐潛龍應初九鶴鳴疇與和九州肆遐步五嶽恣髙卧逺慚夸父死近悼首陽餓我生匪金石大冶不能挫神明厯終古三光莫豫過采藥謁東海芝石被神渚借問此何鄉乃是真人所青峰萬餘仞去天復幾許沄沄赤泉涌亭亭白雲舉凄風薄穹岫鸞鵠整其羽空山寂無人含嘯獨延佇短期不須臾大暮有淹滯眷然迫中抱淪迹謝人世案牒窮山海消玉畢年嵗岱宗籍已絶司命授靈契形容日漸反魂魄為我制薪火遞相傳舟壑不復逝上仙有會期解化升帝鄉消搖入雲氣迅若輕翼翔赤霄浮九隅閶闔爍朱光踟蹰步閣道執籍朝紫房駕言歸下都置酒宴玉堂靈妃靡飈蓋列坐侍仙倡絲竹間雲和絡繹進羽觴遊行天漢上歡樂殊未央考功集卷二
