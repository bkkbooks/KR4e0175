body:
  text: 考功集巻七明薛蕙撰七言律詩卧病貽友人漢代無才賦子虚病來空卧茂陵居終年只學五禽獻早嵗渾忘三篋書林下網蟲懸墮葉牆頭蔓草落寒渠日日思君欲乗興濠梁何處好觀魚訪孫世其叙飲苑内銀河垂裊裊城邉暗月上微微不辭懐抱今宵盡無奈賓朋此地稀萬里飄零同卧病三年邂逅一沾衣燕山楚水遥相望目㫁天涯鴻鴈飛王明叔同年夜集映燭吟詩春霧生開簾窺雪夜寒輕花邉仙吏雙鳬舄雲裏瀛洲五鳳城對酒己拚連夕醉相思不奈隔年情官河南望冰潭緑愁見蘭橈送客行贈陳真人汝侍先皇遊帝京今年七十道將成赤霄鸞鳯朝南極白日蛟龍下太清丹洞紅泉流玉酒石壇瑶草變金莖何因贈我飛仙藥便可相攜海上行春雪懐孟望之朝來酒畔看春雪忽憶故人春雪詩裊霧含風不忍見吟詩對酒益相思山川冀北非吾土桃李江南異昔時此日悲君已遲暮他鄉愁見更支離歸鴈春日燕京鴈北飛髙樓獨客一沾衣嗟予正阻滄洲去念爾飜従江漢歸塞上風塵元自苦天邉霜雪未全稀蹉跎剰笑浮生拙飄泊休憐羽翼微寒食對雨遣悶一百五日春已深閉門風雨晝隂隂乍飛燕子濕無那欲折桃花嬌不禁歸去久淹滄海興愁來端擬白頭吟天涯厭見繁華節更見蕭條㫁客心雨中遊翠微山亭午翠微山半路下看山底翠雲生客來准擬山中宿雨至何妨洞裏行隔竹泉聲初淅瀝傍巖花樹轉分明題詩攜酒兩殊絶飜怪風煙報晩晴秋日游都南水頭秋來何處看秋水南苑飛泉玉不如擬㺯潺湲坐脩竹忽驚揺落對芙蕖謬持文墨慚華省久别鄉園憶敝廬嵗嵗乞歸歸未得滄江空羨舊樵漁題張子醇西峯草堂山人卜築城西郭日日西山爽氣來細雨濛濛丹磴濕晴雲裊裊翠屏開堦前蔓草穿書閣石上松林覆奕臺況有春湖可乘興他時須作泛舟迴贈繼之長安城中不可留風塵日日使人愁上書解印我將去拔劒出門君且休五岳登臨幾兩屐三江來往一扁舟東西南北好行樂與爾相隨萬里遊孫氏沱西别業巴陵西來沱水深水邉樓閣自隂隂黿鼉夜出洞庭岸虎豹晝啼雲夢林鼓枻乍逢漁父笑搴舟時聴越人吟卜居何日従公去擬向桃花處處尋雨霽西堂薄暮暄氣微雨霽清風飄我衣明月在户稍將出白雲向空猶自飛寄身世路有傾側抗志神游無是非僊人胡乃不來下接身山林同子歸寄邢伯輿僊掖自通青𤨏闥近臣多在紫薇垣苑中雲去金莖出仗内風來赤羽飜天上諫書藏太史人間詩句見開元獨憐卧病秋江客愁對蓬蒿日滿園春日禁中即事馳道春歸入建章九重花卉動年芳浮雲細細生城闕晴雪霏霏濕苑牆内殿徐停紅羽仗御屏髙閉紫金床日長退食天門裏慚愧中朝鴛鷺行李子中林懋易曹仲禮王稚欽夜過分韻得涼字拂簟移尊浄客堂朔雲燕月滿宫牆建章露濕金莖凍太液波侵玉樹涼海内風流今下榻天涯疾病舊沾裳攀歡自惜形容異留贈空慚翰墨香西湖苑外西湖似若耶翠湍錦石象雲霞春深杜若已滿徑日暖鳬鷖正在沙勝地欲令誰作主浮生安得此為家直須輕舸隨煙霧還仗新詩對物華道院看牡丹四月紅芳尚滿枝僊家春色怪來遲彩雲自解停歌扇香霧時能墮酒巵隔檻流鶯愁並語過簾輕燕巧相窺無勞地主留堅坐貪為名花醉不歸自西山歸經西湖遇雨恰向山頭窺泛濫旋從湖畔望嵯峨雲輕不隔翠微色雨細初増緑水波樹影離離巖際少鳥聲噭噭霧中多未愁沾濕穿花去更擬青春載酒過送許伯誠侍御之江南金門散吏著書成烏府僊人攬轡行七國早時先報捷三吴今日尚屯兵錦帆深駐芙蓉苑紫葢髙懸虎豹營久擬功名望公等願看風采慰蒼生送李子中洞庭山前水滿湖爾行乗舸向東吴宦遊堅不廢丘壑燕坐真成在畫圖歴歴村墟懸橘柚層層洲散菰蒲即看秀色増江國䞉寄新詩入帝都睡起午夢初醒卯酒消不知風雪已終朝客來小閣聊盤礴鳥散空園轉寂寥老境時時懐故舊宦途事事愧漁樵古人堅卧非無意未必淵明為折腰河曲避暑水曲樓臺多景地坐中名勝列僊儒茂林脩竹非人世清簟疎簾似畫圖素柰味甘宜凍醴紅蕖香酷掩熏罏秪言習氣渾消盡依舊呻吟據槁梧小園納涼簡子正侍御晩夏歊蒸氣倍驕小園清曠暑全消玉壺日映冰呈露紈扇風生月動揺窻下素床横緑綺堦前錦石覆紅蕉草堂事事堪娱客祗苦髙人不可招對雨有懐乍淡乍濃雲片片半疎半宻雨絲絲林花落盡漸成子巢燕飛來頻哺兒坐對空尊應笑客行騎羸馬欲尋誰平生歡友俱南北此日傷心獨詠詩友人枉過有作久卧田廬慣閉闗那期好事到林間風光坐惜三春暮琴酌聊為一日閑青苔滿院偏冝坐紅蕋盈條不忍攀莫怪夕陽催客起㑹邀明月伴君還人日暉暉晴日透簾帷冉冉和風颺鬢絲野老自傾田舎酒故人誰寄草堂詩即看梅柳春含早預想鶯花景不遲旋鬻園蔬辦家醸剰拚酩酊艷陽時元夕郡巾招觀燈不赴遥聞郡閣夜張燈走馬來㸔病未能坐失繁華春可惜轉添衰憊老堪憎風流那比髙門客寂寞翻如苦行僧欲寫詩篇酬節序短檠垂滅硯生冰西亭宗室送白牡丹一本走筆書此寄謝曽傍𤓰田搆藥欄欲慿光景慰衰殘聊同楚客憐芳草敢冀梁園送牡丹老病只疑花解笑春風預想雪成團攀援不減三株樹報答真慚雙玉盤自賦常樂園一首譙國城南稍又東一丘新買卧衰翁人非九品羲皇上園似千花佛界中隠几自堪消永日褰裳何待御泠風文章習氣今應盡著意題詩也未工孔汝錫得陜右少㕘邸報臺中舊養一鶴俄鳴舞而去汝錫感而賦詩因同作一首使君擁傳西征日孤鶴依依戀主鳴階下起為垂翅舞雲間去作㫁膓聲幾年枉沐乗軒寵五里能忘返顧情潁水今朝應暫别緱山他日㑹相迎草堂蕭蕭寒雨對髙秋寂寂空牀擁敝裘歸去鈞天頻有夢挽回滄海獨無謀平生頗詫任公子末路方思馬少游珍重故人招隠意草堂南郭可淹留辛卯春日作滿榻塵埃兩鬢絲六年懶賦一篇詩非闗多病捐文字實恐無聞近死期何物乾坤能不朽此生精力欲安施春來忽有揮毫興正是風花爛漫時病起偶作肺氣新年何太頻掩闗風雨動經旬春寒稍稍妨觴詠人事紛紛可笑嗔晩嵗禪心了無住平生龍性獨難馴杜康未是忘憂物細讀維摩究病因清秋清秋散髮倍逍遥嵗暮誰言不自聊空服九華真飲露静聴萬籟似聞韶風流祗合専丘壑名利端須逺市朝十載已無干禄夢故人何事苦相招木犀次萬侍御韻木犀舊種開何晩今嵗初開擬細看葉薄青瑶雲㺯影花明金粟露生寒妙香聞處遥支䇿小朶簪時屢拭冠獨遶芳叢成百匝西風忘却葛衣单龍潭在渦河西歐陽永叔有詩龍潭日落鳥飛迴坐拂扁舟下釣臺尚父已無西伯載狂奴翻使漢庭猜江湖萬里人空老宇宙千年鳳不来忽被漁翁笑相問棹歌何事亦悲哀雪霽雪霽山房病骨清自移一榻卧南榮姢姢梅蕋含春色漠漠松隂變午晴世路收身真穏在年光觸眼可憐生短笻預向鄰翁借伴我東風遶郭行早春南園作眼看花鳥繁華日心醉煙霞錮疾人月下啼烏長達曙雨中垂柳不勝春應門僮僕能延客旁舍漁樵競卜隣莫羨䕫龍扶聖代總輸巢許得天真春隂春隂日日春晴少料得春晴春已歸竹裏雄鳩嗔獨語池邉乳燕喜羣飛炊煙冷落侵寒食簷溜飄蕭上裌衣寂寂小軒賔客散祗餘禪榻不相違雨晴再次前韻殘雨闌珊漸復稀薄雲零落㑹須歸階前碧草穿泥出葉底黄蜂伺日飛餘潤遲遲留寳篆乍暄稍稍著羅衣風光㸃檢無多在文酒追隨莫更違雨中客至客病荒村饒寂寞故人今雨忽遇逢别來渴疾春増劇坐久空厨午未舂束濕焚枯真簡畧看雲聴竹稍従容慇懃更覓鄰家酒惆悵初聞野寺鐘海棠醉倚雕闌倒玉壺貪看錦樹色敷腴根株海外何年至風韻花中絶代無西子浣紗低照影文君酤酒正當壚少陵才調難摹寫浪把燕脂汙畫圖病中對雨憶南園牡丹賓客門前問疾迴圖書案上亂成堆卧聞片雨空階滴想見名花别墅開油幕縦然藏錦樹畫闌定自汙蒼苔東風好為催春霽扶病還須載酒來南園觀牡丹時雨霽病亦適愈朝來盥潄喜新晴忽憶看花遽出城病起好懐還似昨雨餘春色可憐生露華濯濯含金粉雲朶鱗鱗蹙絳英苦恨品題無妙語正縁佳麗若為評牡丹送寺中供佛兼題短句盥手薫香折好春羅巾浄拭寳缾塵一華聊復添僧供半偈還同讃法輪宿世曽為童子戯他生應作比丘身若教靈運真成佛㑹現優曇證本因牡丹紅紫紛紛次第稀故留國色殿春暉東皇巧思應多少西子妖魂定是非香霧氤氲籠寳靨流風宛轉㺯仙衣白頭更覺鍾情劇忍訴清尊不醉歸寄劉希尹吏部當年第一流何知謫宦遽歸休數遭唇吻真銷骨久困風波竟覆舟夢裏不須驚寵辱胸中那可著窮愁近聞東海多方士願與劉安物色求小飲芍藥下作白髮逢春取醉頻多情倍復惜餘春緑尊故是忘憂物紅藥渾如絶代人放曠山林真得意崇髙富貴不闗身二豪度量非同調未用規規笑伯倫夏日南園幽林長日少炎氛坐石臨流每日曛靡靡輕蘿翻爽吹泠泠脩竹度行雲樽中尤物唯思醉身後空名不擬聞宿昔燕京多酒伴白頭愁絶恨離羣小圃雜蒔藥草偶成四律昔年漢殿含香客此日譙城種藥翁已分長休辭宦達只愁多病迫途窮髮因青燭仍迴緑眼為黄精一駐紅少緩營魂游岱岳定攀仙駕訪崆峒脩道那能飯一麻延年聊欲餌丹砂青繒齎去尋三秀玉盌盛來服九華身寄人間長厭世夢游天上已為家㑹追姑射乗雲氣不用羲和駐日車百藥畦邉一草堂荷鋤抱甕送年光紅垂枸杞枝枝滿緑裊菖蒲節節長雨霽雲芽偏動色風來石蘂故添香五符不識三天字更乞仙人别寄将老來服散䕶殘年檢盡桐君第幾篇誤信朝霞能却粒空聞水玉解乗烟更生命薄丹砂耗叔夜材凡石髓堅自有仙鄉終不到莫同雞犬望升天瑩心亭觀荷花作瑩心亭上逍遥客照眼池中爛漫花白苧單衣銷暑日玉盤纎手送朝霞身閑但覺牽詩思年老方知愛物華笑聴采蓮頻度曲驚㸔垂柳乍棲鴉病夫平生心跡重相違再到長安再乞歸本以頑踈難偶俗不縁憂患始忘機倦游但謂棲遲是小隠焉知出處非海内故人多問訊病夫新製芰荷衣感懐當年草奏尚書省竢罪閑居已白頭但使奸䛕破心膽寜辭老死向山丘董生不識平津閣李廣那論校尉侯富貴區區非我事飯蔬飲水復何求懶慢舊來懶慢耽黄老祗擬山林寄此生傲吏未甘従薄宦愚公翻笑竊髙名烏皮几上聞天籟癭木尊中遺世情莫謂棲遲空白首人間擾擾亦何成蘇允吉侍御孔汝錫僉憲同觴小園薄暮值雨驟作四韻奉呈二公内臺兼約行臺使南郭相尋負郭翁行徑追隨雙葢並草堂灑掃一尊同飲中僊侣逢蘇晉坐上嘉賓接孔融正喜淹留乗暮雨莫辭顛倒醉秋風中秋對月作可憐三五最佳月更愛風煙萬里晴金魄乗秋偏皎鏡青霄入夜轉分明紛紛寳氣浮滄海隠隠仙歌落玉京不惜綺裘侵露坐只愁銀漢向西傾考功集巻七
