body:
  text: 考功集卷十明薛蕙撰序坐忘論序太史公書曰神者物受之而不能知及其去來故聖人畏而欲存之惟欲存之神之亦存其欲存之者故莫貴焉予嘗以為古人之遺言夫神者群生之本萬有之府大可以㕘天貳地次可以長生乆視誠莫貴之鴻寳無偶之珍物也然悠悠之俗棄寳取礫貴物而不愛其神愛神而不求其術奄忽而盡良可哀矣坐忘論者唐司馬子㣲所撰盖存神之秘記安心之要訣也予愛翫斯文亹亹忘倦客謂予曰昔程子謂斯論為坐馳其言曰未有不能體道而能無思者故坐忘是為坐馳有忘之心乃思也子顧好之豈有說乎曰程子之說誠善矣苐其議子㣲者殆不然也夫無思者無妄也惟聖人者能明之易而得之速非夫學者之事也凡學者必始於操心終於無妄漸習則可致欲速則不達雖大賢之資未有越操心而至無妄也或問程子曰敬當用意乎曰其始安得不用意又因論持志曰此亦私也然學者不如是不得及其評子微之書曾不推此意而言之先儒為論之失平後世過信而弗察不亦惜乎獨其終篇有云非孔釋之所能隣此則子㣲之蔽不可不絀者也嘗以為自古褒貶失實抑揚過當其來尚矣所以爾者盖安其所習毁所不見或摭片辭而遺大意或執一端以槩衆說此論議者之通患也客曰子㣲之言道家之流也固不合於儒學矣今猥尚之無乃導人於邪僻乎曰天下之理本同末異所以異者由人之用心不一也二家之學皆以無私心為極茍無私心異安從出人生而静是謂一本先聖後聖同復其初而已奚道家儒學之辯乎今儒學即事以治心其蔽也流宕而忘本道家屏事以安心其蔽也固滯而不該於用非二家之學本然也夫百氏偏駁猶有助於救俗道論素樸寧導人於邪僻烏虖自三季之後秦漢以來淳風載息躁人寔繁莫不肩摩富貴之路轂撃紛華之域異代一揆恬不知悲若乃黃老希夷之術僑松澹泊之風荒塗翳然鮮有一問其津者然而束教寡聞之士師心好辯之徒猶謂尚同者寡好異者衆豈非謬於過計乎抑斯論之傳世將惟寂寞枯槁之士為有樂乎此也豈能中逢掖之徒哉升菴詩序古今言詩者病詩之難夫詩之所以難者才與學之難也才本於天學繫於人非其才雖學之不近也有其才矣非篤於學則亦不盡其才也古之人以詩名家必兼於斯二者顧其才有高下學有䟽密故文體又各為品第焉夫才之不足有所限而不可進也學之不足無所禦而自止也彊其才而進者寡陋於學而止者衆學而不止極於不可進而後廢古之作者猶難之國朝能詩者盛於𢎞治正德之際其時數君子始尚古學文體為之一變至於今日鴻筆麗藻之士彬彬間出數君子為有功矣然此數君子亦各才有高下學有䟽密雖其高才嗜學者要未有窮其學之所至竭其才之所能者也嘗以為知其所近而闇其逺者學所易能而後其所難人之公患也眩於時好而不悟其所短沿於俗習而不進求其上世之常蔽也語曰取法乎上僅得其中取法乎中斯為下矣余懼將來者徒隨先進之後而雅道之日趨於下也南岷王先生示余升菴楊先生詩一卷其窮極詞章之綺靡可以見其卓絶之才其牢籠載籍之菁華可以見其𢎞博之學此其意將欲追軋古人而不屑與近代相上下盖余疇昔所願見乃今得之先生矣抑此卷者第徃者謫居滇中之作耳若其今之所造詣與夫他日之所就又非止於如此而止也雖然即此巻尚論之唐之四傑不能過也南岷刻而傳之非特表先生之才為其鄉重固將著先生之學為天下先余因推其意而敘之老子集解序嘉靖庚寅予為老子集解其後屢有修改丙申之冬復加刪定自謂有補於道德之萬分廼自序之昔老子有言吾言甚易知天下莫能知周之衰先聖之道未絶賢人君子猶有為性命之學者且天下知尊老子而老子之言世猶莫能知也况至後世道術數傳數變學者舍本趣末毁所不見且詆訾老子為異端則其筆之於書者天下益莫能知矣聞有高明好古之士澹泊學道之徒為能有味於其言然非研精覃思亦安能自知其性以真知老子之言哉始予蚤嵗嗜神仙長生之術凡神仙家之說無不觀也晩讀老子而好之當是時予方蘄嚮聖人之道致思性命之理盖乆之而若有得考諸老子無異也廼知昔之所嗜者第方士之小術而非性命之學也復知老子之道惟導人反其天性而非異端之流也夫性命者道也天下之一本也生民同得之非異物也聖人同傳之非異術也迷其所同得故異見失其所同傳故異說是則同乎此者謂之同異乎此者謂之異予見後人之異矣未見老子之異也今夫老子之書盖皆性命之說多出於上古聖人之遺言故古者敘六家而謂之道家後世顧謂之異端矣道者脩之身以及天下天下之事無不統也後世直以道家為養生耳皆予所未喻也予又竊怪夫方士之言養生者徃徃穿鑿於性命之外不知長生之道不越乎養性世儒率言知性知天而斥小養生不知養其性者即同乎天道而不亡此其不聞性命之實不合聖人之道者邪傳曰禮失求之野聖人之道不明於世乆矣學者求道而未得比老子於野而求之何不可者况老子古之史官孔子之所嚴事豈野人之比而已乎然老子之書學者恒病其難讀盖其辭約其道大所謂測之而益深窮之而益逺者也古註之亡者其善否則不可知今之傳於世者未有明老子之意者也予為此解其間文義之小者儻有未盡若夫揚㩁本指發揮大義明聖人之微言究性命之極致竊以為近之矣有欲求老子之道者必以予解為指南乎老子曰自矜者不長又曰知我者希則我貴矣其言非以相反夫各有所當也予之不遜亦冀世之君子無聽我藐藐庶幾為入道之一助云送郟令孫子序郟令孫子將行内史唐子會同舉于鄉者以餞之衆復謂冝有言也乃以屬蕙初孫子之得郟也或謂郟其俗樂訟綿蠻難治雖喜事之吏猶厭之孫子信厚者也得此必戚矣予嘗求訟之興盖興於下者什一而興於吏者什九興於下者習惡之人也然亦罕已若夫教弗豫治弗平甚則利而賊下重罰而不恤其民皆吏之為也如此而欲民之不訟尤惑矣故君子自反乎身而不咎民之好訟夫子曰君子之德風小人之德草草上之風必偃言自反也且吾聞郟之俗不如是之甚今孫子以信厚而臨之民將戴之必且無訟矣夫良師不易絃而調良吏不易民而治孫子為弗戚矣然則孫子遂亡戚乎曰有夫冉子之藝當時第之曰政事然僅可為之宰後世之君子其心不以一宰為不足為者或寡矣冉子之藝人必以為不可能也冉子之僅可為者人則以為不足為也豈非不思之過耶今之邑令視有弗逮焉而况於聖門之士哉抑此邑令之難也天下之爵倍而上之不啻一令而已事倍而上之不啻一邑而已弗知難者弗戚也知其難者有弗戚者乎吾觀孫子有天下之志者也知其難者也不能亡戚者也贈劉希尹序希尹有寛静之量有温良之行有䟽通之智有廣博之材國家不用賢焉則已茍用賢焉豈能舍子哉且必以公卿之位處子矣希尹居吏部者八年以為善其職者衆人莫不然也一旦一小人言之謫壽州始小人未有言衆孰謂且有言者既而小人言之衆孰謂且必斥者於是希尹卒被讒而去此皆衆人之不虞而事之難圖者也今者衆皆惜之謂希尹有亡予獨謂希尹有益者也今夫國之所謂善御者終身由於國之康衢則御之材不加也一旦值陿陋之蹊隧斯進於御之道矣傳曰動心忍性増益其所不能豈不信哉今子固衆之所謂善其職者而其賢又將處公卿之位也雖然使在今日履坦途而躡要路亟處公卿之位非不可也譬由御者終身之由于康衢耳此於子之賢無所加也盖處公卿之位者必將與國家之謀焉國家之謀恒患其不虞而病其難圖自昔國家固嘗多賢矣而賢有不足深恃由不能動心忍性燭於不虞之防周於難圖之慮故不足以謀人之國家今者子其動心忍性而其賢日有不同矣由是處公卿之位而與國家之謀庶幾其有濟哉此予之所以謂希尹有益者也贈王直夫序今天下之為吏者重内而輕外惡勞而喜逸故士有仕外而任勞者輙介然不當意而其交游之厚亦多嗟歎怨恨猥為惜悼之辭以慰其人俗習之若此乆矣人皆以為冝然而莫病其非也吾聞國家之置庻官也唯以為民非以私庻官也故古之君子必畧於自愛而篤於愛人是故位不辭賤事不辟難茍有益於民也雖外且勞無弗樂已茍無益於民也雖内且逸無弗憂已今之為吏者則不然樂終身於京師而憂一日於外郡勞則唯恐已歸即而逸則唯恐已違也烏虖使今之君子誠如其志終身不出國門無尺寸之勞而致卿相之位因循偷墯無與於民而有利乎身自常情觀之可謂仕宦之至願然而有志之士必不忍為也程子曰古之仕者為人今之仕者為已夫惟其為人也故殫志畢力顓於趨事而猶不暇又何暇於及人也哉昔周之盛時其大夫士行役於外者惟其趨事之不克而未嘗自言其勞故其詩曰皇皇者華于彼原隰駪駪征夫每懐靡及及其衰也其大夫士皆趨利以自便一失其欲則怨刺之辭作故其詩曰或燕燕居息或盡瘁事國或息偃在牀或不已於行夫人而至怨刺因上之不均也然其臣子亦豈可遽若是之薄也今直夫之為許州也容色怡愉如平時度其中必將外内外勞逸而有意乎為民也予素厚直夫不敢為悼惜之辭以慰之於其行也因以所嘗聞者為贈意者亦直夫之所樂聞也贈王子正先生序予嘗論古之神聖仁賢皆以救民為心以救民為事者也由周公而上達而其道行者其事莫非救民也由孔子而下窮而其道不行者其救民之志未之或忘也故曰得志澤加於民不得志脩身見於世夫得志不得志云者盖謂其救民之志非謂其一身之私也澤加於民志行之效也不能及人斯脩身而已矣此古人所傳之家法而後之為士者世守之自後世之俗寖壊古人之傳寖㣲士之曰窮達者不以道為窮達以其身為窮達耳曰得志不得志者不以救民之志為得失以自私之志為得失耳由是有終身唯私欲之謀而莫以救民為意者甚則虐其民以濟其私欲者也予是以知古人之切於救民者夫唯其能無私也後世之士既蔽於私欲矣豈能以斯民為已任乎然則士必絀其私欲而後能盡心於救民此理之不易者也孔子曰富與貴是人之所欲也不以其道得之不處也貧與賤是人之所惡也不以其道得之不去也君子去仁惡乎成名夫仁之為道至精微也而孔子之言仁廼在富貴貧賤取舍之間何哉盖去貧賤而處富貴正人情私欲之大者而君子之失其本心亦徃徃由是故也孟子稱伊尹之行則曰非其道義禄以天下而不顧稱柳下惠之行則曰不以三公易其介至於論舜蹠之分特在善與利之間皆由孔子之指也南岷王先生徃為御史劾小人之居權要者謫判亳州可謂不畏彊禦矣壽陽有征商之闗當路檄先生攝之遂辭而不行昔之督是闗者其私取不啻千金也予觀先生温良而忠信端方而修潔其賢有不可勝道者稱其一二又特其小者耳然亦可見其所存之彷彿矣絀其私欲而盡心於救民非先生之望而誰也先生遷令崑山予從勿齋周先生祖之復為是說贈之記高氏大宗祠記大宗祠者大中丞樂清高公祖考之祠也高氏之先出宋太尉諱瓊太尉五世孫諱世則在建炎初為行營副使扈從南渡以節度使判温州因家樂清寔惟高氏始遷之祖祠之所為名也祠作於節度使之孫諱新七後世祇守不隧及中丞公曽祖父華亭令諱某皇考贈光禄卿諱某追孝嗣事嵗治月飭益恢於初祠之創繼之槩也辨其昭穆嚴其祔祧祭祀必時嘉事凶事必告凡節度使之所自出無間於親踈逺邇祭而行事必皆至焉既而合食必皆與焉上尊祖禰下親宗族祠之大倫也有譜以紀世次有家訓以志教命有世祀之田以共齊盛牢醴有文字歌頌以章上世之美廣後人之思祠之雜制也舉祠之故考諸禮度之義鮮不合者可無待言耳矣蕙辱中丞公之命兹將何言惟曰章上世之美廣後人之思俾百世之下傳德襲訓無變于今詩曰孝子不匱永錫爾類中丞公之志庶在兹乎惟高氏繇一節度使而來盖四百年名人累累不絶至中丞公復以重德顯於時家屬子姓衆多不可數今夫世之氏族克世其家者或一二世或三四世㣲矣而高氏代序之悠長也子孫之蕃庶昌大也匪上世垂慶之永其孰基之凡族之人始則合末則殊甚者戚未單而恩弗通而高氏之族綂之以昭穆綴之以燕會戚則致其愛䟽則致其敬無不足者相䘏也無不善者相觀而化也匪上世貽謀之善其孰致之吾聞原水之出者大則下流之受者宜廣先祖之施者厚則後嗣之承者宜篤篤其承必思孝祖禰孝祖禰必思脩宗廟脩宗廟必思睦宗族睦宗族必思敦禮義此高氏世世子孫所宜從事也而况於中丞公申之以不匱之志三難軒記侍御漢陽戴君寓書於蕙曰予少竊有志於學未嘗知學之難也既年且長其更事也日多焦然而彊其不逮慨然而憂其不足予然後病學之難也學之難實衆尤難者有三曰力行責已克終夫力行弗倦者日新也然進焉而或緩吾决立焉而或撓吾分蓄焉而或餒吾充用焉而或窒吾利予是以病力行之難也責已而不責人者自脩也然自私者人之情也自恕者情之偏也自用者偏之惑也自是者惑之甚也予是以病責已之難也善終如始者盛德也然志傾則終必怠事慢則終必茍節詭則終必敗德偽則終必貳予是以病克終之難也是三者予恒病之廼扁其軒曰三難以朝夕觀省庶幾其有益乎雖然事勤而守不約志切而行弗近亦亡及也唯君宜有以相我請為我記之君於蕙為同年且辱與之友兹有命蕙其敢辭蕙聞聖人之於學自然而能者也而心猶難之衆人之於學彊勉而未能者也而心顧易之或聖或否為是故也君之賢固大過於人而篤志於學若是三者雖難非君所患也抑蕙未知學其何助君之有聞之夫子曰克己復禮為仁己者人之私也克己者學之要也人之生也已則從之弗察弗慎已廼亟作已作而衆理危矣故行不能力者已間之己不能責者己蔽之終不能克者己害之三者之難乃其所也今君既病其難盍克己以為之本乎己克而仁則三者可悉獲也故樂於循理力行非難矣物我兼照責已非難矣存心匪懈克終非難矣詩曰無言不讎蕙之言不韙尚俟聞吾子之教雜著用剛贈林守天台林先生守亳州蕙告之曰損益無過者天地之化也剛柔合中者君子之道也振民育德一而已矣商書曰平康正直彊弗友剛克爕友柔克沈潜剛克高明柔克平康正直君子之道鮮矣於是乎或過不及而四者遂至於相反雖然始之偏也微焉耳卒之賢者以得不肖者以失而得失之歸則遠矣夫能察其偏而善用剛柔以節之此賢者之所以得也不能察其偏而過用剛柔以甚之此不肖者之所以失也得失之由剛柔之用不可不慎也吾觀先生性慈而良謙和而安豈非賢乎意者猶近於沈潜與亳之彊弗友者或寡矣然一夫橫於市十夫狃於室雖寡足患也如是則先生之自治與治亳之政皆宜用剛用剛則兩得之矣弗用剛則兩失之矣抑又聞之用剛有道不得其道亡益而弊從之未為善用剛也善用剛者以寛主之以明濟之弗主之以寛者亟弗濟之以明者悖夫用剛以求中也既亟且悖失中愈矣是以德不順而民不服此非用剛之過也廼不善用剛而然也故善用剛者必以寛主之以明濟之以寛主之者仁也以明濟之者智也仁智者成已成物之道也或問辯大學或問曰近世大儒有為格物致知之說者曰格猶扞也禦也能扞禦外物而能知至道也又有推其說者曰人生而靜其性本無不善而有為不善者外物誘之也所謂格物以致其知者亦曰扞去外物之誘而本然之善自明耳朱子荅而辯之其說詳矣愚竊思之猶有一二未盡者輙為說辯之以足朱子之意云愚觀或者禦物知道之說大抵本於樂記樂記之言不無偏駁或者又附會之以言大學之道樂記未可遽辯今姑辯或者之說茍覈其義則記之是非亦從可知矣予惟或者之意盖以為天命之性具於人心方其靜而未發本真不雜未嘗有不善也惟其感物而動為物誘之於是始為不善因以為此物之為已害也故必扞去外物則所謂靜者無所感而不動而本然之善庶乎其不昧也或者之大指殆不過此是不知其言之蔽也何者天下無性外之物體物而不可遺者性之德也孟子曰萬物皆僃於我矣性非外物而自為性物非外性而自為物知乎此然後知吾性之道而無外斯道之全而不偏所謂内外合而動靜一者也夫以性與物觀之人見其有内外之異也以性之已發未發觀之人見其有動靜之分也惟自知道者言之則内外動靜無非一理盖其靜而未發退藏於宻者所以為曲成萬物之體及夫感物而動可與酬酢者所以為成性存存之用此豈非吾性之大而無外斯道之全而不偏所謂内外合而動靜一者歟今或者但見夫人生而靜則以為天之性也善之本也乃欲深藏而固蔽之見夫物誘而動則以為性之欲也物之害也乃欲扞格而屏禦之是性自性而物自物也茍若是則吾性狹而有外斯道偏而不全内外不合而動靜不一矣或者之知由不足以及此是以貴性而賤物樂言靜而惡言動也貴性故樂言靜賤物故惡言動然使性而不該乎物則吾之神妙萬物者反局促格槁而淪於一物安見性之貴也使物而無與於性則凡物之可以利用崇德者莫不乖忤抵冐與吾為敵亦奚取於賤物也哉是雖異端之學稍有所見者亦不至如是之偏滯也况可持之以語聖賢之道哉夫聖賢之道大公之道也故可以盡性可以盡物之性或者之言自私之道也非惟不可以盡物盖已自賊其性矣此皆其謬於聖賢之㫖者盖其欲性之靜而難於應物不知其靜者為將安用惡物之擾而防其不善是又未能盡知不善之所由生也茍未能盡知不善之所由生而徒規規然以屏禦外物為事吾未見其能免於不善也矧曰未然之善自明而可以知道也哉嘗聞人性本善而至於不善者其故有二盖有生之初昏蔽於氣質而有生之後梏亡於物欲也昏蔽於氣質則自内而發於外者常偏而不得其正梏亡於物欲則自物而誘乎人者常流而不能自反是則人之為不善者盖兼夫二者不得盡歸之外物之誘也况夫氣之偏由已而出則繋於己者恒多物之誘自彼而來則繋於物者或寡又人之氣蔽而薄者則物誘害之也淺氣之蔽而厚者則物誘害之也深以是較其内外多寡先後輕重之辨則二者之害氣質為甚今其言專責於物誘之害而不及夫氣質之不美是但知身之疴痒而不睹乎腹心之疾也亦可見其察理之䟽矣然其失不唯是也且人之蕩其情而鑿其性者固由於外物誘之也然外物得而誘之者又由其不能操存此心故一感於物即引之而已矣此念日熟尚不知察由是本心偷則自行而繋累於物者愈重外物攻之者衆而陷溺其心者愈深反覆循環日益膠固於是私欲滋蔓而性善亡矣若乃反求其本將外物誘之罪耶抑此心自放之罪耶盖較然可知矣使能先持其志動靜有養當其未與物接則純乎清明之體而存養宻及其外物之來則察夫理欲之際而趨舍嚴夫如是則雖外物相代乎前而吾心未始有變也尚何患夫感物而動遂至於物至而人化物也哉故茍能操心則雖動而未嘗不善不知操之則雖靜而善不可保也盖心不知操雖曰無事之時而其中已昬憒紛亂坐馳於外矣又何待迫於外物而後始為不善哉由是觀之則人之失其性而為不善者其根本之害皆作於其心安得歸罪於外物必一切扞去之為快也若如或者之説則不惟使人昧於本原而不知用力之地將徒使人勞於禦物而不免有過之歸矣或者之言近世有惑之者故不可不辯書戰國䇿後予觀戰國之士凡其所言富國強兵縱橫之術皆乘諸侯欲利之心然後廼得行其説則以當時生民之禍不惟䇿士有其罪而諸侯盖罪之首也鄉使諸侯無欲利之心則小人之術烏得而中之後之議者苐知詆䇿士之邪說而不知責諸侯之欲利其論固已踈矣廼知孟子何必曰利之言盖㧞本塞原之論也䇿問二首問我朝貢舉之法黜詞賦而用經術盖自宋儒之後經術之學益以大明於是二帝三王之設施孔孟之論議前代之士間有未之聞者而况今之學者既皆誦而習之宜若可以興教化而得賢才也然而士習益媮有甚於昔之攻詞賦者其故何耶又嘗竊謂今日程試之文則辭非已出而因陋就簡不知其膚淺也義理非自得而雜真失正不知其悖謬也有司藉此取士朝廷縁此命官豈猥瑣之文廼可以得博洽之材歟抑士之所負之材固有出於所言之外歟昔人有云若謂此科嘗多得材自縁仕進别無他路今之科階有似之否歟一代之法不敢輙議若因今之法㕘古之制使士務有益之學朝獲有用之材殆必有䇿焉兹有司之所欲聞也問宋儒謂後世治不及古者其大有三人君之取士用人任官不師先王也且以為莫善焉者古已行之莫不善焉者後世皆蹈之其所謂善與不善焉者可得聞其詳耶今國家取士用人任官之制酌於前代其初未為不善然行之既乆不免有偏而不振者竊意識治者處此必將隨時變易師古人之意以救今日之弊庶乎其可也或者又謂不當泥古且憚於輕變法令今夫徒知慕古而不知其不可行固為執滯之見若惟今之是遂謂終不可損益者則亦茍且因循之習耳兹欲畧倣古法而不至駭今之俗以求取士用人任官之得其效其何術而可願究言之以觀用世之學考功集巻十
