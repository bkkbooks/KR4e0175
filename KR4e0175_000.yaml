body:
  text: 考功集目録别集類五明卷一賦四言古詩樂府卷二五言古詩上卷三五言古詩下卷四七言古詩卷五五言律詩卷六五言排律卷七七言律詩卷八五言絶句六言絶句七言絶句卷九書卷十序記雜著臣等謹按考功集十卷明薛蕙撰蕙字君采亳州人正德甲戌進士官至吏部考功司郎中故以官名集正嘉之際文體初新北地信陽聲華方盛蕙詩獨以清削婉約介乎其間古體上挹晉宋近體旁涉錢郎核其遺篇雖亦擬議多而變化少然當其自得覺筆墨之外别有微情非生吞漢魏活剝盛唐者比其戲成五絶句有曰俊逸終憐何大復粗豪不解李空同其所尚略可見矣又蕙與湛若水俱為嚴嵩同年嵩權極盛之時若水年已垂耄而怵於利害不免為嵩作鈐山堂集序反覆推頌頗為晚節之纍蕙初亦愛嵩文采頗相酬答逮其秉政以後即惡其怙權病國不復相聞凡舊時倡和亦悉削其稿故全集十卷無一字與嵩相關其植品之髙逈出流輩是以詩格孤秀肖其為人其所樹立又不在區區文字間也乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀考功集原序昔我武宗皇帝庚辰之嵗余嘗從瑞泉先生遊于京師獲西原薛先生詞賦數帙尚則玄風聿袪末習漱羣籍之芳潤擷百氏之英敷藻思鴻才卓哉有斐一時騷壇詞囿操觚灑翰之徒邈焉寡儔先生方綰章銓署欲晉焉請益未之敢也今上御極之癸未余舉進士先生同考之未幾振衣南州余亦分符北海思覿晬顔聆玄論未之能也乃嵗壬辰余官中土分按南畿既見先生乃舍彼舊學棲迹丘園遊心理域德音秩秩昭然發矇不我誣已乃知大道靡窮逹人無我瞻彼羣什道中一藝云爾雖然尼父定刪風雅並述將以性情所感斯道攸存詩以理之孰云徒作統之暢湮鬱之思逹神明之德通萬物之情格兩間之妙詩之為用大矣哉夫道不逺人詩非離道一以貫之存乎其人追念遐思爰請舊作以貽同志並敘厥學庶有所稽焉皇明嘉靖十四載中春十日秦中李宗樞序
