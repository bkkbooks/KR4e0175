body:
  text: 考功集目録别集類五明巻一賦四言古詩樂府巻二五言古詩上巻三五言古詩下巻四七言古詩巻五五言律詩巻六五言排律巻七七言律詩巻八五言絶句六言絶句七言絶句巻九書巻十序記雜著臣等謹按考功集十巻明薛蕙撰蕙字君采亳州人正徳甲戌進士官至吏部考功司郎中故以官名集正嘉之際文體初新北地信陽聲華方盛蕙詩獨以清削婉約介乎其間古體上挹晉宋近體旁渉錢郎核其遺篇雖亦擬議多而變化少然當其自得覺筆墨之外别有微情非生吞漢魏活剥盛唐者比其戯成五絶句有曰俊逸終憐何大復麤豪不解李空同其所尚畧可見矣又蕙與湛若水俱為嚴嵩同年嵩權極盛之時若水年已垂耄而怵於利害不免為嵩作鈐山堂集序反覆推頌頗為晩節之累蕙初亦愛嵩文采頗相酬答迨其秉政以後即惡其怙權病國不復相聞凡舊時倡和亦悉削其稿故全集十巻無一字與嵩相闗其植品之髙逈出流輩是以詩格孤秀肖其為人其所樹立又不在區區文字間也乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀考功集原序昔我武宗皇帝庚辰之嵗余嘗從瑞泉先生游于京師獲西原薛先生詞賦數帙尚則𤣥風聿袪末習漱羣籍之芳潤擷百氏之英旉藻思鴻才卓哉有斐一時騷壇詞囿操觚灑翰之徒邈焉寡儔先生方綰章銓署欲晉焉請益未之敢也今上御極之癸未余舉進士先生同考之未幾振衣南州余亦分符北海思覿晬顔聆𤣥論未之能也乃嵗壬辰余官中土分按南畿既見先生乃舍彼舊學棲跡丘園游心理域徳音秩秩昭然發矇不我誣已乃知大道靡窮逹人無我瞻彼羣什道中一藝云爾雖然尼父定删風雅並述將以性情所感斯道攸存詩以理之孰云徒作統之暢湮鬰之思逹神明之徳通萬物之情格兩間之妙詩之為用大矣哉夫道不逺人詩非離道一以貫之存乎其人追念遐思爰請舊作以貽同志並叙厥學庶有所稽焉皇明嘉靖十四載中春十日秦中李宗樞序
